# ─────────────────────────────────────────────────────────────
# netlify.toml — Netlify 배포 설정
# ─────────────────────────────────────────────────────────────

[build]
  publish = "."       # 빌드 없이 루트 폴더 그대로 배포 (순수 정적)
  # command = ""      # 빌드 커맨드 없음 (필요시 "npm run build" 등 추가)

# ── 전역 보안 헤더 ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# ── HTML: 항상 최신 버전 서빙 ─────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── 정적 에셋: 1년 캐싱 (파일명 바꾸면 자동 갱신) ──────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── API 프록시 (ngrok → 로컬 FastAPI) ─────────────────────────
# ngrok URL이 바뀔 때마다 아래 to 값만 교체 후 git push → Netlify 자동 재배포
# 프론트엔드는 항상 /api/* 로만 호출하므로 코드 변경 불필요
#
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://xxxx.ngrok-free.app/:splat"
#   status = 200
#   force  = true
#   [redirects.headers]
#     ngrok-skip-browser-warning = "1"

# ── 멀티페이지 라우팅 ─────────────────────────────────────────
[[redirects]]
  from   = "/tools/cd91"
  to     = "/tools/cd91/"
  status = 301

[[redirects]]
  from   = "/tools/db"
  to     = "/tools/db/"
  status = 301

# 새 도구 추가 시 아래 패턴으로 추가:
# [[redirects]]
#   from   = "/tools/cofix"
#   to     = "/tools/cofix/"
#   status = 301
