<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beta Trading — 금리 도구 모음</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .panel-wrap {
      background: var(--s1);
      border: .5px solid var(--bd);
      border-radius: var(--r);
      padding: 1rem 1.125rem;
      margin-bottom: 12px;
    }
    .ctrl-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--t3);
      display: inline-block;
      margin-right: 6px;
    }
    .conn-dot.ok { background: var(--green); box-shadow: 0 0 5px rgba(52,211,153,.45); }
    .conn-dot.err { background: var(--red); }
    .btn {
      background: none;
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      color: var(--t2);
      font-size: 12px;
      cursor: pointer;
      padding: 7px 11px;
      transition: all .15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn.primary {
      border-color: rgba(52,211,153,.28);
      color: var(--green);
      background: rgba(52,211,153,.06);
    }
    .btn.primary:hover {
      border-color: var(--green);
      background: rgba(52,211,153,.12);
    }
    .status {
      font-size: 11px;
      color: var(--t3);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin-bottom: 12px;
    }
    .metric {
      background: var(--s1);
      border: .5px solid var(--bd);
      border-radius: var(--rs);
      padding: 11px 13px;
    }
    .metric .ml { font-size: 10px; color: var(--t3); margin-bottom: 3px; letter-spacing: .3px; }
    .metric .mv { font-size: 20px; font-weight: 600; letter-spacing: -.5px; }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .list-mini {
      font-size: 12px;
      color: var(--t2);
      line-height: 1.7;
      margin-top: 4px;
      max-height: 310px;
      overflow-y: auto;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: .5px solid var(--bd);
      padding: 5px 0;
    }
    .row:last-child { border-bottom: 0; }
    .nm { color: var(--t1); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { font-size: 10px; color: var(--t3); }
    .sc { font-size: 11px; font-weight: 600; }

    .chart-card {
      background: var(--s1);
      border: .5px solid var(--bd);
      border-radius: var(--r);
      padding: 1rem 1.125rem;
    }
    @media (max-width: 640px) {
      .metrics { grid-template-columns: 1fr 1fr; }
      .panels { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <nav class="nav">
    <a href="/" class="nav-brand">금리 도구 모음</a>
    <div class="nav-links">
      <a href="/tools/beta-trading/" class="nav-link active">Beta Trading</a>
      <a href="/tools/cd91/" class="nav-link">CD91 전망</a>
      <a href="/tools/dashboard/" class="nav-link">금리 대시보드</a>
      <a href="/tools/supply/" class="nav-link">시장 수급</a>
      <a href="/tools/db/" class="nav-link">DB 탐색</a>
    </div>
  </nav>

  <div class="hdr" style="margin-bottom:1rem;">
    <h1>Beta Trading</h1>
    <p>3팩터 RV · MOM · CURVE — JS 대시보드 (Streamlit 미사용)</p>
  </div>

  <div class="panel-wrap">
    <div class="stl">상태</div>
    <div class="ctrl-row">
      <div class="status"><span class="conn-dot" id="connDot"></span><span id="connTxt">연결 확인 중...</span></div>
      <button class="btn primary" id="refreshBtn" type="button">새로고침</button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="ml">기준일</div>
      <div class="mv" id="mAsOf">—</div>
    </div>
    <div class="metric">
      <div class="ml">MOM Signal</div>
      <div class="mv" id="mMom">—</div>
    </div>
    <div class="metric">
      <div class="ml">CURVE Signal</div>
      <div class="mv" id="mCurve">—</div>
    </div>
    <div class="metric">
      <div class="ml">SLOPE (10Y-3Y)</div>
      <div class="mv" id="mSlope">—</div>
    </div>
  </div>

  <div class="chart-card" style="margin-bottom:12px;">
    <div class="stl">팩터 누적 PnL (bp)</div>
    <div style="position:relative;height:300px;"><canvas id="pnlChart"></canvas></div>
  </div>

  <div class="panels">
    <div class="panel-wrap">
      <div class="stl">RV LONG 후보</div>
      <div class="list-mini" id="longList"><div class="status">로딩 중...</div></div>
    </div>
    <div class="panel-wrap">
      <div class="stl">RV SHORT 후보</div>
      <div class="list-mini" id="shortList"><div class="status">로딩 중...</div></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let pnlChart = null;

function fmtSig(v) {
  if (v > 0) return "+1";
  if (v < 0) return "-1";
  return "0";
}

function setConn(ok, txt) {
  const dot = document.getElementById("connDot");
  dot.className = "conn-dot " + (ok ? "ok" : "err");
  document.getElementById("connTxt").textContent = txt;
}

function renderCandidates(elId, rows, type) {
  const el = document.getElementById(elId);
  if (!rows?.length) {
    el.innerHTML = '<div class="status">후보 없음</div>';
    return;
  }
  el.innerHTML = rows.map(r => {
    const s = r.rv_score_bp != null ? Number(r.rv_score_bp).toFixed(2) : "-";
    const dy = r.dy_1d_bp != null ? Number(r.dy_1d_bp).toFixed(2) : "-";
    const remain = r.remain_year != null ? Number(r.remain_year).toFixed(1) : "-";
    return `
      <div class="row">
        <div style="min-width:0;">
          <div class="nm">${r.bond_name || r.bond_code || "-"}</div>
          <div class="meta">${r.bond_code || "-"} · 잔존 ${remain}Y · dY ${dy}bp</div>
        </div>
        <div class="sc" style="color:${type === "long" ? "var(--green)" : "var(--red)"};">${s}</div>
      </div>`;
  }).join("");
}

function renderChart(rows) {
  const labels = rows.map(r => (r.date || "").slice(5));
  const m = rows.map(r => r.cum_mom_bp ?? null);
  const c = rows.map(r => r.cum_curve_bp ?? null);
  const e = rows.map(r => r.cum_combo_bp ?? null);

  const ctx = document.getElementById("pnlChart").getContext("2d");
  if (pnlChart) pnlChart.destroy();
  pnlChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "MOM", data: m, borderColor: "#4a9eff", pointRadius: 0, borderWidth: 1.8 },
        { label: "CURVE", data: c, borderColor: "#34d399", pointRadius: 0, borderWidth: 1.8 },
        { label: "COMBO", data: e, borderColor: "#fbbf24", pointRadius: 0, borderWidth: 2.2 },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: "index" },
      plugins: { legend: { labels: { color: "#8b93a8", boxWidth: 12 } } },
      scales: {
        x: { ticks: { color: "#555e75", maxTicksLimit: 8 }, grid: { color: "rgba(255,255,255,.03)" } },
        y: { ticks: { color: "#555e75" }, grid: { color: "rgba(255,255,255,.04)" } },
      },
    },
  });
}

async function loadAll() {
  try {
    const [snap, rv, series] = await Promise.all([
      apiGet("/beta/snapshot"),
      apiGet("/beta/rv?limit=10"),
      apiGet("/beta/series?days=365"),
    ]);

    setConn(true, "연결됨 · Beta API 응답 정상");

    document.getElementById("mAsOf").textContent = snap.as_of || "-";
    document.getElementById("mMom").textContent = fmtSig(snap?.mom?.signal ?? 0);
    document.getElementById("mCurve").textContent = fmtSig(snap?.curve?.signal ?? 0);
    document.getElementById("mSlope").textContent =
      snap?.curve?.slope_bp != null ? Number(snap.curve.slope_bp).toFixed(1) + "bp" : "-";

    renderCandidates("longList", rv.long || [], "long");
    renderCandidates("shortList", rv.short || [], "short");
    renderChart(series.rows || []);
  } catch (e) {
    setConn(false, "연결 실패 · " + (e.message || "알 수 없는 오류"));
    document.getElementById("longList").innerHTML = '<div class="status">데이터 조회 실패</div>';
    document.getElementById("shortList").innerHTML = '<div class="status">데이터 조회 실패</div>';
  }
}

document.getElementById("refreshBtn").addEventListener("click", loadAll);
loadAll();
</script>
</body>
</html>
