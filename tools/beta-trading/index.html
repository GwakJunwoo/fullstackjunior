<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beta Trading — 금리 도구 모음</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .panel-wrap {
      background: var(--s1);
      border: .5px solid var(--bd);
      border-radius: var(--r);
      padding: 1rem 1.125rem;
      margin-bottom: 12px;
    }
    .ctrl-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--t3);
      display: inline-block;
      margin-right: 6px;
    }
    .conn-dot.ok { background: var(--green); box-shadow: 0 0 5px rgba(52,211,153,.45); }
    .conn-dot.err { background: var(--red); }
    .btn {
      background: none;
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      color: var(--t2);
      font-size: 12px;
      cursor: pointer;
      padding: 7px 11px;
      transition: all .15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue); }
    .btn.primary {
      border-color: rgba(52,211,153,.28);
      color: var(--green);
      background: rgba(52,211,153,.06);
    }
    .btn.primary:hover {
      border-color: var(--green);
      background: rgba(52,211,153,.12);
    }
    .status {
      font-size: 11px;
      color: var(--t3);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin-bottom: 12px;
    }
    .metric {
      background: var(--s1);
      border: .5px solid var(--bd);
      border-radius: var(--rs);
      padding: 11px 13px;
    }
    .metric .ml { font-size: 10px; color: var(--t3); margin-bottom: 3px; letter-spacing: .3px; }
    .metric .mv { font-size: 20px; font-weight: 600; letter-spacing: -.5px; }
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .list-mini {
      font-size: 12px;
      color: var(--t2);
      line-height: 1.7;
      margin-top: 4px;
      max-height: 310px;
      overflow-y: auto;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: .5px solid var(--bd);
      padding: 5px 0;
    }
    .row:last-child { border-bottom: 0; }
    .nm { color: var(--t1); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { font-size: 10px; color: var(--t3); }
    .sc { font-size: 11px; font-weight: 600; }
    .chart-card {
      background: var(--s1);
      border: .5px solid var(--bd);
      border-radius: var(--r);
      padding: 1rem 1.125rem;
      margin-bottom: 12px;
    }
    .search-wrap { position: relative; min-width: 260px; flex: 1; }
    .search-input {
      width: 100%;
      background: var(--s2);
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      color: var(--t1);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--s2);
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      z-index: 100;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      max-height: 260px;
      overflow-y: auto;
    }
    .search-item {
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      transition: background .1s;
    }
    .search-item:hover, .search-item.focused { background: var(--s3); }
    .si-code { font-weight: 600; color: var(--blue); font-size: 11px; flex-shrink: 0; }
    .si-name { color: var(--t2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .si-meta { font-size: 10px; color: var(--t3); flex-shrink: 0; }
    .date-input {
      background: var(--s2);
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      color: var(--t1);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
    }
    .toggle-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--t2);
      font-size: 11px;
      cursor: pointer;
    }
    .selected-codes {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 14px;
      min-height: 28px;
    }
    .code-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(74,158,255,.12);
      color: var(--blue);
      border: .5px solid rgba(74,158,255,.25);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
    }
    .code-chip button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      line-height: 1;
    }
    .beta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .mini-chart-card {
      background: var(--s2);
      border: .5px solid var(--bd);
      border-radius: var(--rs);
      padding: .85rem .95rem;
    }
    .mini-chart-title {
      font-size: 11px;
      color: var(--t2);
      margin-bottom: 8px;
      letter-spacing: .2px;
    }
    .empty-box {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--t3);
      font-size: 11px;
      border: .5px dashed var(--bd2);
      border-radius: var(--rs);
    }
    @media (max-width: 860px) {
      .metrics { grid-template-columns: 1fr 1fr; }
      .panels { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .metrics { grid-template-columns: 1fr 1fr; }
      .search-wrap { min-width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <nav class="nav">
    <a href="/" class="nav-brand">금리 도구 모음</a>
    <div class="nav-links">
      <a href="/tools/beta-trading/" class="nav-link active">Beta Trading</a>
      <a href="/tools/cd91/" class="nav-link">CD91 전망</a>
      <a href="/tools/dashboard/" class="nav-link">금리 대시보드</a>
      <a href="/tools/supply/" class="nav-link">시장 수급</a>
      <a href="/tools/db/" class="nav-link">DB 탐색</a>
    </div>
  </nav>

  <div class="hdr" style="margin-bottom:1rem;">
    <h1>Beta Trading</h1>
  </div>

  <div class="panel-wrap">
    <div class="stl">상태</div>
    <div class="ctrl-row">
      <div class="status"><span class="conn-dot" id="connDot"></span><span id="connTxt">연결 확인 중...</span></div>
      <button class="btn primary" id="refreshBtn" type="button">새로고침</button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="ml">기준일</div>
      <div class="mv" id="mAsOf">—</div>
    </div>
    <div class="metric">
      <div class="ml">MOM Signal</div>
      <div class="mv" id="mMom">—</div>
    </div>
    <div class="metric">
      <div class="ml">CURVE Signal</div>
      <div class="mv" id="mCurve">—</div>
    </div>
    <div class="metric">
      <div class="ml">SLOPE (10Y-3Y)</div>
      <div class="mv" id="mSlope">—</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="stl">종목별 베타 시계열</div>
    <div class="ctrl-row" style="margin-top:10px;">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="종목 검색 (채권명 · 종목코드)" autocomplete="off">
        <div class="search-dropdown" id="searchDropdown" style="display:none;"></div>
      </div>
      <input class="date-input" id="betaStartDate" type="date" value="2023-01-01">
      <label class="toggle-label"><input id="showBucketAvg" type="checkbox" checked> 만기 평균</label>
      <button class="btn" id="applyBetaBtn" type="button">적용</button>
    </div>
    <div class="selected-codes" id="selectedCodes"></div>
    <div class="beta-grid" id="betaGrid">
      <div class="mini-chart-card">
        <div class="mini-chart-title">γ_level</div>
        <div style="position:relative;height:220px;"><canvas id="gammaLevelChart"></canvas></div>
      </div>
      <div class="mini-chart-card">
        <div class="mini-chart-title">γ_slope</div>
        <div style="position:relative;height:220px;"><canvas id="gammaSlopeChart"></canvas></div>
      </div>
      <div class="mini-chart-card">
        <div class="mini-chart-title">ε (bp)</div>
        <div style="position:relative;height:220px;"><canvas id="epsilonChart"></canvas></div>
      </div>
      <div class="mini-chart-card">
        <div class="mini-chart-title">cum_ε_21d (bp)</div>
        <div style="position:relative;height:220px;"><canvas id="cumEpsilonChart"></canvas></div>
      </div>
    </div>
    <div class="empty-box" id="betaEmpty" style="display:none;">종목을 선택하세요</div>
  </div>

  <div class="panels">
    <div class="panel-wrap">
      <div class="stl">RV LONG 후보</div>
      <div class="list-mini" id="longList"><div class="status">로딩 중...</div></div>
    </div>
    <div class="panel-wrap">
      <div class="stl">RV SHORT 후보</div>
      <div class="list-mini" id="shortList"><div class="status">로딩 중...</div></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let betaCharts = {};
let selectedCodes = [];
let universeMap = {};
let searchTimer = null;
let dropFocusIdx = -1;
const LINE_COLORS = ["#4a9eff", "#f87171", "#34d399", "#fbbf24", "#a78bfa", "#38bdf8"];
const BUCKET_COLORS = {
  short: "#4a9eff",
  mid: "#8b93a8",
  long: "#f87171",
};
const BUCKET_LABELS = {
  short: "avg ≤5Y",
  mid: "avg 5~10Y",
  long: "avg >10Y",
};

function fmtSig(v) {
  if (v > 0) return "+1";
  if (v < 0) return "-1";
  return "0";
}

function fmtRemain(v) {
  return v != null ? Number(v).toFixed(1) + "Y" : "-";
}

function setConn(ok, txt) {
  const dot = document.getElementById("connDot");
  dot.className = "conn-dot " + (ok ? "ok" : "err");
  document.getElementById("connTxt").textContent = txt;
}

function renderCandidates(elId, rows, type) {
  const el = document.getElementById(elId);
  if (!rows?.length) {
    el.innerHTML = '<div class="status">후보 없음</div>';
    return;
  }
  el.innerHTML = rows.map(r => {
    const s = r.rv_score_bp != null ? Number(r.rv_score_bp).toFixed(2) : "-";
    const dy = r.dy_1d_bp != null ? Number(r.dy_1d_bp).toFixed(2) : "-";
    const remain = r.remain_year != null ? Number(r.remain_year).toFixed(1) : "-";
    return `
      <div class="row">
        <div style="min-width:0;">
          <div class="nm">${r.bond_name || r.bond_code || "-"}</div>
          <div class="meta">${r.bond_code || "-"} · 잔존 ${remain}Y · dY ${dy}bp</div>
        </div>
        <div class="sc" style="color:${type === "long" ? "var(--green)" : "var(--red)"};">${s}</div>
      </div>`;
  }).join("");
}

function renderSelectedCodes() {
  const el = document.getElementById("selectedCodes");
  if (!selectedCodes.length) {
    el.innerHTML = '<span class="status">선택된 종목 없음</span>';
    return;
  }
  el.innerHTML = selectedCodes.map(code => {
    const meta = universeMap[code] || {};
    const label = `${meta.bond_name || code} · ${fmtRemain(meta.remain_year)}`;
    return `<span class="code-chip">${label}<button type="button" data-code="${code}">×</button></span>`;
  }).join("");

  el.querySelectorAll("button[data-code]").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedCodes = selectedCodes.filter(code => code !== btn.dataset.code);
      renderSelectedCodes();
      loadBetaCharts();
    });
  });
}

function addSelectedCode(item) {
  if (!item?.bond_code) return;
  universeMap[item.bond_code] = item;
  if (!selectedCodes.includes(item.bond_code)) {
    selectedCodes.push(item.bond_code);
  }
  selectedCodes = selectedCodes.slice(0, 6);
  renderSelectedCodes();
  hideDropdown();
  document.getElementById("searchInput").value = "";
  loadBetaCharts();
}

function onSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) {
    hideDropdown();
    return;
  }
  searchTimer = setTimeout(() => fetchSearch(val.trim()), 220);
}

async function fetchSearch(q) {
  try {
    const data = await apiGet(`/beta/search?q=${encodeURIComponent(q)}&limit=30`);
    renderDropdown(data.results || []);
  } catch {
    hideDropdown();
  }
}

function renderDropdown(results) {
  const dd = document.getElementById("searchDropdown");
  if (!results.length) {
    dd.style.display = "none";
    return;
  }
  dd.innerHTML = "";
  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "search-item";
    const ytmStr = r.ytm != null ? Number(r.ytm).toFixed(3) + "%" : "";
    div.innerHTML = `
      <span class="si-code">${r.bond_code ?? ""}</span>
      <span class="si-name">${r.bond_name ?? ""}</span>
      <span class="si-meta">${fmtRemain(r.remain_year)} ${ytmStr}</span>`;
    div.onclick = () => addSelectedCode(r);
    dd.appendChild(div);
  });
  dd.style.display = "block";
  dropFocusIdx = -1;
}

function hideDropdown() {
  document.getElementById("searchDropdown").style.display = "none";
}

function onKeyDown(e) {
  const items = document.querySelectorAll(".search-item");
  if (!items.length) return;
  if (e.key === "ArrowDown") {
    e.preventDefault();
    dropFocusIdx = Math.min(dropFocusIdx + 1, items.length - 1);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    dropFocusIdx = Math.max(dropFocusIdx - 1, 0);
  } else if (e.key === "Enter" && dropFocusIdx >= 0) {
    e.preventDefault();
    items[dropFocusIdx].click();
    return;
  } else if (e.key === "Escape") {
    hideDropdown();
    return;
  }
  items.forEach((el, i) => el.classList.toggle("focused", i === dropFocusIdx));
}

function destroyCharts() {
  Object.values(betaCharts).forEach(chart => chart && chart.destroy());
  betaCharts = {};
}

function buildDatasets(metricKey, data, showBucketAvg) {
  const datasets = [];
  selectedCodes.forEach((code, idx) => {
    const meta = data.meta?.[code] || universeMap[code] || {};
    const label = `${meta.bond_name || code} (${fmtRemain(meta.remain_year)})`;
    datasets.push({
      label,
      data: data.series?.[code]?.[metricKey] || [],
      borderColor: LINE_COLORS[idx % LINE_COLORS.length],
      backgroundColor: LINE_COLORS[idx % LINE_COLORS.length],
      pointRadius: 0,
      pointHoverRadius: 3,
      borderWidth: metricKey === "epsilon_bp" ? 1.1 : 1.7,
      tension: 0.12,
      spanGaps: true,
    });
  });

  if (showBucketAvg) {
    Object.entries(BUCKET_LABELS).forEach(([bucket, label]) => {
      if (!data.bucket_series?.[bucket]?.[metricKey]) return;
      datasets.push({
        label,
        data: data.bucket_series[bucket][metricKey],
        borderColor: BUCKET_COLORS[bucket],
        backgroundColor: BUCKET_COLORS[bucket],
        borderDash: [6, 4],
        pointRadius: 0,
        pointHoverRadius: 0,
        borderWidth: 1.1,
        tension: 0.08,
        spanGaps: true,
      });
    });
  }

  return datasets;
}

function renderMetricChart(canvasId, metricKey, labels, data, yLabel) {
  const ctx = document.getElementById(canvasId).getContext("2d");
  const showBucketAvg = document.getElementById("showBucketAvg").checked;
  const datasets = buildDatasets(metricKey, data, showBucketAvg);

  if (betaCharts[canvasId]) betaCharts[canvasId].destroy();
  betaCharts[canvasId] = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: "index" },
      plugins: {
        legend: { labels: { color: "#8b93a8", boxWidth: 12 } },
      },
      scales: {
        x: {
          ticks: { color: "#555e75", maxTicksLimit: 8, maxRotation: 0 },
          grid: { color: "rgba(255,255,255,.03)" },
        },
        y: {
          title: { display: true, text: yLabel, color: "#555e75", font: { size: 10 } },
          ticks: { color: "#555e75" },
          grid: { color: "rgba(255,255,255,.04)" },
        },
      },
    },
  });
}

async function loadUniverse() {
  const data = await apiGet("/beta/universe?limit=240");
  universeMap = {};
  (data.items || []).forEach(item => {
    universeMap[item.bond_code] = item;
  });

  if (!selectedCodes.length) {
    selectedCodes = (data.defaults || []).slice(0, 3);
  }
  renderSelectedCodes();
}

async function loadBetaCharts() {
  const empty = document.getElementById("betaEmpty");
  const grid = document.getElementById("betaGrid");

  if (!selectedCodes.length) {
    destroyCharts();
    grid.style.display = "none";
    empty.style.display = "flex";
    return;
  }

  try {
    const startDate = document.getElementById("betaStartDate").value;
    const params = new URLSearchParams({
      codes: selectedCodes.join(","),
      start_date: startDate,
      days: "900",
    });
    const data = await apiGet(`/beta/decomposition?${params.toString()}`);
    const labels = (data.dates || []).map(d => d.slice(2));

    if (!labels.length) {
      destroyCharts();
      grid.style.display = "none";
      empty.style.display = "flex";
      empty.textContent = "조회 결과 없음";
      return;
    }

    empty.style.display = "none";
    grid.style.display = "grid";
    renderMetricChart("gammaLevelChart", "gamma_level", labels, data, "γ_level");
    renderMetricChart("gammaSlopeChart", "gamma_slope", labels, data, "γ_slope");
    renderMetricChart("epsilonChart", "epsilon_bp", labels, data, "ε (bp)");
    renderMetricChart("cumEpsilonChart", "cum_epsilon_21d", labels, data, "cum_ε_21d (bp)");
  } catch (e) {
    destroyCharts();
    grid.style.display = "none";
    empty.style.display = "flex";
    empty.textContent = "차트 조회 실패";
  }
}

async function loadAll() {
  try {
    const [snap, rv] = await Promise.all([
      apiGet("/beta/snapshot"),
      apiGet("/beta/rv?limit=10"),
    ]);

    setConn(true, "연결됨 · Beta API 응답 정상");
    document.getElementById("mAsOf").textContent = snap.as_of || "-";
    document.getElementById("mMom").textContent = fmtSig(snap?.mom?.signal ?? 0);
    document.getElementById("mCurve").textContent = fmtSig(snap?.curve?.signal ?? 0);
    document.getElementById("mSlope").textContent =
      snap?.curve?.slope_bp != null ? Number(snap.curve.slope_bp).toFixed(1) + "bp" : "-";

    renderCandidates("longList", rv.long || [], "long");
    renderCandidates("shortList", rv.short || [], "short");

    if (!Object.keys(universeMap).length) {
      await loadUniverse();
    }
    await loadBetaCharts();
  } catch (e) {
    setConn(false, "연결 실패 · " + (e.message || "알 수 없는 오류"));
    document.getElementById("longList").innerHTML = '<div class="status">데이터 조회 실패</div>';
    document.getElementById("shortList").innerHTML = '<div class="status">데이터 조회 실패</div>';
  }
}

document.getElementById("searchInput").addEventListener("input", e => onSearch(e.target.value));
document.getElementById("searchInput").addEventListener("keydown", onKeyDown);
document.getElementById("applyBetaBtn").addEventListener("click", loadBetaCharts);
document.getElementById("refreshBtn").addEventListener("click", loadAll);
document.getElementById("betaStartDate").addEventListener("change", loadBetaCharts);
document.getElementById("showBucketAvg").addEventListener("change", loadBetaCharts);
document.addEventListener("click", e => { if (!e.target.closest(".search-wrap")) hideDropdown(); });

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
