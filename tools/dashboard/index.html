<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>금리 대시보드 — 금리 도구 모음</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    /* ── 검색 ── */
    .search-wrap { position: relative; max-width: 360px; }
    .search-input {
      width: 100%; background: var(--s2); border: .5px solid var(--bd2);
      border-radius: var(--rs); color: var(--t1); font-size: 13px;
      padding: 8px 12px; outline: none; transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--s2); border: .5px solid var(--bd2); border-radius: var(--rs);
      z-index: 100; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.4);
      max-height: 260px; overflow-y: auto;
    }
    .search-item {
      padding: 7px 12px; cursor: pointer; font-size: 12px;
      display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
      transition: background .1s;
    }
    .search-item:hover, .search-item.focused { background: var(--s3); }
    .si-nick { font-weight: 600; color: var(--blue); font-size: 11px; flex-shrink: 0; }
    .si-name { color: var(--t2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .si-meta { font-size: 10px; color: var(--t3); flex-shrink: 0; }

    /* ── 기간 버튼 ── */
    .period-btn {
      background: none; border: .5px solid var(--bd2); border-radius: var(--rs);
      color: var(--t3); font-size: 11px; cursor: pointer; padding: 3px 9px;
      transition: all .15s;
    }
    .period-btn:hover { color: var(--t1); }
    .period-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(74,158,255,.1); }

    /* ── 토글 버튼 (카테고리, 비교일) ── */
    .toggle-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .tgl-btn {
      background: none; border: .5px solid var(--bd2); border-radius: var(--rs);
      color: var(--t3); font-size: 10px; cursor: pointer; padding: 2px 8px;
      transition: all .15s;
    }
    .tgl-btn:hover { color: var(--t1); }
    .tgl-btn.active { background: rgba(74,158,255,.12); border-color: var(--blue); color: var(--blue); }
    .tgl-btn.active.green  { background: rgba(52,211,153,.12); border-color: var(--green); color: var(--green); }
    .tgl-btn.active.orange { background: rgba(251,146,60,.12);  border-color: #fb923c; color: #fb923c; }
    .tgl-btn.active.purple { background: rgba(167,139,250,.12); border-color: var(--purple); color: var(--purple); }

    /* ── 대형 검색 차트 ── */
    .big-chart-card {
      background: var(--s1); border: .5px solid var(--bd); border-radius: var(--r);
      padding: 1rem 1.125rem; margin-bottom: 16px;
    }
    .big-chart-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
    }
    .big-chart-title { font-size: 13px; font-weight: 600; color: var(--t1); }
    .big-chart-meta  { font-size: 10px; color: var(--t3); margin-left: 6px; }

    /* ── 수익률 곡선 카드 ── */
    .curve-card {
      background: var(--s1); border: .5px solid var(--bd); border-radius: var(--r);
      padding: 1rem 1.125rem; margin-bottom: 16px;
    }
    .curve-toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .curve-label { font-size: 10px; color: var(--t3); white-space: nowrap; }

    /* ── 미니 차트 그리드 ── */
    .mini-section { margin-bottom: 20px; }
    .mini-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: .7px;
      color: var(--t3); text-transform: uppercase; margin-bottom: 8px;
    }
    .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .mini-card {
      background: var(--s1); border: .5px solid var(--bd); border-radius: var(--r);
      padding: .75rem .875rem .5rem;
    }
    .mini-card-hdr {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 6px;
    }
    .mini-title { font-size: 10px; font-weight: 600; color: var(--t3); letter-spacing: .3px; }
    .mini-val   { font-size: 14px; font-weight: 600; letter-spacing: -.3px; }
    .mini-chg   { font-size: 10px; margin-left: 4px; }
    .empty-mini {
      display: flex; align-items: center; justify-content: center;
      height: 90px; font-size: 10px; color: var(--t3);
    }

    /* ── 연결 바 ── */
    .conn-bar {
      background: var(--s1); border: .5px solid var(--bd); border-radius: var(--r);
      padding: .5rem 1rem; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .conn-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--t3); flex-shrink: 0; transition: background .2s;
    }
    .conn-dot.ok  { background: var(--green); box-shadow: 0 0 5px rgba(52,211,153,.4); }
    .conn-dot.err { background: var(--red); }
    .conn-status  { font-size: 10px; color: var(--t3); }

    @media (max-width: 640px) { .mini-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 400px) { .mini-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">

  <nav class="nav">
    <a href="/" class="nav-brand">금리 도구 모음</a>
    <div class="nav-links">
      <a href="/tools/cd91/"      class="nav-link">CD91 전망</a>
      <a href="/tools/dashboard/" class="nav-link active">금리 대시보드</a>
      <a href="/tools/supply/"    class="nav-link">시장 수급</a>
      <a href="/tools/db/"        class="nav-link">DB 탐색</a>
    </div>
  </nav>

  <div class="hdr" style="margin-bottom:1rem;">
    <h1>금리 대시보드</h1>
    <p>ktb 테이블 — 수익률 곡선 · 스프레드 · 버터플라이 · IRS</p>
  </div>

  <!-- 연결 상태 -->
  <div class="conn-bar">
    <div class="conn-dot" id="connDot"></div>
    <span class="conn-status" id="connStatus">연결 중...</span>
  </div>

  <!-- 검색 + 기간 -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text"
             placeholder="종목 검색 (nickname · 채권명 · 코드)"
             oninput="onSearch(this.value)"
             onkeydown="onKeyDown(event)"
             autocomplete="off">
      <div class="search-dropdown" id="searchDropdown" style="display:none;"></div>
    </div>
    <div style="display:flex;gap:4px;" id="periodBtns">
      <button class="period-btn" onclick="setPeriod(this,30)">1M</button>
      <button class="period-btn" onclick="setPeriod(this,90)">3M</button>
      <button class="period-btn" onclick="setPeriod(this,180)">6M</button>
      <button class="period-btn active" onclick="setPeriod(this,365)">1Y</button>
      <button class="period-btn" onclick="setPeriod(this,730)">2Y</button>
      <button class="period-btn" onclick="setPeriod(this,1825)">5Y</button>
      <button class="period-btn" onclick="setPeriod(this,0)">전체</button>
    </div>
  </div>

  <!-- 대형 검색 차트 (선택 시 표시) -->
  <div class="big-chart-card" id="bigChartCard" style="display:none;">
    <div class="big-chart-hdr">
      <div>
        <span class="big-chart-title" id="bigTitle">—</span>
        <span class="big-chart-meta"  id="bigMeta"></span>
      </div>
      <div id="bigVal" style="font-size:18px;font-weight:700;letter-spacing:-.5px;"></div>
    </div>
    <div style="position:relative;height:280px;">
      <canvas id="bigChart"></canvas>
    </div>
  </div>

  <!-- 수익률 곡선 -->
  <div class="stl">수익률 곡선</div>
  <div class="curve-card">
    <div class="curve-toolbar">
      <span class="curve-label">카테고리</span>
      <div class="toggle-group" id="catBtns">
        <button class="tgl-btn active" data-cat="" onclick="setCat(this)">전체</button>
      </div>
      <div style="width:.5px;height:14px;background:var(--bd);flex-shrink:0;"></div>
      <span class="curve-label">비교</span>
      <div class="toggle-group">
        <button class="tgl-btn active blue"   data-offset="0"   onclick="toggleCurveDate(this)">오늘</button>
        <button class="tgl-btn"               data-offset="30"  onclick="toggleCurveDate(this)">1M전</button>
        <button class="tgl-btn green"         data-offset="91"  onclick="toggleCurveDate(this)">3M전</button>
        <button class="tgl-btn orange"        data-offset="182" onclick="toggleCurveDate(this)">6M전</button>
        <button class="tgl-btn purple"        data-offset="365" onclick="toggleCurveDate(this)">1Y전</button>
      </div>
      <div style="width:.5px;height:14px;background:var(--bd);flex-shrink:0;"></div>
      <span class="curve-label">바스켓</span>
      <div class="toggle-group">
        <button class="tgl-btn" id="basketBtn" onclick="toggleBasket()">선물만</button>
      </div>
    </div>
    <div style="position:relative;height:280px;">
      <canvas id="curveChart"></canvas>
    </div>
    <div id="curveInfo" style="margin-top:6px;font-size:10px;color:var(--t3);text-align:center;"></div>
  </div>

  <!-- 레벨 · CD스프레드 -->
  <div class="mini-section">
    <div class="mini-section-label">레벨 · CD 스프레드</div>
    <div class="mini-grid" id="row-levels"></div>
  </div>

  <!-- 커브 스프레드 -->
  <div class="mini-section">
    <div class="mini-section-label">커브 스프레드</div>
    <div class="mini-grid" id="row-spreads"></div>
  </div>

  <!-- 버터플라이 -->
  <div class="mini-section">
    <div class="mini-section-label">버터플라이</div>
    <div class="mini-grid" id="row-butterfly"></div>
  </div>

  <!-- IRS 스프레드 -->
  <div class="mini-section">
    <div class="mini-section-label">IRS 스프레드</div>
    <div class="mini-grid" id="row-irs"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/assets/js/api.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG  — ktb 테이블 label 기반
//  CD91    → label "CD"
//  기준금리 → label "한국기준금리"
//  국고채   → label "3년지표", "5년지표", "10년지표" ...
//  IRS      → label "IRS1년", "IRS3년", "IRS5년", "IRS10년"
// ══════════════════════════════════════════════════════════════
const ALL_LABELS = [
  'CD', '한국기준금리',
  '2년지표', '3년지표', '5년지표', '10년지표', '20년지표', '30년지표',
  'IRS1년', 'IRS3년', 'IRS5년', 'IRS10년',
];

// 수익률 곡선 비교일별 색상
const CURVE_COLORS = {
  0:   { line: '#4a9eff', label: '오늘' },
  30:  { line: '#8b93a8', label: '1M전' },
  91:  { line: '#34d399', label: '3M전' },
  182: { line: '#fb923c', label: '6M전' },
  365: { line: '#a78bfa', label: '1Y전' },
};

// 미니 차트 섹션 정의
// formula(s) → [{date, value}]   s 키 = ktb label 그대로
const SECTIONS = [
  {
    rowId: 'row-levels',
    charts: [
      { id: 'cd_sp',  title: 'CD − 기준금리', unit: 'bp', color: '#4a9eff',
        formula: s => diff(s, 'CD', '한국기준금리', 100) },
      { id: 'ktb3',   title: '국고 3년',       unit: '%',  color: '#34d399',
        formula: s => single(s, '3년지표') },
      { id: 'ktb10',  title: '국고 10년',      unit: '%',  color: '#fbbf24',
        formula: s => single(s, '10년지표') },
    ],
  },
  {
    rowId: 'row-spreads',
    charts: [
      { id: 'sp53',   title: '5Y − 3Y',   unit: 'bp', color: '#4a9eff',
        formula: s => diff(s, '5년지표',  '3년지표',  100) },
      { id: 'sp103',  title: '10Y − 3Y',  unit: 'bp', color: '#a78bfa',
        formula: s => diff(s, '10년지표', '3년지표',  100) },
      { id: 'sp3010', title: '30Y − 10Y', unit: 'bp', color: '#f87171',
        formula: s => diff(s, '30년지표', '10년지표', 100) },
    ],
  },
  {
    rowId: 'row-butterfly',
    charts: [
      { id: 'bf3510',   title: '3-5-10 BF',  unit: 'bp', color: '#34d399',
        formula: s => butterfly(s, '3년지표',  '5년지표',  '10년지표') },
      { id: 'bf2510',   title: '2-5-10 BF',  unit: 'bp', color: '#fbbf24',
        formula: s => butterfly(s, '2년지표',  '5년지표',  '10년지표') },
      { id: 'bf102030', title: '10-20-30 BF', unit: 'bp', color: '#fb923c',
        formula: s => butterfly(s, '10년지표', '20년지표', '30년지표') },
    ],
  },
  {
    rowId: 'row-irs',
    charts: [
      { id: 'irs31',  title: 'IRS 3Y − 1Y',  unit: 'bp', color: '#38bdf8',
        formula: s => diff(s, 'IRS3년', 'IRS1년', 100) },
      { id: 'irs53',  title: 'IRS 5Y − 3Y',  unit: 'bp', color: '#e879f9',
        formula: s => diff(s, 'IRS5년', 'IRS3년', 100) },
      { id: 'irs105', title: 'IRS 10Y − 5Y', unit: 'bp', color: '#4ade80',
        formula: s => diff(s, 'IRS10년', 'IRS5년', 100) },
    ],
  },
];

// ══════════════════════════════════════════════════════════════
//  상태
// ══════════════════════════════════════════════════════════════
let currentDays    = 365;
let curveCategory  = '';          // '' = 전체
let curveBasket    = null;        // null | 1
let activeCurveOffsets = new Set([0]);  // 오늘만

let bigChartInst   = null;
let curveChartInst = null;
let miniCharts     = {};
let searchTimer    = null;
let dropFocusIdx   = -1;

// ══════════════════════════════════════════════════════════════
//  수식 헬퍼
//  multi_label_series 반환값: [{price_date, ytm}]
//  → single/diff/butterfly 는 {date, value} 형식 사용
// ══════════════════════════════════════════════════════════════
function single(s, key) {
  return (s[key] || []).map(p => ({ date: p.date, value: p.value != null ? +p.value : null }));
}
function toMap(arr) {
  if (!arr) return {};
  return Object.fromEntries(arr.map(p => [p.date?.slice(0, 10), p.value != null ? +p.value : null]));
}
function diff(s, a, b, mult = 1) {
  const ma = toMap(s[a]), mb = toMap(s[b]);
  const dates = [...new Set([...Object.keys(ma), ...Object.keys(mb)])].sort();
  return dates.map(d => ({
    date: d,
    value: ma[d] != null && mb[d] != null ? +((ma[d] - mb[d]) * mult).toFixed(4) : null,
  }));
}
function butterfly(s, w1, body, w2, mult = 100) {
  const m1 = toMap(s[w1]), mb = toMap(s[body]), m2 = toMap(s[w2]);
  const dates = [...new Set([...Object.keys(m1), ...Object.keys(mb), ...Object.keys(m2)])].sort();
  return dates.map(d => ({
    date: d,
    value: m1[d] != null && mb[d] != null && m2[d] != null
      ? +((2 * mb[d] - m1[d] - m2[d]) * mult).toFixed(4) : null,
  }));
}

// ══════════════════════════════════════════════════════════════
//  연결 상태
// ══════════════════════════════════════════════════════════════
async function checkConn() {
  try {
    const d = await apiGet('/health');
    if (d.status === 'ok') {
      document.getElementById('connDot').className = 'conn-dot ok';
      document.getElementById('connStatus').textContent = '연결됨';
    } else throw new Error(d.detail);
  } catch (e) {
    document.getElementById('connDot').className = 'conn-dot err';
    document.getElementById('connStatus').textContent = '연결 실패 — ' + e.message;
  }
}

// ══════════════════════════════════════════════════════════════
//  기간 선택
// ══════════════════════════════════════════════════════════════
function setPeriod(btn, days) {
  currentDays = days;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadAllMini();
  if (document.getElementById('bigChartCard').style.display !== 'none') {
    const lbl = document.getElementById('searchInput').dataset.label;
    if (lbl) loadBigChart(lbl);
  }
}

// ══════════════════════════════════════════════════════════════
//  카테고리 로드 + 필터
// ══════════════════════════════════════════════════════════════
async function loadCategories() {
  try {
    const d = await apiGet('/ktb/categories');
    const wrap = document.getElementById('catBtns');
    (d.categories || []).forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'tgl-btn';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.onclick = () => setCat(btn);
      wrap.appendChild(btn);
    });
  } catch { /* 카테고리 필터 생략 */ }
}

function setCat(btn) {
  document.querySelectorAll('#catBtns .tgl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curveCategory = btn.dataset.cat;
  loadCurve();
}

// ══════════════════════════════════════════════════════════════
//  바스켓 토글
// ══════════════════════════════════════════════════════════════
function toggleBasket() {
  const btn = document.getElementById('basketBtn');
  if (curveBasket === 1) {
    curveBasket = null;
    btn.classList.remove('active');
  } else {
    curveBasket = 1;
    btn.classList.add('active');
  }
  loadCurve();
}

// ══════════════════════════════════════════════════════════════
//  수익률 곡선 비교일 토글
// ══════════════════════════════════════════════════════════════
function toggleCurveDate(btn) {
  const offset = +btn.dataset.offset;
  if (offset === 0) return; // 오늘은 항상 표시
  if (activeCurveOffsets.has(offset)) {
    activeCurveOffsets.delete(offset);
    btn.classList.remove('active');
  } else {
    activeCurveOffsets.add(offset);
    btn.classList.add('active');
  }
  loadCurve();
}

// ── 날짜 계산 헬퍼 ─────────────────────────────────────────────
function offsetDate(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString().slice(0, 10);
}

// ══════════════════════════════════════════════════════════════
//  수익률 곡선 로드 + 렌더
// ══════════════════════════════════════════════════════════════
async function loadCurve() {
  const offsets = [...activeCurveOffsets].sort((a, b) => a - b);

  // 각 날짜 데이터 병렬 fetch
  const catParam    = curveCategory ? `&category=${encodeURIComponent(curveCategory)}` : '';
  const basketParam = curveBasket != null ? `&basket=${curveBasket}` : '';

  const fetches = offsets.map(offset => {
    const dateParam = offset > 0 ? `?date=${offsetDate(offset)}` : '?';
    return apiGet(`/ktb/curve${dateParam}${catParam}${basketParam}`)
      .catch(() => null);
  });

  const results = await Promise.all(fetches);
  drawCurve(results, offsets);
}

function drawCurve(results, offsets) {
  const datasets = [];
  let infoTexts = [];

  results.forEach((res, i) => {
    if (!res || !res.rows?.length) return;
    const offset = offsets[i];
    const cfg    = CURVE_COLORS[offset] || { line: '#8b93a8', label: `${offset}일전` };
    const rows   = res.rows.filter(r => r.remain_year != null && r.ytm != null);

    datasets.push({
      label:        cfg.label + ' (' + res.date + ')',
      data:         rows.map(r => ({ x: +r.remain_year, y: +r.ytm })),
      borderColor:  cfg.line,
      borderWidth:  offset === 0 ? 2 : 1.2,
      pointRadius:  offset === 0 ? 3 : 2,
      pointHoverRadius: 5,
      tension:      0.3,
      spanGaps:     true,
      fill:         false,
    });
    infoTexts.push(`${cfg.label}: ${res.date}  n=${res.count}`);
  });

  document.getElementById('curveInfo').textContent = infoTexts.join('   |   ');

  if (curveChartInst) {
    curveChartInst.data.datasets = datasets;
    curveChartInst.update('none');
    return;
  }

  const canvas = document.getElementById('curveChart');
  curveChartInst = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'nearest', axis: 'x', intersect: false },
      plugins: {
        legend: {
          display: true,
          labels: { color: '#8b93a8', font: { size: 10 }, boxWidth: 20, padding: 10 },
        },
        tooltip: {
          backgroundColor: '#181c27', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
          titleColor: '#8b93a8', bodyColor: '#e8eaf0', padding: 8,
          callbacks: {
            title: items => `잔존 ${items[0]?.parsed.x?.toFixed(2)}년`,
            label: c => {
              const dp = c.dataset.data[c.dataIndex];
              const nick = results[c.datasetIndex]?.rows
                ?.find(r => Math.abs(+r.remain_year - dp.x) < 0.01)?.label ?? '';
              return ` ${c.dataset.label.split(' ')[0]}: ${dp.y?.toFixed(4)}%  ${nick}`;
            },
          },
        },
      },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: '잔존만기 (년)', color: '#555e75', font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { font: { size: 10 }, color: '#555e75' },
        },
        y: {
          title: { display: true, text: 'YTM (%)', color: '#555e75', font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { font: { size: 10 }, color: '#555e75', callback: v => v.toFixed(2) + '%' },
        },
      },
    },
  });
}

// ══════════════════════════════════════════════════════════════
//  검색 (대형 차트)
// ══════════════════════════════════════════════════════════════
function onSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) { hideDropdown(); return; }
  searchTimer = setTimeout(() => fetchSearch(val.trim()), 280);
}

async function fetchSearch(q) {
  try {
    const d = await apiGet(`/ktb/search?q=${encodeURIComponent(q)}`);
    renderDropdown(d.results || []);
  } catch { hideDropdown(); }
}

function renderDropdown(results) {
  const dd = document.getElementById('searchDropdown');
  if (!results.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = '';
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'search-item';
    const ytmStr  = r.ytm        != null ? (+r.ytm).toFixed(3) + '%' : '';
    const remStr  = r.remain_year != null ? (+r.remain_year).toFixed(1) + 'Y' : '';
    // label을 primary 식별자로, bond_name 보조 표시
    const nameStr = r.bond_name && r.bond_name !== r.label ? r.bond_name : '';
    div.innerHTML = `
      <span class="si-nick">${r.label ?? ''}</span>
      <span class="si-name">${nameStr}</span>
      <span class="si-meta">${r.category ?? ''}  ${remStr}  ${ytmStr}</span>`;
    div.onclick = () => {
      document.getElementById('searchInput').value        = r.label;
      document.getElementById('searchInput').dataset.label = r.label;
      hideDropdown();
      loadBigChart(r.label);
    };
    dd.appendChild(div);
  });
  dd.style.display = 'block';
  dropFocusIdx = -1;
}

function hideDropdown() { document.getElementById('searchDropdown').style.display = 'none'; }

function onKeyDown(e) {
  const items = document.querySelectorAll('.search-item');
  if (!items.length) return;
  if      (e.key === 'ArrowDown')  { e.preventDefault(); dropFocusIdx = Math.min(dropFocusIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp')    { e.preventDefault(); dropFocusIdx = Math.max(dropFocusIdx - 1, 0); }
  else if (e.key === 'Enter' && dropFocusIdx >= 0) { e.preventDefault(); items[dropFocusIdx].click(); return; }
  else if (e.key === 'Escape')     { hideDropdown(); return; }
  items.forEach((el, i) => el.classList.toggle('focused', i === dropFocusIdx));
}

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideDropdown(); });

// ── 대형 차트 ─────────────────────────────────────────────────
async function loadBigChart(label) {
  if (!label) return;
  try {
    const d = await apiGet(`/ktb/series?label=${encodeURIComponent(label)}&days=${currentDays}`);
    const rows = d.rows || [];
    if (!rows.length) return;

    const labels = rows.map(r => r.price_date?.slice(0, 10));
    const values = rows.map(r => r.ytm != null ? +r.ytm : null);
    const last   = values.filter(v => v != null).at(-1);
    const prev   = values.filter(v => v != null).at(-2);
    const chg    = last != null && prev != null ? last - prev : null;
    const firstRow = rows[0];

    document.getElementById('bigTitle').textContent =
      `${label}  ${firstRow?.bond_name && firstRow.bond_name !== label ? firstRow.bond_name : ''}`;
    document.getElementById('bigMeta').textContent =
      `${firstRow?.category ?? ''}  |  잔존 ${rows.at(-1)?.remain_year != null ? (+rows.at(-1).remain_year).toFixed(1) + 'Y' : ''}`;
    document.getElementById('bigVal').innerHTML = last != null
      ? `<span style="color:var(--t1);">${last.toFixed(4)}%</span>`
      + (chg != null
          ? `<span style="font-size:11px;margin-left:6px;color:${chg > 0 ? 'var(--red)' : chg < 0 ? 'var(--blue)' : 'var(--t3)'};">`
            + `${chg > 0 ? '+' : ''}${(chg * 100).toFixed(1)}bp</span>`
          : '')
      : '';

    document.getElementById('bigChartCard').style.display = 'block';

    const ds = {
      data: values, borderColor: '#4a9eff', borderWidth: 1.8,
      pointRadius: 0, pointHoverRadius: 3, tension: 0.1, spanGaps: true,
    };
    if (bigChartInst) {
      bigChartInst.data.labels = labels;
      bigChartInst.data.datasets[0] = ds;
      bigChartInst.update('none');
    } else {
      bigChartInst = new Chart(document.getElementById('bigChart').getContext('2d'), {
        type: 'line',
        data: { labels, datasets: [ds] },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#181c27', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
              titleColor: '#8b93a8', bodyColor: '#e8eaf0', padding: 9,
              callbacks: { label: c => `  ${label}: ${c.parsed.y?.toFixed(4) ?? '—'}%` },
            },
          },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { font: { size: 10 }, color: '#555e75', maxTicksLimit: 10, maxRotation: 0 } },
            y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { font: { size: 10 }, color: '#555e75', callback: v => v.toFixed(2) + '%' } },
          },
        },
      });
    }
  } catch (e) { console.error('bigChart', e); }
}

// ══════════════════════════════════════════════════════════════
//  미니 차트 전체 로드 — ktb/multi_label_series 단일 호출
// ══════════════════════════════════════════════════════════════
async function loadAllMini() {
  try {
    const data = await apiGet(
      `/ktb/multi_label_series?labels=${encodeURIComponent(ALL_LABELS.join(','))}&days=${currentDays}`
    );

    // series 키 = label 그대로 (예: 'CD', '한국기준금리', '3년지표', 'IRS3년' …)
    // 각 값: [{price_date, ytm}] → {date, value} 로 정규화
    const series = {};
    Object.entries(data.series || {}).forEach(([lbl, rows]) => {
      series[lbl] = rows.map(r => ({ date: r.price_date, value: r.ytm != null ? +r.ytm : null }));
    });

    SECTIONS.forEach(sec => {
      const row = document.getElementById(sec.rowId);
      row.innerHTML = '';
      sec.charts.forEach(cfg => {
        row.appendChild(buildMiniCard(cfg, cfg.formula(series)));
      });
    });
  } catch (e) {
    SECTIONS.forEach(sec => {
      const row = document.getElementById(sec.rowId);
      row.innerHTML = '';
      sec.charts.forEach(cfg => {
        const card = document.createElement('div');
        card.className = 'mini-card';
        card.innerHTML = `<div class="mini-title">${cfg.title}</div>
          <div class="empty-mini" style="color:var(--red);font-size:10px;">${e.message}</div>`;
        row.appendChild(card);
      });
    });
  }
}

// ── 미니 카드 빌드 ─────────────────────────────────────────────
function buildMiniCard(cfg, pts) {
  const card = document.createElement('div');
  card.className = 'mini-card';

  const valid = pts.filter(p => p.value != null);
  const last  = valid.at(-1)?.value;
  const prev  = valid.at(-2)?.value;
  const chg   = last != null && prev != null ? last - prev : null;
  const isPct = cfg.unit === '%';

  const valStr = last != null
    ? `${last.toFixed(isPct ? 3 : 1)}${isPct ? '%' : 'bp'}` : '—';
  const chgStr = chg != null
    ? `${chg > 0 ? '+' : ''}${(isPct ? chg * 100 : chg).toFixed(1)}bp` : '';
  const chgCol = chg == null ? 'var(--t3)' : chg > 0 ? 'var(--red)' : 'var(--blue)';

  card.innerHTML = `
    <div class="mini-card-hdr">
      <span class="mini-title">${cfg.title}</span>
      <div>
        <span class="mini-val" style="color:${cfg.color};">${valStr}</span>
        <span class="mini-chg" style="color:${chgCol};">${chgStr}</span>
      </div>
    </div>
    <div style="position:relative;height:90px;"><canvas id="mini_${cfg.id}"></canvas></div>`;

  setTimeout(() => drawMiniChart(cfg, pts), 0);
  return card;
}

function drawMiniChart(cfg, pts) {
  const canvas = document.getElementById(`mini_${cfg.id}`);
  if (!canvas) return;
  if (miniCharts[cfg.id]) { miniCharts[cfg.id].destroy(); }

  miniCharts[cfg.id] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: pts.map(p => p.date?.slice(0, 10) ?? ''),
      datasets: [{
        data: pts.map(p => p.value != null ? p.value : null),
        borderColor: cfg.color, borderWidth: 1.2,
        pointRadius: 0, tension: 0.15, spanGaps: true,
        fill: true, backgroundColor: cfg.color + '12',
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#181c27', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
          titleColor: '#8b93a8', bodyColor: '#e8eaf0', padding: 7,
          callbacks: {
            title: items => items[0]?.label ?? '',
            label: c => ` ${cfg.title}: ${c.parsed.y != null ? c.parsed.y.toFixed(cfg.unit === '%' ? 3 : 1) + cfg.unit : '—'}`,
          },
        },
      },
      scales: {
        x: { display: false },
        y: {
          display: true, grid: { color: 'rgba(255,255,255,.03)' },
          ticks: { font: { size: 9 }, color: '#555e75', maxTicksLimit: 3, callback: v => v.toFixed(1) },
          border: { display: false },
        },
      },
    },
  });
}

// ══════════════════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════════════════
async function init() {
  checkConn();
  loadCategories();
  loadCurve();
  loadAllMini();
}

init();
</script>
