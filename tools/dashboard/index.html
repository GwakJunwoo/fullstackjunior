<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>금리 대시보드 — 금리 도구 모음</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    /* ── 검색 ── */
    .search-wrap { position: relative; max-width: 360px; }
    .search-input {
      width: 100%; background: var(--s2); border: .5px solid var(--bd2);
      border-radius: var(--rs); color: var(--t1); font-size: 13px;
      padding: 8px 12px; outline: none; transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--s2); border: .5px solid var(--bd2); border-radius: var(--rs);
      z-index: 100; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .search-item {
      padding: 8px 12px; cursor: pointer; font-size: 12px; color: var(--t1);
      transition: background .1s;
    }
    .search-item:hover, .search-item.focused { background: var(--s3); }

    /* ── 기간 선택 ── */
    .period-btns { display: flex; gap: 4px; }
    .period-btn {
      background: none; border: .5px solid var(--bd2); border-radius: var(--rs);
      color: var(--t3); font-size: 11px; cursor: pointer; padding: 3px 9px;
      transition: all .15s;
    }
    .period-btn:hover { color: var(--t1); border-color: var(--bd2); }
    .period-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(74,158,255,.1); }

    /* ── 대형 검색 차트 ── */
    .big-chart-card {
      background: var(--s1); border: .5px solid var(--bd); border-radius: var(--r);
      padding: 1rem 1.125rem; margin-bottom: 16px;
    }
    .big-chart-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
    }
    .big-chart-title { font-size: 13px; font-weight: 600; color: var(--t1); }
    .big-chart-meta  { font-size: 10px; color: var(--t3); }

    /* ── 섹션 미니 차트 그리드 ── */
    .mini-section { margin-bottom: 20px; }
    .mini-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: .7px;
      color: var(--t3); text-transform: uppercase; margin-bottom: 8px;
    }
    .mini-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .mini-card {
      background: var(--s1); border: .5px solid var(--bd); border-radius: var(--r);
      padding: .75rem .875rem .5rem;
    }
    .mini-card-hdr {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 6px;
    }
    .mini-title { font-size: 10px; font-weight: 600; color: var(--t3); letter-spacing: .3px; }
    .mini-val   { font-size: 14px; font-weight: 600; letter-spacing: -.3px; }
    .mini-chg   { font-size: 10px; margin-left: 4px; }

    .empty-mini {
      display: flex; align-items: center; justify-content: center;
      height: 90px; font-size: 10px; color: var(--t3);
    }

    @media (max-width: 640px) { .mini-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 400px) { .mini-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">

  <nav class="nav">
    <a href="/" class="nav-brand">금리 도구 모음</a>
    <div class="nav-links">
      <a href="/tools/cd91/"       class="nav-link">CD91 전망</a>
      <a href="/tools/dashboard/"  class="nav-link active">금리 대시보드</a>
      <a href="/tools/supply/"     class="nav-link">시장 수급</a>
      <a href="/tools/db/"         class="nav-link">DB 탐색</a>
    </div>
  </nav>

  <div class="hdr" style="margin-bottom:1rem;">
    <h1>금리 대시보드</h1>
    <p>rates 테이블 — 금리 레벨 · 스프레드 · 커브</p>
  </div>

  <!-- 검색 + 기간 -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text"
             placeholder="종목 검색 (alias, 예: 국고10년, CD91...)"
             oninput="onSearch(this.value)"
             onkeydown="onKeyDown(event)"
             autocomplete="off">
      <div class="search-dropdown" id="searchDropdown" style="display:none;"></div>
    </div>
    <div class="period-btns" id="periodBtns">
      <button class="period-btn" onclick="setPeriod(30)">1M</button>
      <button class="period-btn" onclick="setPeriod(90)">3M</button>
      <button class="period-btn" onclick="setPeriod(180)">6M</button>
      <button class="period-btn active" onclick="setPeriod(365)">1Y</button>
      <button class="period-btn" onclick="setPeriod(730)">2Y</button>
      <button class="period-btn" onclick="setPeriod(1825)">5Y</button>
      <button class="period-btn" onclick="setPeriod(0)">전체</button>
    </div>
  </div>

  <!-- 대형 검색 차트 -->
  <div class="big-chart-card" id="bigChartCard" style="display:none;">
    <div class="big-chart-hdr">
      <div>
        <span class="big-chart-title" id="bigChartTitle">—</span>
        <span class="big-chart-meta" id="bigChartMeta" style="margin-left:8px;"></span>
      </div>
      <div id="bigChartVal" style="font-size:18px;font-weight:700;letter-spacing:-.5px;"></div>
    </div>
    <div style="position:relative;height:300px;">
      <canvas id="bigChart"></canvas>
    </div>
  </div>

  <!-- ── 섹션 1: 레벨 + CD 스프레드 ── -->
  <div class="mini-section">
    <div class="mini-section-label">레벨 · CD 스프레드</div>
    <div class="mini-grid" id="row-levels"></div>
  </div>

  <!-- ── 섹션 2: 커브 스프레드 ── -->
  <div class="mini-section">
    <div class="mini-section-label">커브 스프레드</div>
    <div class="mini-grid" id="row-spreads"></div>
  </div>

  <!-- ── 섹션 3: 버터플라이 ── -->
  <div class="mini-section">
    <div class="mini-section-label">버터플라이</div>
    <div class="mini-grid" id="row-butterfly"></div>
  </div>

  <!-- ── 섹션 4: IRS ── -->
  <div class="mini-section">
    <div class="mini-section-label">IRS 스프레드</div>
    <div class="mini-grid" id="row-irs"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/assets/js/api.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG — alias 이름이 다를 경우 여기만 수정
// ══════════════════════════════════════════════════════════════
const ALIAS = {
  기준금리: '기준금리',
  CD91:     'CD91',
  KTB2:     '국고2년',
  KTB3:     '국고3년',
  KTB5:     '국고5년',
  KTB10:    '국고10년',
  KTB20:    '국고20년',
  KTB30:    '국고30년',
  IRS1:     'IRS1년',
  IRS3:     'IRS3년',
  IRS5:     'IRS5년',
  IRS10:    'IRS10년',
};

// 차트 섹션 정의
// type: 'single' | 'multi' | 'derived'
// formula(seriesObj): seriesObj = {alias: [{ date, value }]}  → 단일 derived 시리즈 반환
const SECTIONS = [
  {
    rowId: 'row-levels',
    charts: [
      {
        id: 'cd_spread', title: 'CD91 − 기준금리', unit: 'bp', color: '#4a9eff',
        aliases: [ALIAS.CD91, ALIAS.기준금리],
        formula: s => diff(s, ALIAS.CD91, ALIAS.기준금리, 100),
      },
      {
        id: 'ktb3', title: '국고 3년', unit: '%', color: '#34d399',
        aliases: [ALIAS.KTB3],
        formula: s => single(s, ALIAS.KTB3),
      },
      {
        id: 'ktb10', title: '국고 10년', unit: '%', color: '#fbbf24',
        aliases: [ALIAS.KTB10],
        formula: s => single(s, ALIAS.KTB10),
      },
    ],
  },
  {
    rowId: 'row-spreads',
    charts: [
      {
        id: 'sp_5_3', title: '5Y − 3Y', unit: 'bp', color: '#4a9eff',
        aliases: [ALIAS.KTB5, ALIAS.KTB3],
        formula: s => diff(s, ALIAS.KTB5, ALIAS.KTB3, 100),
      },
      {
        id: 'sp_10_3', title: '10Y − 3Y', unit: 'bp', color: '#a78bfa',
        aliases: [ALIAS.KTB10, ALIAS.KTB3],
        formula: s => diff(s, ALIAS.KTB10, ALIAS.KTB3, 100),
      },
      {
        id: 'sp_30_10', title: '30Y − 10Y', unit: 'bp', color: '#f87171',
        aliases: [ALIAS.KTB30, ALIAS.KTB10],
        formula: s => diff(s, ALIAS.KTB30, ALIAS.KTB10, 100),
      },
    ],
  },
  {
    rowId: 'row-butterfly',
    charts: [
      {
        id: 'bf_3510', title: '3-5-10 BF', unit: 'bp', color: '#34d399',
        aliases: [ALIAS.KTB3, ALIAS.KTB5, ALIAS.KTB10],
        // 3년 숏 / 5년 롱 2배 / 10년 숏 → 2*5Y - 3Y - 10Y
        formula: s => butterfly(s, ALIAS.KTB3, ALIAS.KTB5, ALIAS.KTB10),
      },
      {
        id: 'bf_2510', title: '2-5-10 BF', unit: 'bp', color: '#fbbf24',
        aliases: [ALIAS.KTB2, ALIAS.KTB5, ALIAS.KTB10],
        formula: s => butterfly(s, ALIAS.KTB2, ALIAS.KTB5, ALIAS.KTB10),
      },
      {
        id: 'bf_102030', title: '10-20-30 BF', unit: 'bp', color: '#fb923c',
        aliases: [ALIAS.KTB10, ALIAS.KTB20, ALIAS.KTB30],
        formula: s => butterfly(s, ALIAS.KTB10, ALIAS.KTB20, ALIAS.KTB30),
      },
    ],
  },
  {
    rowId: 'row-irs',
    charts: [
      {
        id: 'irs3_1', title: 'IRS 3Y − 1Y', unit: 'bp', color: '#38bdf8',
        aliases: [ALIAS.IRS3, ALIAS.IRS1],
        formula: s => diff(s, ALIAS.IRS3, ALIAS.IRS1, 100),
      },
      {
        id: 'irs5_3', title: 'IRS 5Y − 3Y', unit: 'bp', color: '#e879f9',
        aliases: [ALIAS.IRS5, ALIAS.IRS3],
        formula: s => diff(s, ALIAS.IRS5, ALIAS.IRS3, 100),
      },
      {
        id: 'irs10_5', title: 'IRS 10Y − 5Y', unit: 'bp', color: '#4ade80',
        aliases: [ALIAS.IRS10, ALIAS.IRS5],
        formula: s => diff(s, ALIAS.IRS10, ALIAS.IRS5, 100),
      },
    ],
  },
];

// ══════════════════════════════════════════════════════════════
//  공식 헬퍼
// ══════════════════════════════════════════════════════════════
function single(s, a) {
  return (s[a] || []).map(p => ({ date: p.date, value: p.value != null ? +p.value : null }));
}
function diff(s, a, b, mult = 1) {
  const ma = toMap(s[a]); const mb = toMap(s[b]);
  const dates = [...new Set([...Object.keys(ma), ...Object.keys(mb)])].sort();
  return dates.map(d => ({
    date: d,
    value: ma[d] != null && mb[d] != null ? +((ma[d] - mb[d]) * mult).toFixed(4) : null,
  }));
}
function butterfly(s, wing1, body, wing2, mult = 100) {
  const mw1 = toMap(s[wing1]); const mb = toMap(s[body]); const mw2 = toMap(s[wing2]);
  const dates = [...new Set([...Object.keys(mw1), ...Object.keys(mb), ...Object.keys(mw2)])].sort();
  return dates.map(d => ({
    date: d,
    value: mw1[d] != null && mb[d] != null && mw2[d] != null
      ? +((2 * mb[d] - mw1[d] - mw2[d]) * mult).toFixed(4) : null,
  }));
}
function toMap(arr) {
  if (!arr) return {};
  return Object.fromEntries(arr.map(p => [p.date?.slice(0, 10), p.value != null ? +p.value : null]));
}

// ══════════════════════════════════════════════════════════════
//  상태
// ══════════════════════════════════════════════════════════════
let currentDays   = 365;
let bigChart      = null;
let miniCharts    = {};   // id → Chart instance
let searchTimer   = null;
let dropFocusIdx  = -1;

// ══════════════════════════════════════════════════════════════
//  기간 선택
// ══════════════════════════════════════════════════════════════
function setPeriod(days) {
  currentDays = days;
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', +b.textContent === (
      days === 30 ? 1 : days === 90 ? 3 : days === 180 ? 6 :
      days === 365 ? 1 : days === 730 ? 2 : days === 1825 ? 5 : -1
    ) || (days === 0 && b.textContent === '전체') || (days === 365 && b.textContent === '1Y'));
  });
  // 간단하게: 해당 버튼에 active
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  loadAllMini();
  if (bigChart && document.getElementById('searchInput').value)
    loadBigChart(document.getElementById('searchInput').dataset.alias);
}

// ══════════════════════════════════════════════════════════════
//  검색 (대형 차트)
// ══════════════════════════════════════════════════════════════
function onSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) { hideDropdown(); return; }
  searchTimer = setTimeout(() => fetchSearch(val.trim()), 280);
}

async function fetchSearch(q) {
  try {
    const data = await apiGet(`/rates/search?q=${encodeURIComponent(q)}`);
    renderDropdown(data.results || []);
  } catch { hideDropdown(); }
}

function renderDropdown(results) {
  const dd = document.getElementById('searchDropdown');
  if (!results.length) { hideDropdown(); return; }
  dd.innerHTML = '';
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.textContent = r.alias;
    div.onclick = () => {
      document.getElementById('searchInput').value = r.alias;
      document.getElementById('searchInput').dataset.alias = r.alias;
      hideDropdown();
      loadBigChart(r.alias);
    };
    dd.appendChild(div);
  });
  dd.style.display = 'block';
  dropFocusIdx = -1;
}

function hideDropdown() {
  document.getElementById('searchDropdown').style.display = 'none';
}

function onKeyDown(e) {
  const items = document.querySelectorAll('.search-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); dropFocusIdx = Math.min(dropFocusIdx+1, items.length-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); dropFocusIdx = Math.max(dropFocusIdx-1, 0); }
  else if (e.key === 'Enter' && dropFocusIdx >= 0) { e.preventDefault(); items[dropFocusIdx].click(); return; }
  else if (e.key === 'Escape') { hideDropdown(); return; }
  items.forEach((el, i) => el.classList.toggle('focused', i === dropFocusIdx));
}

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideDropdown(); });

// ── 대형 차트 ─────────────────────────────────────────────────
async function loadBigChart(alias) {
  if (!alias) return;
  try {
    const data = await apiGet(`/rates/series?aliases=${encodeURIComponent(alias)}&days=${currentDays}`);
    const pts = (data.series[alias] || []);
    if (!pts.length) return;

    const labels = pts.map(p => p.date?.slice(0, 10));
    const values = pts.map(p => p.value != null ? +p.value : null);
    const last   = values.filter(v => v != null).at(-1);
    const prev   = values.filter(v => v != null).at(-2);
    const chg    = last != null && prev != null ? (last - prev) : null;

    document.getElementById('bigChartTitle').textContent = alias;
    document.getElementById('bigChartMeta').textContent  =
      `${pts[0]?.date?.slice(0,10)} ~ ${pts.at(-1)?.date?.slice(0,10)}  |  ${pts.length}일`;
    document.getElementById('bigChartVal').innerHTML = last != null
      ? `<span style="color:var(--t1);">${last.toFixed(4)}%</span>`
      + (chg != null ? `<span style="font-size:11px;margin-left:6px;color:${chg>0?'var(--red)':chg<0?'var(--blue)':'var(--t3)'};">`
          + `${chg > 0 ? '+' : ''}${(chg*100).toFixed(1)}bp</span>` : '') : '';

    document.getElementById('bigChartCard').style.display = 'block';

    const dataset = {
      data: values, borderColor: '#4a9eff', borderWidth: 1.8,
      pointRadius: 0, pointHoverRadius: 3, tension: 0.1, spanGaps: true,
    };
    if (bigChart) {
      bigChart.data.labels      = labels;
      bigChart.data.datasets[0] = dataset;
      bigChart.update('none');
    } else {
      bigChart = new Chart(document.getElementById('bigChart').getContext('2d'), {
        type: 'line',
        data: { labels, datasets: [dataset] },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#181c27', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
              titleColor: '#8b93a8', bodyColor: '#e8eaf0', padding: 9,
              callbacks: { label: c => `  ${alias}: ${c.parsed.y?.toFixed(4) ?? '—'}%` },
            },
          },
          scales: {
            x: { grid: { color:'rgba(255,255,255,.04)' }, ticks: { font:{size:10}, color:'#555e75', maxTicksLimit:10, maxRotation:0 } },
            y: { grid: { color:'rgba(255,255,255,.04)' }, ticks: { font:{size:10}, color:'#555e75', callback: v => v.toFixed(2)+'%' } },
          },
        },
      });
    }
  } catch(e) { console.error('bigChart error', e); }
}

// ══════════════════════════════════════════════════════════════
//  미니 차트 전체 로드
// ══════════════════════════════════════════════════════════════
async function loadAllMini() {
  // 모든 섹션의 distinct aliases 수집
  const allAliases = [...new Set(SECTIONS.flatMap(sec => sec.charts.flatMap(c => c.aliases)))];
  try {
    const data = await apiGet(`/rates/series?aliases=${encodeURIComponent(allAliases.join(','))}&days=${currentDays}`);
    const series = data.series;
    SECTIONS.forEach(sec => {
      const row = document.getElementById(sec.rowId);
      row.innerHTML = '';
      sec.charts.forEach(cfg => {
        const pts = cfg.formula(series);
        row.appendChild(buildMiniCard(cfg, pts));
      });
    });
  } catch(e) {
    SECTIONS.forEach(sec => {
      const row = document.getElementById(sec.rowId);
      row.innerHTML = '';
      sec.charts.forEach(cfg => {
        const card = document.createElement('div');
        card.className = 'mini-card';
        card.innerHTML = `<div class="mini-title">${cfg.title}</div><div class="empty-mini" style="color:var(--red);font-size:10px;">${e.message}</div>`;
        row.appendChild(card);
      });
    });
  }
}

// ── 미니 카드 빌드 ─────────────────────────────────────────────
function buildMiniCard(cfg, pts) {
  const card = document.createElement('div');
  card.className = 'mini-card';

  const valid  = pts.filter(p => p.value != null);
  const last   = valid.at(-1)?.value;
  const prev   = valid.at(-2)?.value;
  const chg    = last != null && prev != null ? last - prev : null;
  const isPercent = cfg.unit === '%';

  const valStr = last != null
    ? `${last.toFixed(isPercent ? 3 : 1)}${isPercent ? '%' : 'bp'}`
    : '—';
  const chgStr = chg != null
    ? `${chg > 0 ? '+' : ''}${(isPercent ? chg * 100 : chg).toFixed(1)}${isPercent ? 'bp' : 'bp'}`
    : '';
  const chgColor = chg == null ? 'var(--t3)' : chg > 0 ? 'var(--red)' : chg < 0 ? 'var(--blue)' : 'var(--t3)';

  card.innerHTML = `
    <div class="mini-card-hdr">
      <span class="mini-title">${cfg.title}</span>
      <div>
        <span class="mini-val" style="color:${cfg.color};">${valStr}</span>
        <span class="mini-chg" style="color:${chgColor};">${chgStr}</span>
      </div>
    </div>
    <div style="position:relative;height:90px;">
      <canvas id="mini_${cfg.id}"></canvas>
    </div>`;

  // 차트는 다음 tick에 그려야 캔버스 크기가 잡힘
  setTimeout(() => drawMiniChart(cfg, pts), 0);
  return card;
}

function drawMiniChart(cfg, pts) {
  const canvas = document.getElementById(`mini_${cfg.id}`);
  if (!canvas) return;
  if (miniCharts[cfg.id]) { miniCharts[cfg.id].destroy(); }

  const labels = pts.map(p => p.date?.slice(0, 10) ?? '');
  const values = pts.map(p => p.value != null ? p.value : null);

  miniCharts[cfg.id] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values, borderColor: cfg.color, borderWidth: 1.2,
        pointRadius: 0, tension: 0.15, spanGaps: true,
        fill: true,
        backgroundColor: cfg.color + '12',
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#181c27', borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
          titleColor: '#8b93a8', bodyColor: '#e8eaf0', padding: 7,
          callbacks: {
            title: items => items[0]?.label ?? '',
            label: c => ` ${cfg.title}: ${c.parsed.y != null ? c.parsed.y.toFixed(cfg.unit==='%'?3:1) + cfg.unit : '—'}`,
          },
        },
      },
      scales: {
        x: { display: false },
        y: {
          display: true,
          grid: { color: 'rgba(255,255,255,.03)' },
          ticks: {
            font: { size: 9 }, color: '#555e75', maxTicksLimit: 3,
            callback: v => v.toFixed(1),
          },
          border: { display: false },
        },
      },
    },
  });
}

// ══════════════════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════════════════
loadAllMini();
</script>
