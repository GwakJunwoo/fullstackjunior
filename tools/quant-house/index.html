<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bond Quant House — 다전략 운용</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .panel-wrap { background:var(--s1); border:.5px solid var(--bd); border-radius:var(--r); padding:1rem 1.125rem; margin-bottom:12px; }
    .ctrl-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--t3); display:inline-block; margin-right:6px; }
    .conn-dot.ok { background:var(--green); box-shadow:0 0 5px rgba(52,211,153,.45); }
    .conn-dot.err { background:var(--red); }
    .btn { background:none; border:.5px solid var(--bd2); border-radius:var(--rs); color:var(--t2); font-size:12px; cursor:pointer; padding:6px 11px; transition:all .15s; }
    .btn:hover { border-color:var(--blue); color:var(--blue); }
    .status { font-size:11px; color:var(--t3); }

    .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:12px; }
    .metric { background:var(--s1); border:.5px solid var(--bd); border-radius:var(--rs); padding:9px 11px; }
    .metric .ml { font-size:9px; color:var(--t3); margin-bottom:3px; letter-spacing:.3px; text-transform:uppercase; }
    .metric .mv { font-size:18px; font-weight:600; letter-spacing:-.3px; }
    .metric.neg .mv { color:var(--red); }

    .cat-title { font-size:11px; color:var(--t3); letter-spacing:.4px; text-transform:uppercase; margin:18px 0 8px; }
    .strat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .strat-card { background:var(--s1); border:.5px solid var(--bd); border-radius:var(--r); padding:13px 14px; cursor:pointer; transition:border-color .15s,background .15s; position:relative; }
    .strat-card:hover { border-color:var(--bd2); background:var(--s2); }
    .strat-name { font-size:13px; font-weight:600; color:var(--t1); margin-bottom:3px; }
    .strat-concept { font-size:11px; color:var(--t3); line-height:1.55; margin-bottom:9px; min-height:32px; }
    .strat-row { display:flex; gap:14px; font-size:11px; color:var(--t2); flex-wrap:wrap; }
    .strat-row b { color:var(--t1); font-weight:600; }
    .strat-lineage { font-size:10px; color:var(--t3); margin-top:8px; }
    .vbadge { position:absolute; top:11px; right:12px; font-size:9px; font-weight:600; letter-spacing:.4px; padding:2px 7px; border-radius:3px; text-transform:uppercase; }
    .v-PASS { background:rgba(52,211,153,.12); color:var(--green); border:.5px solid rgba(52,211,153,.25); }
    .v-WARN { background:rgba(251,191,36,.12); color:#fbbf24; border:.5px solid rgba(251,191,36,.25); }
    .v-VIOLATION { background:rgba(248,113,113,.12); color:var(--red); border:.5px solid rgba(248,113,113,.28); }
    .v-none { background:rgba(255,255,255,.04); color:var(--t3); border:.5px solid var(--bd); }
    .itag { font-size:9px; font-weight:600; letter-spacing:.3px; padding:1px 6px; border-radius:3px; text-transform:uppercase; margin-left:6px; vertical-align:middle; }
    .i-ported { background:rgba(74,158,255,.12); color:var(--blue); border:.5px solid rgba(74,158,255,.28); }
    .i-linked { background:rgba(52,211,153,.12); color:var(--green); border:.5px solid rgba(52,211,153,.28); }
    .i-catalog { background:rgba(255,255,255,.04); color:var(--t3); border:.5px solid var(--bd2); }

    .detail { display:none; }
    .detail.show { display:block; }
    .find-tbl { width:100%; border-collapse:collapse; font-size:11.5px; }
    .find-tbl td { padding:6px 8px; border-bottom:.5px solid var(--bd); vertical-align:top; }
    .find-tbl td:first-child { width:160px; color:var(--t3); }
    .lvl-PASS { color:var(--green); } .lvl-WARN { color:#fbbf24; } .lvl-VIOLATION { color:var(--red); font-weight:600; }
    .blocked-banner { background:rgba(248,113,113,.08); border:.5px solid rgba(248,113,113,.28); color:var(--red); font-size:12px; padding:8px 12px; border-radius:var(--rs); margin-bottom:12px; }
    .vbanner { font-size:11.5px; padding:8px 12px; border-radius:var(--rs); margin-bottom:12px; line-height:1.6; }
    .vbanner.v-ok   { background:rgba(52,211,153,.08); border:.5px solid rgba(52,211,153,.28); color:var(--green); }
    .vbanner.v-warn { background:rgba(251,191,36,.08); border:.5px solid rgba(251,191,36,.28); color:#fbbf24; }
    .vbanner.v-fail { background:rgba(248,113,113,.10); border:.5px solid rgba(248,113,113,.32); color:var(--red); font-weight:600; }
    .vchip { font-size:9px; font-weight:700; letter-spacing:.3px; padding:1px 6px; border-radius:3px; margin-left:6px; }
    .vc-ok { background:rgba(52,211,153,.14); color:var(--green); }
    .vc-warn { background:rgba(251,191,36,.14); color:#fbbf24; }
    .vc-fail { background:rgba(248,113,113,.14); color:var(--red); }
    .tlog tr.leaked td { background:rgba(248,113,113,.10) !important; }
    .tlog tr.leaked td:first-child { box-shadow:inset 3px 0 0 var(--red); }
    .tlog tr.forced td { background:rgba(251,191,36,.06) !important; }
    .leakwarn { color:var(--red); font-weight:700; }
    .flagtag { font-size:8.5px; font-weight:700; padding:1px 5px; border-radius:3px; background:rgba(248,113,113,.16); color:var(--red); }
    .tlog tr.forced .flagtag { background:rgba(251,191,36,.16); color:#fbbf24; }
    .leak-banner { background:rgba(248,113,113,.08); border:.5px solid rgba(248,113,113,.30); color:var(--red); font-size:11px; padding:8px 12px; border-radius:var(--rs); margin:4px 0 10px; line-height:1.6; }
    .sgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .sgrid .s { background:var(--s2); border:.5px solid var(--bd); border-radius:var(--rs); padding:8px 10px; }
    .sgrid .sl { font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; margin-bottom:3px; }
    .sgrid .sv { font-size:15px; font-weight:600; }
    .sgrid .sv.pos { color:var(--green); } .sgrid .sv.neg { color:var(--red); }
    .qchart { position:relative; height:200px; background:var(--s1); border:.5px solid var(--bd); border-radius:var(--rs); padding:8px 10px 6px; margin-bottom:12px; }
    .qchart.sm { height:150px; }
    .tlog-wrap { max-height:340px; overflow:auto; border:.5px solid var(--bd); border-radius:var(--rs); }
    .tlog { width:100%; border-collapse:collapse; font-size:10.5px; white-space:nowrap; }
    .tlog th, .tlog td { padding:5px 8px; text-align:right; border-bottom:.5px solid var(--bd); }
    .tlog th { position:sticky; top:0; background:var(--s2); color:var(--t3); font-size:9px; text-transform:uppercase; letter-spacing:.3px; z-index:1; }
    .tlog td.lt, .tlog th.lt { text-align:left; }
    .tlog .lng { color:var(--green); } .tlog .sht { color:var(--red); }
    .tlog .pp { color:var(--green); } .tlog .pn { color:var(--red); }
    .tlog tr:hover td { background:rgba(255,255,255,.02); }
    .noart { background:var(--s2); border:.5px dashed var(--bd2); border-radius:var(--rs); padding:14px; font-size:11.5px; color:var(--t3); line-height:1.7; }
    /* 아코디언 트리 */
    .acc { border:.5px solid var(--bd); border-radius:var(--r); overflow:hidden; }
    .cat-row { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--s2); cursor:pointer; border-bottom:.5px solid var(--bd); user-select:none; }
    .cat-row:hover { background:var(--s1); }
    .chev { font-size:10px; color:var(--t3); transition:transform .15s; width:10px; display:inline-block; }
    .cat-row.open .chev { transform:rotate(90deg); }
    .cat-nm { font-size:12px; font-weight:700; letter-spacing:.4px; color:var(--t1); }
    .cat-cnt { font-size:10px; color:var(--t3); }
    .cat-sum { margin-left:auto; display:flex; gap:16px; font-size:10.5px; color:var(--t3); }
    .cat-sum b { color:var(--t2); }
    .cat-body { display:none; }
    .cat-body.open { display:block; }
    .srow { display:flex; align-items:center; gap:10px; padding:9px 14px 9px 34px; border-bottom:.5px solid var(--bd); cursor:pointer; background:var(--bg); }
    .srow:hover { background:var(--s1); }
    .srow.sel { background:rgba(74,158,255,.06); }
    .srow:last-child { border-bottom:0; }
    .srow-nm { font-size:12px; font-weight:600; color:var(--t1); }
    .srow-cc { font-size:10.5px; color:var(--t3); max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .srow-r { margin-left:auto; display:flex; gap:14px; align-items:center; font-size:11px; }
    .srow-r .k { color:var(--t3); font-size:9px; text-transform:uppercase; letter-spacing:.3px; }
    .srow-r .val { font-weight:600; }
    .srow-r .col { text-align:right; min-width:54px; }
    .pos { color:var(--green); } .neg { color:var(--red); }
    .abadge { font-size:9px; font-weight:700; letter-spacing:.4px; padding:2px 7px; border-radius:3px; }
    .ab-deployed { background:rgba(52,211,153,.14); color:var(--green); border:.5px solid rgba(52,211,153,.3); }
    .ab-active { background:rgba(74,158,255,.12); color:var(--blue); border:.5px solid rgba(74,158,255,.28); }
    .ab-parked { background:rgba(255,255,255,.04); color:var(--t3); border:.5px solid var(--bd2); }
    .ab-killed { background:rgba(248,113,113,.10); color:var(--red); border:.5px solid rgba(248,113,113,.28); }
    .btn.upd { border-color:rgba(52,211,153,.3); color:var(--green); }
    .btn.upd:hover { background:rgba(52,211,153,.1); }
    .btn.upd[disabled] { opacity:.5; pointer-events:none; }
    /* ── 계층(tier) 배지 — 검증 등급의 1차 시각언어 ── */
    .tier { display:inline-flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:800; letter-spacing:.5px; min-width:34px;
      padding:4px 8px; border-radius:6px; line-height:1; }
    .tier.sm { font-size:11px; min-width:28px; padding:3px 6px; border-radius:5px; }
    .tier-T1 { background:rgba(52,211,153,.16); color:#34d399; border:1px solid rgba(52,211,153,.45); }
    .tier-T2 { background:rgba(74,158,255,.15); color:#4a9eff; border:1px solid rgba(74,158,255,.45); }
    .tier-T3 { background:rgba(251,191,36,.14); color:#fbbf24; border:1px solid rgba(251,191,36,.42); }
    .tier-T4 { background:rgba(255,255,255,.05); color:var(--t2); border:1px solid var(--bd2); }
    .tier-REJECT { background:rgba(248,113,113,.13); color:#f87171; border:1px solid rgba(248,113,113,.45); }
    .tier-none { background:rgba(255,255,255,.03); color:var(--t3); border:1px dashed var(--bd2); }
    /* tier 분포 범례 바 */
    .tierbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
    .tierbar .tl { display:flex; align-items:center; gap:7px; background:var(--s1);
      border:.5px solid var(--bd); border-radius:8px; padding:7px 11px; cursor:pointer;
      transition:border-color .15s, background .15s; }
    .tierbar .tl:hover { border-color:var(--bd2); }
    .tierbar .tl.dim { opacity:.4; }
    .tierbar .tl .nm { font-size:11px; font-weight:700; color:var(--t2); }
    .tierbar .tl .cnt { font-size:13px; font-weight:700; color:var(--t1); }
    .tierbar .tl .dsc { font-size:10px; color:var(--t3); }
    /* tier 섹션 헤더 */
    .tsec { margin:16px 0 9px; display:flex; align-items:center; gap:10px; }
    .tsec .lbl { font-size:12px; font-weight:700; color:var(--t2); letter-spacing:.3px; }
    .tsec .sz { font-size:10px; color:var(--t3); }
    .tsec .ln { flex:1; height:1px; background:var(--bd); }
    /* 컴팩트 전략 행 (텍스트 최소화) */
    .crow { display:flex; align-items:center; gap:12px; padding:11px 13px;
      background:var(--s1); border:.5px solid var(--bd); border-radius:var(--r);
      margin-bottom:7px; cursor:pointer; transition:border-color .15s, background .15s; }
    .crow:hover { border-color:var(--bd2); background:var(--s2); }
    .crow.sel { border-color:var(--blue); background:rgba(74,158,255,.05); }
    .crow .nm { font-size:13px; font-weight:600; color:var(--t1); }
    .crow .cat { font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:.3px;
      background:var(--s2); border:.5px solid var(--bd); border-radius:4px; padding:1px 6px; }
    .crow .stat { font-size:10px; }
    .crow .spacer { margin-left:auto; }
    .crow .num { text-align:right; min-width:56px; }
    .crow .num .k { font-size:8.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; }
    .crow .num .v { font-size:13px; font-weight:700; }
    .crow .num .v.pos { color:var(--green); } .crow .num .v.neg { color:var(--red); }
    .crow .szlbl { font-size:10px; color:var(--t3); min-width:74px; text-align:right; }
    .sdot { width:7px; height:7px; border-radius:50%; display:inline-block; }
    .sdot.deployed { background:var(--green); box-shadow:0 0 5px rgba(52,211,153,.5); }
    .sdot.active { background:var(--blue); }
    .sdot.parked { background:var(--t3); }
    .sdot.killed, .sdot.proposed { background:var(--red); opacity:.6; }
    .tier-detail-head { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    @media (max-width:760px){ .crow .cat, .crow .num.sharpe { display:none; } }
    .tlog tr.trow { cursor:pointer; }
    .tlog tr.trow:hover td { background:rgba(74,158,255,.05); }
    .tlog tr.trow.open td { background:rgba(74,158,255,.08); }
    .tdetail td { background:var(--s1) !important; padding:0 !important; }
    .tdwrap { padding:12px 14px; }
    .tdgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
    .tdgrid .s { background:var(--s2); border:.5px solid var(--bd); border-radius:var(--rs); padding:7px 9px; }
    .tdgrid .sl { font-size:9px; color:var(--t3); text-transform:uppercase; margin-bottom:2px; }
    .tdgrid .sv { font-size:12px; font-weight:600; }
    @media (max-width:760px){ .strat-grid{grid-template-columns:1fr;} .metrics{grid-template-columns:1fr 1fr;} .sgrid{grid-template-columns:1fr 1fr;} .srow-cc{display:none;} .srow-r{gap:8px;} .tdgrid{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <span class="nav-brand">Bond Quant House</span>
    <div class="nav-links"><a href="/" class="nav-link">홈</a><a href="/tools/quant-house/" class="nav-link active">다전략 운용</a><a href="/tools/portfolio/" class="nav-link">포트폴리오</a><a href="/tools/regime/" class="nav-link">레짐 모니터</a></div>
  </nav>

  <div class="panel-wrap">
    <div class="ctrl-row">
      <span><span id="dot" class="conn-dot"></span><span id="conn" class="status">연결 확인 중…</span></span>
      <button class="btn" onclick="load()">새로고침</button>
      <button class="btn upd" id="updBtn" onclick="bulkUpdate()">↻ 전체 데이터 업데이트</button>
      <span id="updMsg" class="status"></span>
      <span id="updated" class="status" style="margin-left:auto"></span>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="ml">등록 전략</div><div class="mv" id="m-total">–</div></div>
    <div class="metric"><div class="ml">운영중 (active+deployed)</div><div class="mv" id="m-live">–</div></div>
    <div class="metric"><div class="ml">최고 등급</div><div class="mv" id="m-toptier">–</div></div>
    <div class="metric neg"><div class="ml">헌법 BLOCK</div><div class="mv" id="m-blocked">–</div></div>
  </div>

  <div id="tierbar" class="tierbar"></div>
  <div id="list"></div>

  <div id="detail" class="detail panel-wrap" style="margin-top:14px"></div>
  <div id="tradeDetail" class="panel-wrap" style="display:none;margin-top:12px"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let CACHE = {};
let _charts = [];
function _destroyCharts(){ _charts.forEach(c=>{try{c.destroy()}catch(e){}}); _charts=[]; }
const AXC = '#8b93a8', GRID = 'rgba(255,255,255,.05)';
function _baseOpts(){ return { responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{display:false}, tooltip:{ callbacks:{} } },
  scales:{ x:{ ticks:{color:AXC,font:{size:9},maxTicksLimit:8}, grid:{color:GRID} },
           y:{ ticks:{color:AXC,font:{size:9}}, grid:{color:GRID} } } }; }
let _TPATH = {};   // 거래 상세 캐시 (전략별)

async function toggleTrade(strategy, ti, rowEl){
  const panel = document.getElementById('tradeDetail');
  // 같은 행 다시 클릭 → 패널 닫기 (토글)
  if (rowEl.classList.contains('open')){
    rowEl.classList.remove('open');
    panel.style.display='none'; panel.innerHTML=''; return;
  }
  document.querySelectorAll('tr.trow.open').forEach(e=>e.classList.remove('open'));
  rowEl.classList.add('open');
  panel.style.display='block';
  panel.innerHTML = '<div class="tdwrap" id="td_box">불러오는 중…</div>';
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
  let r;
  try { r = await apiGet('/quant-house/trade-path?strategy='+encodeURIComponent(strategy)+'&i='+ti); }
  catch(e){ document.getElementById('td_box').innerHTML='<div class="status">상세 조회 실패: '+(e.detail||e.message)+'</div>'; return; }
  renderTradeDetail(document.getElementById('td_box'), r, ti);
}

function renderTradeDetail(box, r, ti){
  const t=r.trade||{};
  const A=r.analytics||{};
  const G=(l,v)=> v==null?'':'<div class="s"><div class="sl">'+l+'</div><div class="sv">'+v+'</div></div>';
  let head =
    '<div class="status" style="margin-bottom:8px">'+
    '<b>'+(t.entry_date||'')+' → '+(t.exit_date||'')+'</b> · '+
    (t.days_held!=null?t.days_held+'영업일 보유':'')+' · 청산사유 <b>'+(t.exit_reason||'-')+'</b>'+
    (t.dir?(' · '+t.dir):'')+(t.struct?(' · 구조 <code>'+t.struct+'</code>'):'')+'</div>';

  if (!r.reconstructible){
    box.innerHTML = head +
      '<div class="noart">'+(r.note||'재구성 불가')+
      (t.struct?('<br>struct=<code>'+t.struct+'</code> · strategy='+(t.strategy||'')+' · size='+_fmt(t.size)+' · side='+(t.side>0?'+1':'-1')):'')+
      '<br>PnL <b class="'+((t.pnl_bp>=0)?'pos':'neg')+'">'+_fmt(t.pnl_bp,'bp')+'</b>'+
      (t.pnl_man!=null?(' / '+_fmt(t.pnl_man)+'만원'):'')+'</div>';
    return;
  }
  const cv=A.curve||{};
  box.innerHTML = head +
    '<div class="tdgrid">'+
      G('LONG ▲', r.long_code)+ G('SHORT ▼', r.short_code)+
      G('명목 L/S(억)', (A.notional_long!=null?(_fmt(A.notional_long)+' / '+_fmt(A.notional_short)):null))+
      G('잔존 L/S(년)', (A.rem_long!=null?(_fmt(A.rem_long)+' / '+_fmt(A.rem_short)):null))+
      G('순 DV01(만/bp)', A.net_dv01_man_per_bp!=null?_fmt(A.net_dv01_man_per_bp):null)+
      G('델타', A.delta_note)+
      G('커브 노출', cv.exposure?(cv.exposure+' (Δ만기 '+cv.maturity_gap_y+'y)'):null)+
      G('진입 금리갭(bp)', A.rate_gap_entry_bp!=null?_fmt(A.rate_gap_entry_bp):null)+
      G('PnL', '<span class="'+((t.pnl_bp>=0)?'pos':'neg')+'">'+_fmt(t.pnl_bp,'bp')+'</span>'+(t.pnl_man!=null?(' / '+_fmt(t.pnl_man)+'만원'):''))+
    '</div>'+
    '<div class="qchart sm" style="height:180px"><canvas id="tc_'+ti+'"></canvas></div>'+
    '<div class="status">파랑=LONG leg YTM, 빨강=SHORT leg YTM (좌축, bp) · 노랑=스프레드(우축, bp). '+
    '▲ 진입(LONG)/▼(SHORT) · 점선=청산('+(t.exit_reason||'')+ ')</div>';

  const S=r.series||[];
  if (!S.length){ return; }
  const ctx=document.getElementById('tc_'+ti).getContext('2d');
  const labels=S.map(p=>p.d);
  const ch=new Chart(ctx,{ data:{ labels, datasets:[
    { type:'line', label:'LONG YTM', yAxisID:'y', data:S.map(p=>p.ytm_l),
      borderColor:'#4a9eff', borderWidth:1.3, pointRadius:0, tension:.1 },
    { type:'line', label:'SHORT YTM', yAxisID:'y', data:S.map(p=>p.ytm_s),

const TIER_META = {
  T1:{nm:'T1 · Super', dsc:'전 검증 통과 · 풀사이즈'},
  T2:{nm:'T2 · Strong', dsc:'DSR경계+OOS/code-track · 축소'},
  T3:{nm:'T3 · Diversifier', dsc:'델타/조건부 · 소형'},
  T4:{nm:'T4 · Experimental', dsc:'통계 얇음·함의기반 · 페이퍼'},
  none:{nm:'미평가', dsc:'tier 미부여'},
  REJECT:{nm:'REJECT', dsc:'무결성 위반 · 0'},
};
const TIER_ORDER = ['T1','T2','T3','T4','none','REJECT'];
const _FILTER = new Set();   // 비어있으면 전체, 아니면 선택 tier 만

function _tierOf(it){ return it.tier || (it.tier_eval||{}).tier || 'none'; }

async function load() {
  const dot = document.getElementById('dot'), conn = document.getElementById('conn');
  try {
    const h = await apiGet('/health');
    dot.className = 'conn-dot ' + (h.status === 'ok' ? 'ok' : 'err');
    conn.textContent = h.status === 'ok' ? 'DB 연결됨' : ('오류: ' + (h.detail||''));
  } catch (e) { dot.className='conn-dot err'; conn.textContent='서버 연결 실패'; }

  let data;
  try { data = await apiGet('/quant-house/strategies'); }
  catch (e) { document.getElementById('list').innerHTML =
    '<div class="panel-wrap status">등록부를 불러올 수 없습니다. registry.json 이 비어있을 수 있습니다 ('+ (e.detail||e.message) +').</div>'; return; }

  // 전 전략 평탄화 + tier 그룹화
  // web_visible=false 는 표시 제외(운용자 큐레이션). 백엔드도 거르지만, 구버전
  // 백엔드(미재기동) 대비 프론트에서도 한 번 더 거른다.
  let all = [];
  for (const items of Object.values(data.by_category||{})) {
    items.forEach(it => { CACHE[it.name]=it; all.push(it); });
  }
  all = all.filter(it => it.web_visible !== false);
  const s = data.summary || {};
  // 지표는 *노출 전략* 기준으로 계산(숨김 포함 백엔드 summary 와 어긋나지 않게).
  const dist = {}; all.forEach(x => { const t=_tierOf(x); if(t!=='none') dist[t]=(dist[t]||0)+1; });
  const topTier = TIER_ORDER.find(t => t!=='none' && t!=='REJECT' && dist[t]) || '–';
  document.getElementById('m-total').textContent = all.length;
  document.getElementById('m-live').textContent =
    all.filter(x => x.status==='deployed' || x.status==='active').length;
  document.getElementById('m-toptier').textContent = topTier;
  document.getElementById('m-blocked').textContent =
    all.filter(x => (x.audit||{}).blocked).length;
  document.getElementById('updated').textContent = s.updated ? ('등록부 갱신 ' + s.updated) : '';

  // ── tier 분포 범례 (클릭 = 필터) ──
  const tb = document.getElementById('tierbar'); tb.innerHTML='';
  TIER_ORDER.forEach(t=>{
    const cnt = all.filter(x=>_tierOf(x)===t).length;
    if (!cnt) return;
    const m = TIER_META[t];
    const shortNm = m.nm.includes(' · ') ? m.nm.split(' · ')[1] : m.nm;
    const el = document.createElement('div');
    el.className = 'tl'+(_FILTER.size && !_FILTER.has(t)?' dim':'');
    el.innerHTML = '<span class="tier sm tier-'+t+'">'+(t==='none'?'–':t)+'</span>'+
      '<span class="nm">'+shortNm+'</span>'+
      '<span class="cnt">'+cnt+'</span><span class="dsc">'+m.dsc+'</span>';
    el.onclick = ()=>{ if(_FILTER.has(t))_FILTER.delete(t); else _FILTER.add(t); renderList(all); };
    tb.appendChild(el);
  });

  renderList(all);
}

function renderList(all){
  const wrap = document.getElementById('list'); wrap.innerHTML='';
  if (!all.length){ wrap.innerHTML='<div class="panel-wrap status">아직 등록된 전략이 없습니다.</div>'; return; }
  // tier 섹션 순서대로
  TIER_ORDER.forEach(t=>{
    if (_FILTER.size && !_FILTER.has(t)) return;
    let items = all.filter(x=>_tierOf(x)===t);
    if (!items.length) return;
    // 운영중 우선, 그 안에서 bp/yr 내림차순
    const liveRank = x => (x.status==='deployed'?0:x.status==='active'?1:2);
    items.sort((a,b)=> liveRank(a)-liveRank(b) ||
      ((b.backtest||{}).bp_per_year||0)-((a.backtest||{}).bp_per_year||0));
    const m = TIER_META[t];
    const hdr = document.createElement('div'); hdr.className='tsec';
    hdr.innerHTML = '<span class="tier tier-'+t+'">'+(t==='none'?'–':t)+'</span>'+
      '<span class="lbl">'+m.nm+'</span><span class="sz">'+m.dsc+' · '+items.length+'개</span>'+
      '<span class="ln"></span>';
    wrap.appendChild(hdr);
    items.forEach(it=>{
      const b = it.backtest || {};
      const ab = it.status||'parked';
      const useWon = b.per_yr_man_orig!=null;
      const c1lbl = useWon?'연 만원':'연 bp';
      const c1val = useWon?b.per_yr_man_orig:b.bp_per_year;
      const c2val = useWon?b.sharpe_won_orig:b.sharpe_annualized;
      const sizing = (it.tier_eval||{}).sizing || '';
      const exraw = (it.execution||{}).exit || '';
      const exm = exraw.match(/^\[([^\]]+)\]/);
      const extag = exm ? exm[1] : (exraw ? '이벤트고정' : '');
      const row = document.createElement('div'); row.className='crow'; row.dataset.name=it.name;
      row.onclick = ()=>openStrat(it.name);
      row.innerHTML =
        '<span class="tier sm tier-'+_tierOf(it)+'">'+(_tierOf(it)==='none'?'–':_tierOf(it))+'</span>'+
        '<span class="nm">'+it.name+'</span>'+
        '<span class="cat">'+(it.category||'')+'</span>'+
        '<span class="sdot '+ab+'" title="'+ab+'"></span><span class="stat status">'+ab+'</span>'+
        '<span class="spacer"></span>'+
        (extag?('<span class="szlbl" title="청산: '+exraw.replace(/"/g,'')+'">⎋ '+extag+'</span>'):'')+
        (sizing?('<span class="szlbl">'+sizing+'</span>'):'')+
        '<span class="num"><span class="k">'+c1lbl+'</span><br><span class="v '+((c1val||0)>=0?'pos':'neg')+'">'+_fmt(c1val)+'</span></span>'+
        '<span class="num sharpe"><span class="k">Sharpe</span><br><span class="v">'+_fmt(c2val)+'</span></span>';
      wrap.appendChild(row);
    });
  });
}

async function bulkUpdate() {
  const btn=document.getElementById('updBtn'), msg=document.getElementById('updMsg');
  btn.disabled=true; msg.textContent='업데이트 중… (원본 산출물 재인제스트)';
  try {
    const r = await apiPost('/quant-house/refresh');
    const ok=(r.refreshed||[]).length, ng=(r.failed||[]).length;
    msg.textContent = `완료: ${ok}건 갱신${ng?(' · 실패 '+ng):''}${r.ktb_latest?(' · ktb '+r.ktb_latest):''}`;
    await load();
  } catch(e) {
    msg.textContent = '실패: '+(e.detail||e.message);
  } finally { btn.disabled=false; }
}

function _fmt(v,suf){ if(v==null||v==='') return '–'; const n=Number(v);
  if(!isFinite(n)) return String(v);
  return (n>0&&suf!=='%'?'+':'')+ (Math.abs(n)>=100?Math.round(n):n.toFixed(2)) + (suf||''); }

function openStrat(name){
  document.querySelectorAll('.crow.sel').forEach(e=>e.classList.remove('sel'));
  const r=document.querySelector('.crow[data-name="'+name+'"]'); if(r) r.classList.add('sel');
  showDetail(name);
}

  d.classList.add('show');
  d.scrollIntoView({behavior:'smooth', block:'start'});

  let art; try { art = await apiGet('/quant-house/backtest/'+encodeURIComponent(name)); }
  catch(e){ art = {has_artifact:false, note:'아티팩트 조회 실패: '+(e.detail||e.message)}; }
  renderBacktest(art, s.backtest);   // registry backtest 메타(TRAIN/TEST 분리·OOS) 폴백용

  const fs = document.getElementById('fwdSection');
  if (fs){
    try{
      const fwd = await apiGet('/quant-house/forward');
      const j = (fwd.strategies||{})[name];
      if (!j){ fs.innerHTML = '<span class="noart">forward 미생성 — cli.py forward 실행</span>'; }
      else if (j.status){
        fs.innerHTML = '<div class="vbanner v-warn">'+j.status+
          (j.note?(' — '+j.note):'')+'</div>';
      } else {
        const ne = j.new_entries||[];
        let h = '<div class="status" style="margin-bottom:6px">기준일 <b>'+(j.panel_max||fwd.as_of||'')+'</b>'+
          (j.active_count!=null?(' · 보유중 '+j.active_count):'')+
          ' · 신규 진입 <b>'+ne.length+'</b>건</div>';
        if (ne.length){
          h += '<table class="find-tbl"><tbody>'+ne.map(function(e){
            const tag=e.signal||e.bond_code||'?';
            const extra=(e.score!=null?(' score='+e.score):'')+(e.z!=null?(' z='+e.z):'')+(e.mode?(' ['+e.mode+']'):'');
            return '<tr><td>'+tag+'</td><td>'+(e.side||'')+(e.note?(' · '+e.note):'')+extra+'</td></tr>';
          }).join('')+'</tbody></table>';
        } else { h += '<div class="noart">오늘 신규 진입 신호 없음</div>'; }
        // 보유 포지션 최신일 청산신호 (확정정책 재적용 — 어디서/뭐/왜)
        const xsig = j.exit_signals || {};
        const xe = xsig.exits || [];
        h += '<div class="cat-title" style="margin-top:10px">오늘의 청산신호'+
          (xsig.held!=null?(' <span class="status">(보유중 '+xsig.held+'건)</span>'):'')+'</div>';
        if (xe.length){
          h += '<table class="find-tbl"><tbody>'+xe.map(function(e){
            const pv=(e.pnl_bp!=null?e.pnl_bp:0);
            return '<tr><td>'+(e.struct||'?')+'</td><td><b>'+(e.reason||'')+'</b>'+
              ' <span class="status">진입 '+(e.entry_date||'')+' → 청산 '+(e.exit_date||'')+'</span>'+
              ' <span class="'+(pv>=0?'pos':'neg')+'">'+(pv>=0?'+':'')+pv+'bp</span></td></tr>';
          }).join('')+'</tbody></table>'+
          '<div class="status">청산 기준: '+(xsig.basis||'')+' · 기준일 '+(xsig.as_of||'')+'</div>';
        } else {
          h += '<div class="noart">오늘 청산 신호 없음'+(xsig.basis?(' ('+xsig.basis+')'):'')+'</div>';
        }
        fs.className=''; fs.innerHTML = h;
      }
    }catch(e){ fs.innerHTML = '<span class="noart">forward 조회 실패: '+(e.detail||e.message)+'</span>'; }
  }
}

function renderBacktest(art, regBt){
  const sec = document.getElementById('btSection');
  if (!sec) return;
  if (!art.has_artifact){
    // 아티팩트 차트는 없지만 등록부 backtest 메타가 있으면 핵심 통계를 정직 표시
    // (TRAIN/TEST 분리·OOS 유의성·비용 — 델타트랙 채택 전략은 등록부 메타가 권위).
    let metaTbl = '';
    if (regBt && (regBt.mean_bp_per_trade!=null || regBt.mean_bp_test_oos!=null)){
      const b = regBt;
      const cell=(l,v,suf,sign)=> v==null?'' :
        '<div class="s"><div class="sl">'+l+'</div><div class="sv '+(sign?(Number(v)>=0?'pos':'neg'):'')+'">'+_fmt(v,suf)+'</div></div>';
      metaTbl =
        '<div class="status" style="margin:-4px 0 8px">아티팩트 차트 미생성 — 등록부 backtest 메타(권위·비용후·캐노니컬)를 표시. '+
        (b.metric?('지표: '+b.metric):'')+'</div>'+
        '<div class="sgrid">'+
          cell('거래수', b.n_trades)+
          cell('평균/거래(ALL)', b.mean_bp_per_trade,'bp',1)+
          cell('TRAIN', b.mean_bp_train,'bp',1)+
          cell('TEST/OOS ★', b.mean_bp_test_oos,'bp',1)+
          cell('연 bp', b.bp_per_year,'bp',1)+
          cell('적중률', b.hit_rate)+
          cell('평균보유('+(b.hold_unit||'일')+')', b.mean_hold)+
          cell('비용/거래', b.cost_bp_per_trade,'bp')+
        '</div>'+
        (b.test_t!=null?('<div class="vbanner v-warn" style="margin-top:4px">OOS(TEST 2022+) 유의성: '+
          '<b>'+(b.mean_bp_test_oos>=0?'+':'')+b.mean_bp_test_oos+'bp</b> · t=<b>'+b.test_t+'</b> · p=<b>'+b.test_p+'</b>'+
          (b.train_t!=null?(' &nbsp;|&nbsp; TRAIN +'+b.mean_bp_train+'bp t='+b.train_t+' p='+b.train_p+' <span class="status">(유의X=반전 아님)</span>'):'')+'</div>'):'')+
        (b.variant_note?('<div class="status" style="margin-top:6px">'+b.variant_note+'</div>'):'');
    }
    sec.className=''; sec.innerHTML =
      '<div class="cat-title">백테스트'+(metaTbl?' (등록부 메타 — 차트 미생성)':'')+'</div>'+
      metaTbl+
      (metaTbl?'':('<div class="noart">'+
      (art.note||'백테스트 아티팩트 없음')+
      (art.source_ref?('<br>원본: <code>'+art.source_ref+'</code>'):'')+'</div>'));
    return;
  }
  const st = art.stats||{};
  const S = (l,k,suf,sign)=>{ const v=st[k]; if(v==null) return '';
    const cls = sign?(v>=0?'pos':'neg'):'';
    return '<div class="s"><div class="sl">'+l+'</div><div class="sv '+cls+'">'+_fmt(v,suf)+'</div></div>'; };
  const T = art.trades||[];
  const has = k => T.some(r=>r[k]!=null && r[k]!=='');
  const isPair = has('long')&&has('short');     // OF/OFn/Combine/CV2
  const isStruct = has('struct');                // CV1T 멀티레그(버터플라이/슬로프/베이시스)
  const hasMan = has('pnl_man');                 // Combine 만원 실손익
  const hasSpread = has('spread_in');

  sec.className='';
  const SN = art.name;        // 거래 드릴다운용 전략명
  const N = T.length;
  let head, body, ncol;
  // 자연순 idx (테이블은 최신순). data-ti = 원본 인덱스 → trade-path 조회
  const RT = (idx, cells, t) => '<tr class="trow'+((t&&t.leaked)?' leaked':((t&&t.forced)?' forced':''))+
      '" data-ti="'+idx+'" onclick="toggleTrade(\''+SN+'\','+idx+',this)">'+cells+'</tr>';
  // 보유 표시: 누수(원안 hold stale)면 실제 span_cal(일)을 ⚠ 와 함께
  const HOLD = (t, base) => (t&&t.leaked)
      ? '<span class="leakwarn">⚠'+(t.span_cal!=null?t.span_cal+'일':'초과')+'</span>'
      : (base??'');
  const RSN = (t) => (t&&t.exit_reason||'')+((t&&t.flag)?(' <span class="flagtag">'+t.flag+'</span>'):'');
  if (isStruct){
    ncol=10;
    const _iv = st.intraday;
    head = '<th class="lt">서브</th><th class="lt">구조(레그)</th><th class="lt">진입</th><th class="lt">청산</th><th>'+(_iv?'bar':'보유')+'</th><th>방향</th><th>'+(_iv?'val_in→out':'size')+'</th><th>PnL bp</th><th>비용</th><th class="lt">청산사유</th>';
    body = T.map((t,i)=>({t,i})).reverse().map(({t,i})=>{ const pp=t.pnl_bp>=0; const lng=t.side>0;
      const hold = t.days_held ?? t.hold_bars ?? '';
      const c7 = _iv ? (_fmt(t.val_in)+'→'+_fmt(t.val_out)) : _fmt(t.size);
      return RT(i,'<td class="lt">'+(t.strategy||(_iv?'CV2-G1':''))+'</td><td class="lt">'+(t.struct||'')+'</td>'+
       '<td class="lt">'+t.entry_date+'</td><td class="lt">'+t.exit_date+'</td><td>'+HOLD(t,hold)+'</td>'+
       '<td class="'+(lng?'lng':'sht')+'">'+(lng?'▲+1':'▼-1')+'</td><td>'+c7+'</td>'+
       '<td class="'+(pp?'pp':'pn')+'">'+_fmt(t.pnl_bp)+'</td><td>'+_fmt(t.cost_bp)+'</td>'+
       '<td class="lt">'+RSN(t)+'</td>', t); }).join('');
  } else if (isPair){
    ncol = 10 + (hasMan?1:0);
    head = '<th class="lt">LONG ▲</th><th class="lt">SHORT ▼</th><th class="lt">방향</th><th class="lt">진입</th><th class="lt">청산</th><th>보유</th>'+
      (hasSpread?'<th>스프레드in</th><th>out</th>':'<th>YTM_n</th><th>YTM_b</th>')+
      '<th>PnL bp</th>'+(hasMan?'<th>PnL 만원</th>':'')+'<th>비용</th><th class="lt">청산사유</th>';
    body = T.map((t,i)=>({t,i})).reverse().map(({t,i})=>{ const pp=t.pnl_bp>=0;
      const c1 = hasSpread?_fmt(t.spread_in):_fmt(t.ytm_n);
      const c2 = hasSpread?_fmt(t.spread_out):_fmt(t.ytm_b);
      return RT(i,'<td class="lt lng">'+(t.long||'')+'</td><td class="lt sht">'+(t.short||'')+'</td>'+
       '<td class="lt">'+(t.dir||'')+'</td><td class="lt">'+t.entry_date+'</td><td class="lt">'+t.exit_date+'</td>'+
       '<td>'+HOLD(t,t.days_held)+'</td><td>'+c1+'</td><td>'+c2+'</td>'+
       '<td class="'+(pp?'pp':'pn')+'">'+_fmt(t.pnl_bp)+'</td>'+
       (hasMan?('<td class="'+((t.pnl_man>=0)?'pp':'pn')+'">'+_fmt(t.pnl_man)+'</td>'):'')+
       '<td>'+_fmt(t.cost_bp)+'</td><td class="lt">'+RSN(t)+'</td>', t); }).join('');
  } else {
    ncol=10;
    head = '<th class="lt">종목</th><th class="lt">진입</th><th class="lt">청산</th><th>보유</th><th>방향</th><th>진입bp</th><th>청산bp</th><th>PnL bp</th><th>비용</th><th class="lt">청산사유</th>';
    body = T.map((t,i)=>({t,i})).reverse().map(({t,i})=>{ const lng=t.side>0; const pp=t.pnl_bp>=0;
      return RT(i,'<td class="lt">'+(t.code||'')+'</td><td class="lt">'+t.entry_date+'</td>'+
       '<td class="lt">'+t.exit_date+'</td><td>'+HOLD(t,t.days_held)+'</td>'+
       '<td class="'+(lng?'lng':'sht')+'">'+(lng?'▲LONG':'▼SHORT')+'</td>'+
       '<td>'+_fmt(t.entry_bp)+'</td><td>'+_fmt(t.exit_bp)+'</td>'+
       '<td class="'+(pp?'pp':'pn')+'">'+_fmt(t.pnl_bp)+'</td><td>'+_fmt(t.cost_bp)+'</td>'+
       '<td class="lt">'+RSN(t)+'</td>', t); }).join('');
  }
  window._TCOL = ncol;

  const structNote = isStruct
    ? '<div class="status" style="margin:4px 0 8px">⚠ CV1T 는 비지표 페어가 아니라 <b>멀티레그 구조</b>(butterfly·slope·basis). struct 컬럼이 실제 레그 — 예: <code>bf_3_10_30</code>=3-10-30 버터플라이, <code>basis_10y_KTB10F</code>=10년 현물 vs KTB10F 선물 베이시스. PnL bp 는 구조 BPV 기준.</div>' : '';

  const hu = st.hold_unit||'일';
  const ivTag = st.intraday ? '<span class="abadge ab-active" style="margin-left:8px">INTRADAY (5분봉)</span>' : '';
  sec.innerHTML =
    '<div class="cat-title">기초 통계 (비용 후)'+ivTag+'</div>'+
    '<div class="sgrid">'+
      S('거래수','n_trades','')+ S('누적 PnL','total_pnl_bp','bp',1)+
      (st.bp_per_year_clean!=null?S('연 bp ★clean(권위)','bp_per_year_clean','bp',1):S('연 bp','bp_per_year','bp',1))+
      (st.bp_per_year_clean!=null?S('연 bp(전체·강제청산포함)','bp_per_year','bp',1):'')+
      S('적중률','hit_rate','')+
      S('Sharpe(거래·연율)','sharpe_annualized','',1)+ S('MaxDD','max_drawdown_bp','bp',1)+
      S('평균보유('+hu+')','mean_hold','')+ S('거래/주','trades_per_week','')+
      S('평균/거래','mean_bp_per_trade','bp',1)+ S('총비용','total_cost_bp','bp')+
      (st.pnl_eok_per_year!=null?S('연 손익(억)','pnl_eok_per_year','',1):'')+
      (st.total_pnl_man!=null?S('누적 손익(만원)','total_pnl_man','',1):'')+
      (st.per_yr_man_orig!=null?S('연 만원(원안·권위)','per_yr_man_orig','',1):'')+
      (st.sharpe_won_orig!=null?S('Sharpe(원안 won·권위)','sharpe_won_orig','',1):'')+
    '</div>'+
    (st.per_yr_man_orig!=null?'<div class="status" style="margin:-4px 0 10px">RV 는 won 기반 지표가 명세 §1.4 권위값 (Sharpe 거래·연율 ≠ 원안 won Sharpe)</div>':'')+
    ((st.leaked_n||0)>0?('<div class="leak-banner">⚠ <b>누수(보유초과) 거래 '+st.leaked_n+'건</b> 탐지 — 원안 백테스트가 정상청산(target/stop/time) 못 한 포지션이 컷오프까지 누수(실제 수개월~수년 보유, 원안 hold 컬럼은 stale). 전체(full) 수치를 <b>'+_fmt(st.full_inflation_pct,"%")+'</b> 왜곡 → <b>clean 수치가 권위</b>(명세도 clean 사용). 아래 로그에서 빨간 행 = 누수.</div>'):'')+
    (st.cost_model?('<div class="leak-banner" style="background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.30);color:#fbbf24">💸 <b>비용/구성: '+st.cost_model+'</b>'+(st.grid_reopt?(' · <b>그리드 재최적: '+st.grid_reopt+'</b>'):'')+'. 위 표의 연 bp/PnL/Sharpe 는 이 설정 적용 후 값입니다.'+(st.variant_note?(' '+st.variant_note):'')+(st.orig_spec_ref_bp!=null?(' 참고: 원안(bf포함·변동비용·override 명세값) 기준 <b>+'+_fmt(st.orig_spec_ref_bp)+' bp/y</b>.'):'')+'</div>'):'')+
    (st.extra_cost_bp?('<div class="leak-banner" style="background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.30);color:#fbbf24">💸 거래비용 +'+st.extra_cost_bp+'bp 추가('+(st.extra_cost_mode||'')+'), 추가합 '+_fmt(st.extra_cost_total_bp)+'bp — 가산 후 값.</div>'):'')+
    '<div class="cat-title">누적 PnL (bp)</div><div class="qchart"><canvas id="cEq"></canvas></div>'+
    '<div class="cat-title">월간 PnL (bp)</div><div class="qchart sm"><canvas id="cMo"></canvas></div>'+
    '<div class="cat-title">Drawdown (bp)</div><div class="qchart sm"><canvas id="cDd"></canvas></div>'+
    '<div class="cat-title">진입 포지션 로그 ('+art.n_trades+'건)</div>'+ structNote +
    '<div class="tlog-wrap"><table class="tlog"><thead><tr>'+head+
    '</tr></thead><tbody>'+body+'</tbody></table></div>';

  const eq=art.equity||[], mo=art.monthly||[], dd=art.drawdown||[];
  if (eq.length){
    _charts.push(new Chart(document.getElementById('cEq').getContext('2d'),{
      type:'line', data:{ labels:eq.map(p=>p.d), datasets:[{ data:eq.map(p=>p.v),
        borderColor:'#34d399', backgroundColor:'rgba(52,211,153,.10)', borderWidth:1.3,
        fill:true, pointRadius:0, tension:.15 }] },
      options:{..._baseOpts()} }));
  }
  if (mo.length){
    _charts.push(new Chart(document.getElementById('cMo').getContext('2d'),{
      type:'bar', data:{ labels:mo.map(p=>p.ym), datasets:[{ data:mo.map(p=>p.v),
        backgroundColor:mo.map(p=>p.v>=0?'rgba(52,211,153,.55)':'rgba(248,113,113,.55)'),
        borderWidth:0 }] }, options:{..._baseOpts()} }));
  }
  if (dd.length){
    _charts.push(new Chart(document.getElementById('cDd').getContext('2d'),{
      type:'line', data:{ labels:dd.map(p=>p.d), datasets:[{ data:dd.map(p=>p.v),
        borderColor:'#f87171', backgroundColor:'rgba(248,113,113,.14)', borderWidth:1,
        fill:true, pointRadius:0, tension:.1 }] }, options:{..._baseOpts()} }));
  }
}

load();
</script>
</body>
