<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bond Quant House — 다전략 운용</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .panel-wrap { background:var(--s1); border:.5px solid var(--bd); border-radius:var(--r); padding:1rem 1.125rem; margin-bottom:12px; }
    .ctrl-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--t3); display:inline-block; margin-right:6px; }
    .conn-dot.ok { background:var(--green); box-shadow:0 0 5px rgba(52,211,153,.45); }
    .conn-dot.err { background:var(--red); }
    .btn { background:none; border:.5px solid var(--bd2); border-radius:var(--rs); color:var(--t2); font-size:12px; cursor:pointer; padding:6px 11px; transition:all .15s; }
    .btn:hover { border-color:var(--blue); color:var(--blue); }
    .status { font-size:11px; color:var(--t3); }

    .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:9px; margin-bottom:12px; }
    .metric { background:var(--s1); border:.5px solid var(--bd); border-radius:var(--rs); padding:9px 11px; }
    .metric .ml { font-size:9px; color:var(--t3); margin-bottom:3px; letter-spacing:.3px; text-transform:uppercase; }
    .metric .mv { font-size:18px; font-weight:600; letter-spacing:-.3px; }
    .metric.neg .mv { color:var(--red); }

    .cat-title { font-size:11px; color:var(--t3); letter-spacing:.4px; text-transform:uppercase; margin:18px 0 8px; }
    .strat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .strat-card { background:var(--s1); border:.5px solid var(--bd); border-radius:var(--r); padding:13px 14px; cursor:pointer; transition:border-color .15s,background .15s; position:relative; }
    .strat-card:hover { border-color:var(--bd2); background:var(--s2); }
    .strat-name { font-size:13px; font-weight:600; color:var(--t1); margin-bottom:3px; }
    .strat-concept { font-size:11px; color:var(--t3); line-height:1.55; margin-bottom:9px; min-height:32px; }
    .strat-row { display:flex; gap:14px; font-size:11px; color:var(--t2); flex-wrap:wrap; }
    .strat-row b { color:var(--t1); font-weight:600; }
    .strat-lineage { font-size:10px; color:var(--t3); margin-top:8px; }
    .vbadge { position:absolute; top:11px; right:12px; font-size:9px; font-weight:600; letter-spacing:.4px; padding:2px 7px; border-radius:3px; text-transform:uppercase; }
    .v-PASS { background:rgba(52,211,153,.12); color:var(--green); border:.5px solid rgba(52,211,153,.25); }
    .v-WARN { background:rgba(251,191,36,.12); color:#fbbf24; border:.5px solid rgba(251,191,36,.25); }
    .v-VIOLATION { background:rgba(248,113,113,.12); color:var(--red); border:.5px solid rgba(248,113,113,.28); }
    .v-none { background:rgba(255,255,255,.04); color:var(--t3); border:.5px solid var(--bd); }
    .itag { font-size:9px; font-weight:600; letter-spacing:.3px; padding:1px 6px; border-radius:3px; text-transform:uppercase; margin-left:6px; vertical-align:middle; }
    .i-ported { background:rgba(74,158,255,.12); color:var(--blue); border:.5px solid rgba(74,158,255,.28); }
    .i-linked { background:rgba(52,211,153,.12); color:var(--green); border:.5px solid rgba(52,211,153,.28); }
    .i-catalog { background:rgba(255,255,255,.04); color:var(--t3); border:.5px solid var(--bd2); }

    .detail { display:none; }
    .detail.show { display:block; }
    .find-tbl { width:100%; border-collapse:collapse; font-size:11.5px; }
    .find-tbl td { padding:6px 8px; border-bottom:.5px solid var(--bd); vertical-align:top; }
    .find-tbl td:first-child { width:160px; color:var(--t3); }
    .lvl-PASS { color:var(--green); } .lvl-WARN { color:#fbbf24; } .lvl-VIOLATION { color:var(--red); font-weight:600; }
    .blocked-banner { background:rgba(248,113,113,.08); border:.5px solid rgba(248,113,113,.28); color:var(--red); font-size:12px; padding:8px 12px; border-radius:var(--rs); margin-bottom:12px; }
    .vbanner { font-size:11.5px; padding:8px 12px; border-radius:var(--rs); margin-bottom:12px; line-height:1.6; }
    .vbanner.v-ok   { background:rgba(52,211,153,.08); border:.5px solid rgba(52,211,153,.28); color:var(--green); }
    .vbanner.v-warn { background:rgba(251,191,36,.08); border:.5px solid rgba(251,191,36,.28); color:#fbbf24; }
    .vbanner.v-fail { background:rgba(248,113,113,.10); border:.5px solid rgba(248,113,113,.32); color:var(--red); font-weight:600; }
    .vbanner.v-fail b { color:#fca5a5; }
    .stale-badge { display:inline-block; font-size:9.5px; font-weight:700; letter-spacing:.4px; padding:2px 7px; border-radius:3px; background:rgba(248,113,113,.18); color:#f87171; border:1px solid rgba(248,113,113,.5); text-transform:uppercase; vertical-align:middle; margin-left:6px; }
    /* 전역 staleness 배너(목록 최상단·클릭 없이 즉시) — 침묵 stale 방지 */
    .gstale { font-size:12.5px; padding:11px 14px; border-radius:var(--rs); margin-bottom:12px; line-height:1.6;
      position:sticky; top:8px; z-index:20; box-shadow:0 4px 18px rgba(0,0,0,.35); }
    .gstale.gs-fail { background:rgba(248,113,113,.14); border:1px solid rgba(248,113,113,.55); color:#fca5a5; font-weight:600; }
    .gstale.gs-fail b { color:#f87171; }
    .gstale.gs-warn { background:rgba(251,191,36,.10); border:.5px solid rgba(251,191,36,.34); color:#fbbf24; box-shadow:none; }
    .gstale.gs-ok { background:rgba(52,211,153,.08); border:.5px solid rgba(52,211,153,.28); color:var(--green); font-size:11px; padding:6px 12px; box-shadow:none; position:static; }
    .vchip { font-size:9px; font-weight:700; letter-spacing:.3px; padding:1px 6px; border-radius:3px; margin-left:6px; }
    .vc-ok { background:rgba(52,211,153,.14); color:var(--green); }
    .vc-warn { background:rgba(251,191,36,.14); color:#fbbf24; }
    .vc-fail { background:rgba(248,113,113,.14); color:var(--red); }
    .tlog tr.leaked td { background:rgba(248,113,113,.10) !important; }
    .tlog tr.leaked td:first-child { box-shadow:inset 3px 0 0 var(--red); }
    .tlog tr.forced td { background:rgba(251,191,36,.06) !important; }
    .leakwarn { color:var(--red); font-weight:700; }
    .flagtag { font-size:8.5px; font-weight:700; padding:1px 5px; border-radius:3px; background:rgba(248,113,113,.16); color:var(--red); }
    .tlog tr.forced .flagtag { background:rgba(251,191,36,.16); color:#fbbf24; }
    .leak-banner { background:rgba(248,113,113,.08); border:.5px solid rgba(248,113,113,.30); color:var(--red); font-size:11px; padding:8px 12px; border-radius:var(--rs); margin:4px 0 10px; line-height:1.6; }
    .sgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .sgrid .s { background:var(--s2); border:.5px solid var(--bd); border-radius:var(--rs); padding:8px 10px; }
    .sgrid .sl { font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; margin-bottom:3px; }
    .sgrid .sv { font-size:15px; font-weight:600; }
    .sgrid .sv.pos { color:var(--green); } .sgrid .sv.neg { color:var(--red); }
    .qchart { position:relative; height:200px; background:var(--s1); border:.5px solid var(--bd); border-radius:var(--rs); padding:8px 10px 6px; margin-bottom:12px; }
    .qchart.sm { height:150px; }
    .tlog-wrap { max-height:340px; overflow:auto; border:.5px solid var(--bd); border-radius:var(--rs); }
    .tlog { width:100%; border-collapse:collapse; font-size:10.5px; white-space:nowrap; }
    .tlog th, .tlog td { padding:5px 8px; text-align:right; border-bottom:.5px solid var(--bd); }
    .tlog th { position:sticky; top:0; background:var(--s2); color:var(--t3); font-size:9px; text-transform:uppercase; letter-spacing:.3px; z-index:1; }
    .tlog td.lt, .tlog th.lt { text-align:left; }
    .tlog .lng { color:var(--green); } .tlog .sht { color:var(--red); }
    .tlog .pp { color:var(--green); } .tlog .pn { color:var(--red); }
    .tlog tr:hover td { background:rgba(255,255,255,.02); }
    .noart { background:var(--s2); border:.5px dashed var(--bd2); border-radius:var(--rs); padding:14px; font-size:11.5px; color:var(--t3); line-height:1.7; }
    /* 아코디언 트리 */
    .acc { border:.5px solid var(--bd); border-radius:var(--r); overflow:hidden; }
    .cat-row { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--s2); cursor:pointer; border-bottom:.5px solid var(--bd); user-select:none; }
    .cat-row:hover { background:var(--s1); }
    .chev { font-size:10px; color:var(--t3); transition:transform .15s; width:10px; display:inline-block; }
    .cat-row.open .chev { transform:rotate(90deg); }
    .cat-nm { font-size:12px; font-weight:700; letter-spacing:.4px; color:var(--t1); }
    .cat-cnt { font-size:10px; color:var(--t3); }
    .cat-sum { margin-left:auto; display:flex; gap:16px; font-size:10.5px; color:var(--t3); }
    .cat-sum b { color:var(--t2); }
    .cat-body { display:none; }
    .cat-body.open { display:block; }
    .srow { display:flex; align-items:center; gap:10px; padding:9px 14px 9px 34px; border-bottom:.5px solid var(--bd); cursor:pointer; background:var(--bg); }
    .srow:hover { background:var(--s1); }
    .srow.sel { background:rgba(74,158,255,.06); }
    .srow:last-child { border-bottom:0; }
    .srow-nm { font-size:12px; font-weight:600; color:var(--t1); }
    .srow-cc { font-size:10.5px; color:var(--t3); max-width:340px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .srow-r { margin-left:auto; display:flex; gap:14px; align-items:center; font-size:11px; }
    .srow-r .k { color:var(--t3); font-size:9px; text-transform:uppercase; letter-spacing:.3px; }
    .srow-r .val { font-weight:600; }
    .srow-r .col { text-align:right; min-width:54px; }
    .pos { color:var(--green); } .neg { color:var(--red); }
    .abadge { font-size:9px; font-weight:700; letter-spacing:.4px; padding:2px 7px; border-radius:3px; }
    .ab-deployed { background:rgba(52,211,153,.14); color:var(--green); border:.5px solid rgba(52,211,153,.3); }
    .ab-active { background:rgba(74,158,255,.12); color:var(--blue); border:.5px solid rgba(74,158,255,.28); }
    .ab-parked { background:rgba(255,255,255,.04); color:var(--t3); border:.5px solid var(--bd2); }
    .ab-killed { background:rgba(248,113,113,.10); color:var(--red); border:.5px solid rgba(248,113,113,.28); }
    .btn.upd { border-color:rgba(52,211,153,.3); color:var(--green); }
    .btn.upd:hover { background:rgba(52,211,153,.1); }
    .btn.upd[disabled] { opacity:.5; pointer-events:none; }
    /* ── 계층(tier) 배지 — 검증 등급의 1차 시각언어 ── */
    .tier { display:inline-flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:800; letter-spacing:.5px; min-width:34px;
      padding:4px 8px; border-radius:6px; line-height:1; }
    .tier.sm { font-size:11px; min-width:28px; padding:3px 6px; border-radius:5px; }
    .tier-T1 { background:rgba(52,211,153,.16); color:#34d399; border:1px solid rgba(52,211,153,.45); }
    .tier-T2 { background:rgba(74,158,255,.15); color:#4a9eff; border:1px solid rgba(74,158,255,.45); }
    .tier-T3 { background:rgba(251,191,36,.14); color:#fbbf24; border:1px solid rgba(251,191,36,.42); }
    .tier-T4 { background:rgba(255,255,255,.05); color:var(--t2); border:1px solid var(--bd2); }
    .tier-REJECT { background:rgba(248,113,113,.13); color:#f87171; border:1px solid rgba(248,113,113,.45); }
    .tier-none { background:rgba(255,255,255,.03); color:var(--t3); border:1px dashed var(--bd2); }
    /* tier 분포 범례 바 */
    .tierbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
    .tierbar .tl { display:flex; align-items:center; gap:7px; background:var(--s1);
      border:.5px solid var(--bd); border-radius:8px; padding:7px 11px; cursor:pointer;
      transition:border-color .15s, background .15s; }
    .tierbar .tl:hover { border-color:var(--bd2); }
    .tierbar .tl.dim { opacity:.4; }
    .tierbar .tl .nm { font-size:11px; font-weight:700; color:var(--t2); }
    .tierbar .tl .cnt { font-size:13px; font-weight:700; color:var(--t1); }
    .tierbar .tl .dsc { font-size:10px; color:var(--t3); }
    /* tier 섹션 헤더 */
    .tsec { margin:16px 0 9px; display:flex; align-items:center; gap:10px; }
    .tsec .lbl { font-size:12px; font-weight:700; color:var(--t2); letter-spacing:.3px; }
    .tsec .sz { font-size:10px; color:var(--t3); }
    .tsec .ln { flex:1; height:1px; background:var(--bd); }
    /* 컴팩트 전략 행 (텍스트 최소화) */
    .crow { display:flex; align-items:center; gap:12px; padding:11px 13px;
      background:var(--s1); border:.5px solid var(--bd); border-radius:var(--r);
      margin-bottom:7px; cursor:pointer; transition:border-color .15s, background .15s; }
    .crow:hover { border-color:var(--bd2); background:var(--s2); }
    .crow.sel { border-color:var(--blue); background:rgba(74,158,255,.05); }
    .crow .nm { font-size:13px; font-weight:600; color:var(--t1); }
    .crow .cat { font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:.3px;
      background:var(--s2); border:.5px solid var(--bd); border-radius:4px; padding:1px 6px; }
    .crow .stat { font-size:10px; }
    .crow .spacer { margin-left:auto; }
    .crow .num { text-align:right; min-width:56px; }
    .crow .num .k { font-size:8.5px; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; }
    .crow .num .v { font-size:13px; font-weight:700; }
    .crow .num .v.pos { color:var(--green); } .crow .num .v.neg { color:var(--red); }
    .crow .szlbl { font-size:10px; color:var(--t3); min-width:74px; text-align:right; }
    .sdot { width:7px; height:7px; border-radius:50%; display:inline-block; }
    .sdot.deployed { background:var(--green); box-shadow:0 0 5px rgba(52,211,153,.5); }
    .sdot.active { background:var(--blue); }
    .sdot.parked { background:var(--t3); }
    .sdot.killed, .sdot.proposed { background:var(--red); opacity:.6; }
    .tier-detail-head { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    @media (max-width:760px){ .crow .cat, .crow .num.sharpe { display:none; } }
    .tlog tr.trow { cursor:pointer; }
    .tlog tr.trow:hover td { background:rgba(74,158,255,.05); }
    .tlog tr.trow.open td { background:rgba(74,158,255,.08); }
    .tdetail td { background:var(--s1) !important; padding:0 !important; }
    .tdwrap { padding:12px 14px; }
    .tdgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
    .tdgrid .s { background:var(--s2); border:.5px solid var(--bd); border-radius:var(--rs); padding:7px 9px; }
    .tdgrid .sl { font-size:9px; color:var(--t3); text-transform:uppercase; margin-bottom:2px; }
    .tdgrid .sv { font-size:12px; font-weight:600; }
    @media (max-width:760px){ .strat-grid{grid-template-columns:1fr;} .metrics{grid-template-columns:1fr 1fr;} .sgrid{grid-template-columns:1fr 1fr;} .srow-cc{display:none;} .srow-r{gap:8px;} .tdgrid{grid-template-columns:1fr 1fr;} }
    /* ── OPERATION 운용 콘솔 ── */
    .tabbar { display:flex; gap:8px; margin-bottom:12px; }
    .tabbtn { background:var(--s1); border:.5px solid var(--bd2); border-radius:var(--rs); color:var(--t2); font-size:12.5px; font-weight:600; cursor:pointer; padding:8px 16px; transition:all .15s; }
    .tabbtn:hover { border-color:var(--blue); color:var(--blue); }
    .tabbtn.active { background:rgba(74,158,255,.10); border-color:var(--blue); color:var(--blue); }
    .ops-card { background:var(--s1); border:.5px solid var(--bd); border-radius:var(--r); padding:12px 14px; margin-bottom:9px; position:relative; }
    .ops-card.vetoed { opacity:.45; border-color:rgba(248,113,113,.45); }
    .ops-card.vetoed::after { content:'부결'; position:absolute; top:10px; right:88px; font-size:10px; font-weight:700; color:var(--red); }
    .ops-card .hd { display:flex; align-items:center; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
    .ops-card .hd .nm { font-size:13px; font-weight:700; color:var(--t1); }
    .btn.veto { border-color:rgba(248,113,113,.4); color:var(--red); position:absolute; top:9px; right:12px; }
    .btn.veto.on { background:rgba(248,113,113,.14); font-weight:700; }
    .btn.danger { border-color:rgba(248,113,113,.4); color:var(--red); }
    .btn.danger:hover { background:rgba(248,113,113,.10); border-color:var(--red); }
    .szrow { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:8px 0 4px; }
    .szbox { background:var(--s2); border:.5px solid var(--bd); border-radius:var(--rs); padding:8px 10px; }
    .szbox .l { font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:.3px; margin-bottom:3px; }
    .szbox .v { font-size:14px; font-weight:700; }
    .szbox .n { font-size:10px; color:var(--t3); margin-top:3px; line-height:1.5; }
    .xstate { display:inline-block; font-size:9.5px; font-weight:700; letter-spacing:.3px; padding:2px 8px; border-radius:3px; }
    .xs-HOLD { background:rgba(74,158,255,.12); color:var(--blue); border:.5px solid rgba(74,158,255,.3); }
    .xs-TP { background:rgba(52,211,153,.16); color:var(--green); border:.5px solid rgba(52,211,153,.45); }
    .xs-SL { background:rgba(248,113,113,.16); color:var(--red); border:.5px solid rgba(248,113,113,.45); }
    .xs-TIME { background:rgba(251,191,36,.14); color:#fbbf24; border:.5px solid rgba(251,191,36,.42); }
    .xs-none { background:rgba(255,255,255,.04); color:var(--t3); border:.5px solid var(--bd2); }
    .ovrtag { font-size:8.5px; font-weight:700; padding:1px 5px; border-radius:3px; background:rgba(251,191,36,.16); color:#fbbf24; border:.5px solid rgba(251,191,36,.4); margin-left:5px; }
    .ops-in { background:var(--s2); border:.5px solid var(--bd2); border-radius:var(--rs); color:var(--t1); font-size:11.5px; padding:5px 8px; }
    .ops-in:focus { outline:none; border-color:var(--blue); }
    .ops-in.sm { width:110px; }
    .utilchip { display:inline-flex; gap:6px; align-items:center; background:var(--s2); border:.5px solid var(--bd); border-radius:5px; padding:4px 9px; font-size:11px; margin:0 6px 6px 0; }
    .utilchip.full { border-color:rgba(248,113,113,.5); color:var(--red); }
    .mleg { display:grid; grid-template-columns:1.4fr .8fr .6fr .6fr .9fr auto; gap:6px; margin-bottom:6px; align-items:center; }
    @media (max-width:760px){ .szrow{grid-template-columns:1fr;} .mleg{grid-template-columns:1fr 1fr;} }
  </style>
</head>
<body>
<div class="container">
  <nav class="nav">
    <span class="nav-brand">Bond Quant House</span>
    <div class="nav-links"><a href="/" class="nav-link">홈</a><a href="/tools/quant-house/" class="nav-link active">다전략 운용</a><a href="/tools/portfolio/" class="nav-link">포트폴리오</a><a href="/tools/regime/" class="nav-link">레짐 모니터</a></div>
  </nav>

  <div class="tabbar">
    <button class="tabbtn active" id="tab-strat" onclick="switchTab('strat')">전략</button>
    <button class="tabbtn" id="tab-ops" onclick="switchTab('ops')">운용 콘솔</button>
  </div>

  <div id="view-strat">
  <div class="panel-wrap">
    <div class="ctrl-row">
      <span><span id="dot" class="conn-dot"></span><span id="conn" class="status">연결 확인 중…</span></span>
      <button class="btn" onclick="load()">새로고침</button>
      <button class="btn upd" id="updBtn" onclick="bulkUpdate()">↻ 전체 데이터 업데이트</button>
      <span id="updMsg" class="status"></span>
      <span id="updated" class="status" style="margin-left:auto"></span>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="ml">등록 전략</div><div class="mv" id="m-total">–</div></div>
    <div class="metric"><div class="ml">운영중 (active+deployed)</div><div class="mv" id="m-live">–</div></div>
    <div class="metric"><div class="ml">최고 등급</div><div class="mv" id="m-toptier">–</div></div>
    <div class="metric neg"><div class="ml">헌법 BLOCK</div><div class="mv" id="m-blocked">–</div></div>
  </div>

  <!-- ════════ OPERATION 운용 콘솔 (engine.positions 그대로 — 표시·기록만, 자동청산 없음) ════════ -->
  <div id="view-ops" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/assets/js/api.js"></script>
<script>
let CACHE = {};
let _charts = [];
function _destroyCharts(){ _charts.forEach(c=>{try{c.destroy()}catch(e){}}); _charts=[]; }
const AXC = '#8b93a8', GRID = 'rgba(255,255,255,.05)';
function _baseOpts(){ return { responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{display:false}, tooltip:{ callbacks:{} } },
  scales:{ x:{ ticks:{color:AXC,font:{size:9},maxTicksLimit:8}, grid:{color:GRID} },
           y:{ ticks:{color:AXC,font:{size:9}}, grid:{color:GRID} } } }; }
let _TPATH = {};   // 거래 상세 캐시 (전략별)

async function toggleTrade(strategy, ti, rowEl){
  const panel = document.getElementById('tradeDetail');
  // 같은 행 다시 클릭 → 패널 닫기 (토글)
  if (rowEl.classList.contains('open')){
    rowEl.classList.remove('open');
    panel.style.display='none'; panel.innerHTML=''; return;
  }
  document.querySelectorAll('tr.trow.open').forEach(e=>e.classList.remove('open'));
  rowEl.classList.add('open');
  panel.style.display='block';
  panel.innerHTML = '<div class="tdwrap" id="td_box">불러오는 중…</div>';
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
  let r;
  try { r = await apiGet('/quant-house/trade-path?strategy='+encodeURIComponent(strategy)+'&i='+ti); }
  catch(e){ document.getElementById('td_box').innerHTML='<div class="status">상세 조회 실패: '+(e.detail||e.message)+'</div>'; return; }
  renderTradeDetail(document.getElementById('td_box'), r, ti);
}

function renderTradeDetail(box, r, ti){
  const t=r.trade||{};
  const A=r.analytics||{};
  const G=(l,v)=> v==null?'':'<div class="s"><div class="sl">'+l+'</div><div class="sv">'+v+'</div></div>';
  let head =
    '<div class="status" style="margin-bottom:8px">'+
    '<b>'+(t.entry_date||'')+' → '+(t.exit_date||'')+'</b> · '+
    (t.days_held!=null?t.days_held+'영업일 보유':'')+' · 청산사유 <b>'+(t.exit_reason||'-')+'</b>'+
    (t.dir?(' · '+t.dir):'')+(t.struct?(' · 구조 <code>'+t.struct+'</code>'):'')+'</div>';

  if (!r.reconstructible){
    box.innerHTML = head +
      '<div class="noart">'+(r.note||'재구성 불가')+
      (t.struct?('<br>struct=<code>'+t.struct+'</code> · strategy='+(t.strategy||'')+' · size='+_fmt(t.size)+' · side='+(t.side>0?'+1':'-1')):'')+
      '<br>PnL <b class="'+((t.pnl_bp>=0)?'pos':'neg')+'">'+_fmt(t.pnl_bp,'bp')+'</b>'+
      (t.pnl_man!=null?(' / '+_fmt(t.pnl_man)+'만원'):'')+'</div>';
    return;
  }
  const cv=A.curve||{};
  box.innerHTML = head +
    '<div class="tdgrid">'+
      G('LONG ▲', r.long_code)+ G('SHORT ▼', r.short_code)+
      G('명목 L/S(억)', (A.notional_long!=null?(_fmt(A.notional_long)+' / '+_fmt(A.notional_short)):null))+
      G('잔존 L/S(년)', (A.rem_long!=null?(_fmt(A.rem_long)+' / '+_fmt(A.rem_short)):null))+
      G('순 DV01(만/bp)', A.net_dv01_man_per_bp!=null?_fmt(A.net_dv01_man_per_bp):null)+
      G('델타', A.delta_note)+
      G('커브 노출', cv.exposure?(cv.exposure+' (Δ만기 '+cv.maturity_gap_y+'y)'):null)+
      G('진입 금리갭(bp)', A.rate_gap_entry_bp!=null?_fmt(A.rate_gap_entry_bp):null)+
      G('PnL', '<span class="'+((t.pnl_bp>=0)?'pos':'neg')+'">'+_fmt(t.pnl_bp,'bp')+'</span>'+(t.pnl_man!=null?(' / '+_fmt(t.pnl_man)+'만원'):''))+
    '</div>'+
    '<div class="qchart sm" style="height:180px"><canvas id="tc_'+ti+'"></canvas></div>'+
    '<div class="status">파랑=LONG leg YTM, 빨강=SHORT leg YTM (좌축, bp) · 노랑=스프레드(우축, bp). '+
    '▲ 진입(LONG)/▼(SHORT) · 점선=청산('+(t.exit_reason||'')+ ')</div>';

  const S=r.series||[];
  if (!S.length){ return; }
  const ctx=document.getElementById('tc_'+ti).getContext('2d');
  const labels=S.map(p=>p.d);
  const ch=new Chart(ctx,{ data:{ labels, datasets:[
    { type:'line', label:'LONG YTM', yAxisID:'y', data:S.map(p=>p.ytm_l),
      borderColor:'#4a9eff', borderWidth:1.3, pointRadius:0, tension:.1 },
    { type:'line', label:'SHORT YTM', yAxisID:'y', data:S.map(p=>p.ytm_s),
      borderColor:'#f87171', borderWidth:1.3, pointRadius:0, tension:.1 },
    { type:'line', label:'스프레드', yAxisID:'y1', data:S.map(p=>p.spread),
      borderColor:'#fbbf24', borderWidth:1, borderDash:[3,2], pointRadius:0, tension:.1 },
  ]},
  options:{ responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ labels:{color:AXC,font:{size:9},boxWidth:10} },
      tooltip:{ mode:'index', intersect:false } },
    scales:{ x:{ ticks:{color:AXC,font:{size:8},maxTicksLimit:6}, grid:{color:GRID} },
      y:{ position:'left', ticks:{color:'#8b93a8',font:{size:8}}, grid:{color:GRID}, title:{display:true,text:'YTM bp',color:AXC,font:{size:8}} },
      y1:{ position:'right', ticks:{color:'#fbbf24',font:{size:8}}, grid:{display:false}, title:{display:true,text:'스프레드 bp',color:'#fbbf24',font:{size:8}} } } }
  });
  _charts.push(ch);
}

const TIER_META = {
  T1:{nm:'T1 · Super', dsc:'전 검증 통과 · 풀사이즈'},
  T2:{nm:'T2 · Strong', dsc:'DSR경계+OOS/code-track · 축소'},
  T3:{nm:'T3 · Diversifier', dsc:'델타/조건부 · 소형'},
  T4:{nm:'T4 · Experimental', dsc:'통계 얇음·함의기반 · 페이퍼'},
  none:{nm:'미평가', dsc:'tier 미부여'},
  REJECT:{nm:'REJECT', dsc:'무결성 위반 · 0'},
};
const TIER_ORDER = ['T1','T2','T3','T4','none','REJECT'];
const _FILTER = new Set();   // 비어있으면 전체, 아니면 선택 tier 만

function _tierOf(it){ return it.tier || (it.tier_eval||{}).tier || 'none'; }

async function load() {
  const dot = document.getElementById('dot'), conn = document.getElementById('conn');
  try {
    const h = await apiGet('/health');
    dot.className = 'conn-dot ' + (h.status === 'ok' ? 'ok' : 'err');
    conn.textContent = h.status === 'ok' ? 'DB 연결됨' : ('오류: ' + (h.detail||''));
  } catch (e) { dot.className='conn-dot err'; conn.textContent='서버 연결 실패'; }

  let data;
  try { data = await apiGet('/quant-house/strategies'); }
  catch (e) { document.getElementById('list').innerHTML =
    '<div class="panel-wrap status">등록부를 불러올 수 없습니다. registry.json 이 비어있을 수 있습니다 ('+ (e.detail||e.message) +').</div>'; return; }

  // 전 전략 평탄화 + tier 그룹화
  // web_visible=false 는 표시 제외(운용자 큐레이션). 백엔드도 거르지만, 구버전
  // 백엔드(미재기동) 대비 프론트에서도 한 번 더 거른다.
  let all = [];
  for (const items of Object.values(data.by_category||{})) {
    items.forEach(it => { CACHE[it.name]=it; all.push(it); });
  }
  all = all.filter(it => it.web_visible !== false);
  const s = data.summary || {};
  // 지표는 *노출 전략* 기준으로 계산(숨김 포함 백엔드 summary 와 어긋나지 않게).
  const dist = {}; all.forEach(x => { const t=_tierOf(x); if(t!=='none') dist[t]=(dist[t]||0)+1; });
  const topTier = TIER_ORDER.find(t => t!=='none' && t!=='REJECT' && dist[t]) || '–';
  document.getElementById('m-total').textContent = all.length;
  document.getElementById('m-live').textContent =
    all.filter(x => x.status==='deployed' || x.status==='active').length;
  document.getElementById('m-toptier').textContent = topTier;
  document.getElementById('m-blocked').textContent =
    all.filter(x => (x.audit||{}).blocked).length;
  document.getElementById('updated').textContent = s.updated ? ('등록부 갱신 ' + s.updated) : '';

  // ── tier 분포 범례 (클릭 = 필터) ──
  const tb = document.getElementById('tierbar'); tb.innerHTML='';
  TIER_ORDER.forEach(t=>{
    const cnt = all.filter(x=>_tierOf(x)===t).length;
    if (!cnt) return;
    const m = TIER_META[t];
    const shortNm = m.nm.includes(' · ') ? m.nm.split(' · ')[1] : m.nm;
    const el = document.createElement('div');
    el.className = 'tl'+(_FILTER.size && !_FILTER.has(t)?' dim':'');
    el.innerHTML = '<span class="tier sm tier-'+t+'">'+(t==='none'?'–':t)+'</span>'+
      '<span class="nm">'+shortNm+'</span>'+
      '<span class="cnt">'+cnt+'</span><span class="dsc">'+m.dsc+'</span>';
    el.onclick = ()=>{ if(_FILTER.has(t))_FILTER.delete(t); else _FILTER.add(t); renderList(all); };
    tb.appendChild(el);
  });

  renderList(all);

  // 목록 최상단 전역 staleness 배너 — forward 1회 호출(목록은 평소 forward 안 부름).
  // 클릭(상세) 없이 즉시 묵음 경고. 실패해도 목록은 정상.
  gLoadStaleBanner();
}

// 전역 staleness 배너 — /quant-house/forward 의 data_consistency 를 그대로 표시(재계산 금지).
// 상세 페이지 배너(showDetail 내 지역변수 _dc/_staleList)와 변수·함수명 무충돌(g 접두사).
async function gLoadStaleBanner(){
  const el = document.getElementById('gStaleBanner');
  if (!el) return;
  let fwd;
  try { fwd = await apiGet('/quant-house/forward'); }
  catch(e){ el.innerHTML=''; return; }          // 조회 실패 → 배너 생략(목록 정상)
  gRenderStaleBanner(el, fwd && fwd.data_consistency);
}

function gRenderStaleBanner(el, dc){
  if (!dc){ el.innerHTML=''; return; }           // data_consistency 없음 → graceful 생략
  const stale = Array.isArray(dc.stale_strategies) ? dc.stale_strategies : [];
  if (stale.length){
    // 1순위: 묵은 전략 존재 → 빨강 sticky 경고(클릭 없이 상단 고정)
    const names = stale.map(function(x){
      return '<b>'+(x.strategy||'?')+'</b>'+(x.lag_days!=null?(' '+x.lag_days+'일'):'');
    }).join(' · ');
    const asof = dc.as_of || dc.db_max || dc.forward_as_of || '?';
    el.innerHTML = '<div class="gstale gs-fail">'+
      '⚠ <b>'+stale.length+'개 전략 신호 묵음</b> — '+names+
      ' (최신 '+asof+' 대비 뒤처짐). <b>이 신호로 거래 금지</b> · cli.py forward 재실행 필요'+
      '</div>';
  } else if (dc.uniform === false){
    // 묵은 전략은 없으나 단계 간 비일관 → 주의(노랑)
    el.innerHTML = '<div class="gstale gs-warn">신호 단계 비일관 — DB 최신 <b>'+
      (dc.db_max||'?')+'</b> vs forward 기준 <b>'+(dc.forward_as_of||'?')+'</b>'+
      (dc.lag_days!=null?(' · lag '+dc.lag_days+'일(참고)'):'')+'</div>';
  } else {
    // 전 전략 최신 → 작은 초록 확인
    el.innerHTML = '<div class="gstale gs-ok">✓ 전 전략 신호 최신 ('+
      (dc.forward_as_of||dc.as_of||'')+')</div>';
  }
}

function renderList(all){
  const wrap = document.getElementById('list'); wrap.innerHTML='';
  if (!all.length){ wrap.innerHTML='<div class="panel-wrap status">아직 등록된 전략이 없습니다.</div>'; return; }
  // tier 섹션 순서대로
  TIER_ORDER.forEach(t=>{
    if (_FILTER.size && !_FILTER.has(t)) return;
    let items = all.filter(x=>_tierOf(x)===t);
    if (!items.length) return;
    // 운영중 우선, 그 안에서 bp/yr 내림차순
    const liveRank = x => (x.status==='deployed'?0:x.status==='active'?1:2);
    items.sort((a,b)=> liveRank(a)-liveRank(b) ||
      ((b.backtest||{}).bp_per_year||0)-((a.backtest||{}).bp_per_year||0));
    const m = TIER_META[t];
    const hdr = document.createElement('div'); hdr.className='tsec';
    hdr.innerHTML = '<span class="tier tier-'+t+'">'+(t==='none'?'–':t)+'</span>'+
      '<span class="lbl">'+m.nm+'</span><span class="sz">'+m.dsc+' · '+items.length+'개</span>'+
      '<span class="ln"></span>';
    wrap.appendChild(hdr);
    items.forEach(it=>{
      const b = it.backtest || {};
      const ab = it.status||'parked';
      // 헤드라인은 항상 bp(파이프라인·사이징무관·정직). won(원안 100억 노치)은 상세에만 참고표기.
      const c1lbl = '연 bp';
      const c1val = b.bp_per_year;
      const c2val = (b.sharpe_annualized!=null) ? b.sharpe_annualized : b.sharpe_per_trade;
      const sizing = (it.tier_eval||{}).sizing || '';
      const exraw = (it.execution||{}).exit || '';
      const exm = exraw.match(/^\[([^\]]+)\]/);
      const extag = exm ? exm[1] : (exraw ? '이벤트고정' : '');
      const row = document.createElement('div'); row.className='crow'; row.dataset.name=it.name;
      row.onclick = ()=>openStrat(it.name);
      row.innerHTML =
        '<span class="tier sm tier-'+_tierOf(it)+'">'+(_tierOf(it)==='none'?'–':_tierOf(it))+'</span>'+
        '<span class="nm">'+it.name+'</span>'+
        '<span class="cat">'+(it.category||'')+'</span>'+
        '<span class="sdot '+ab+'" title="'+ab+'"></span><span class="stat status">'+ab+'</span>'+
        '<span class="spacer"></span>'+
        (extag?('<span class="szlbl" title="청산: '+exraw.replace(/"/g,'')+'">⎋ '+extag+'</span>'):'')+
        (sizing?('<span class="szlbl">'+sizing+'</span>'):'')+
        '<span class="num"><span class="k">'+c1lbl+'</span><br><span class="v '+((c1val||0)>=0?'pos':'neg')+'">'+_fmt(c1val)+'</span></span>'+
        '<span class="num sharpe"><span class="k">Sharpe</span><br><span class="v">'+_fmt(c2val)+'</span></span>';
      wrap.appendChild(row);
    });
  });
}

async function bulkUpdate() {
  const btn=document.getElementById('updBtn'), msg=document.getElementById('updMsg');
  btn.disabled=true; msg.textContent='업데이트 중… (원본 산출물 재인제스트)';
  try {
    const r = await apiPost('/quant-house/refresh');
    const ok=(r.refreshed||[]).length, ng=(r.failed||[]).length;
    msg.textContent = `완료: ${ok}건 갱신${ng?(' · 실패 '+ng):''}${r.ktb_latest?(' · ktb '+r.ktb_latest):''}`;
    await load();
  } catch(e) {
    msg.textContent = '실패: '+(e.detail||e.message);
  } finally { btn.disabled=false; }
}

function _fmt(v,suf){ if(v==null||v==='') return '–'; const n=Number(v);
  if(!isFinite(n)) return String(v);
  return (n>0&&suf!=='%'?'+':'')+ (Math.abs(n)>=100?Math.round(n):n.toFixed(2)) + (suf||''); }

function openStrat(name){
  document.querySelectorAll('.crow.sel').forEach(e=>e.classList.remove('sel'));
  const r=document.querySelector('.crow[data-name="'+name+'"]'); if(r) r.classList.add('sel');
  showDetail(name);
}

async function showDetail(name) {
  const d = document.getElementById('detail');
  _destroyCharts(); _TPATH={};
  // 전략 전환 시 이전 거래 상세 패널 정리
  const tp=document.getElementById('tradeDetail');
  if(tp){ tp.style.display='none'; tp.innerHTML=''; }
  let s; try { s = await apiGet('/quant-house/strategy/'+encodeURIComponent(name)); }
  catch (e) { s = CACHE[name]; }
  const a = s.audit || {}; const cons = s.constraints || {};
  const banner = a.blocked ? '<div class="blocked-banner">⛔ 헌법 워치독 BLOCK — VIOLATION '+(a.n_violation||0)+'건. S9 배포 불가.</div>' : '';
  const consRows = Object.entries(cons).map(([k,val])=>'<tr><td>'+k+'</td><td>'+val+'</td></tr>').join('') || '<tr><td class="status" colspan=2>12제약 선언 없음</td></tr>';

  const tg = s.tier || (s.tier_eval||{}).tier;
  const te = s.tier_eval || {};
  const tierHead = tg ? ('<span class="tier tier-'+tg+'">'+tg+'</span>') : '';
  // tier 근거 패널 (검증 등급의 투명한 설명 — 고무도장 방지)
  // caveat 보유 전략 = 조건부 채택(검증된 강전략 아님). DSR<0.95·vol-conditional 핵심
  //   지표를 작은 글씨에 묻지 않고 별도 경고 칩으로 승격(H2 정직 — 낙관 표기 금지).
  //   전부 tier_eval API 필드 렌더(하드코딩 0). caveat 없는 전략엔 칩 미발동(영향 0).
  const _teDsr = (te.dsr!=null ? te.dsr : null);
  const _dsrWarn = (_teDsr!=null && Number(_teDsr) < 0.95);
  const _condChips = te.caveat ? (
    '<div style="display:inline-flex;gap:8px;flex-wrap:wrap;margin-top:5px">'+
      (_teDsr!=null?('<span class="v-WARN" style="padding:1px 7px;border-radius:5px;font-size:11px">DSR <b>'+_teDsr+'</b>'+(_dsrWarn?' &lt;0.95 미달':'')+'</span>'):'')+
      (te.vol_bet===true?('<span class="v-WARN" style="padding:1px 7px;border-radius:5px;font-size:11px">vol-conditional <span style="opacity:.85">(고변동기 의존·평시 신설알파 아님)</span></span>'):'')+
    '</div>') : '';
  const tierPanel = (tg && (te.basis||te.reason||te.sizing)) ? (
    '<div class="vbanner v-'+({T1:"ok",T2:"ok",T3:"warn",T4:"none",REJECT:"fail"}[tg]||"none")+'" style="margin-bottom:10px">'+

        //   B/C/D 신호 누락 오해가 생긴다(H1 — 엔진↔웹 분기 0). 7전략 균일 표시:
        //   ① active_positions 리스트(>0) → 내역 테이블
        //   ② 빈 리스트([]) → "현재 보유 포지션 없음" 명시(침묵 금지·H2)
        //   ③ 키 자체 부재(엔진 forward 가 이 전략 보유내역 미산출) → 정직 안내(가짜 0 금지)
        h += '<div class="cat-title" style="margin-top:10px">보유 포지션 내역</div>';
        const ap = Array.isArray(j.active_positions) ? j.active_positions : null;
        if (ap && ap.length){
          const _newCnt = ap.filter(function(p){ return p && p.is_new===true; }).length;
          h += '<div class="status" style="margin:-4px 0 6px">총 '+ap.length+'건'+(_newCnt?(' · 오늘 신규 '+_newCnt):'')+'</div>'+
            '<table class="find-tbl"><tbody>'+
            '<tr style="font-weight:600"><td>슬리브 / 신호</td><td>방향</td>'+
            '<td>진입일 · 보유일</td><td>청산예정</td></tr>'+
            ap.map(function(p){
              const isNew = p.is_new===true;
              const sl = p.strategy!=null ? String(p.strategy) : '?';
              const sig = p.signal!=null ? String(p.signal) : '';
              const sd = p.side!=null ? String(p.side) : '';
              const sdCls = /short/i.test(sd) ? 'neg' : (/long/i.test(sd) ? 'pos' : '');
              const ed = p.entry_date!=null ? String(p.entry_date) : '';
              const dh = p.days_held!=null ? p.days_held : '?';
              const hold = p.hold!=null ? p.hold : null;
              const eta = p.exit_eta!=null ? String(p.exit_eta) : '';
              const sc = p.score!=null ? (' <span class="status">score='+p.score+'</span>') : '';
              const newBadge = isNew ? ' <span class="stale-badge" style="background:rgba(26,127,55,.18);color:#3fb950;border-color:rgba(63,185,80,.5)">NEW</span>' : '';
              return '<tr'+(isNew?' style="font-weight:600"':'')+'>'+
                '<td><b>'+sl+'</b> · '+sig+newBadge+'</td>'+
                '<td><span class="'+sdCls+'">'+sd+'</span>'+sc+'</td>'+
                '<td>'+ed+' <span class="status">· '+dh+'일'+(hold!=null?('/'+hold):'')+'</span></td>'+
                '<td>'+eta+'</td></tr>';
            }).join('')+'</tbody></table>'+
            '<div class="status">보유 내역은 엔진 forward 산출(active_positions) 그대로 — 청산예정은 hold 만기 기준(확정청산 시 앞당겨질 수 있음)</div>';
        } else if (ap && ap.length===0){
          // 엔진이 명시적으로 보유 0 산출 — 침묵 대신 정직 표기
          h += '<div class="noart">현재 보유 포지션 없음 (엔진 forward active_positions=0건, 기준일 '+(j.panel_max||fwd.as_of||'')+')</div>';
        } else {
          // active_positions 키 자체 부재 — 엔진 forward 가 이 전략 보유내역을 산출하지 않음.
          //   가짜 0 으로 위장하지 않고 정직하게 미산출을 안내(H2). 엔진 forward 측 보강 필요.
          h += '<div class="noart">이 전략의 보유 포지션 내역은 엔진 forward 가 아직 산출하지 않음(active_positions 필드 부재) — '+
            'cli.py forward 의 보유내역 단일경로 미적용 전략. 보유 여부는 위 청산신호의 보유중 건수 참고.</div>';
        }
        fs.className=''; fs.innerHTML = h;
      }
    }catch(e){ fs.innerHTML = '<span class="noart">forward 조회 실패: '+(e.detail||e.message)+'</span>'; }
  }
}

function renderBacktest(art, regBt){
  const sec = document.getElementById('btSection');
  if (!sec) return;
  if (!art.has_artifact){
    // 아티팩트 차트는 없지만 등록부 backtest 메타가 있으면 핵심 통계를 정직 표시
    // (TRAIN/TEST 분리·OOS 유의성·비용 — 델타트랙 채택 전략은 등록부 메타가 권위).
    let metaTbl = '';
    if (regBt && (regBt.mean_bp_per_trade!=null || regBt.mean_bp_test_oos!=null)){
      const b = regBt;
      const cell=(l,v,suf,sign)=> v==null?'' :
        '<div class="s"><div class="sl">'+l+'</div><div class="sv '+(sign?(Number(v)>=0?'pos':'neg'):'')+'">'+_fmt(v,suf)+'</div></div>';
      metaTbl =
        '<div class="status" style="margin:-4px 0 8px">아티팩트 차트 미생성 — 등록부 backtest 메타(권위·비용후·캐노니컬)를 표시. '+
        (b.metric?('지표: '+b.metric):'')+'</div>'+
        '<div class="sgrid">'+
          cell('거래수', b.n_trades)+
          cell('평균/거래(ALL)', b.mean_bp_per_trade,'bp',1)+
          cell('TRAIN', b.mean_bp_train,'bp',1)+
          cell('TEST/OOS ★', b.mean_bp_test_oos,'bp',1)+
          cell('연 bp', b.bp_per_year,'bp',1)+
          cell('적중률', b.hit_rate)+
          cell('평균보유('+(b.hold_unit||'일')+')', b.mean_hold)+
          cell('비용/거래', b.cost_bp_per_trade,'bp')+
        '</div>'+
        (b.test_t!=null?('<div class="vbanner v-warn" style="margin-top:4px">OOS(TEST 2022+) 유의성: '+
          '<b>'+(b.mean_bp_test_oos>=0?'+':'')+b.mean_bp_test_oos+'bp</b> · t=<b>'+b.test_t+'</b> · p=<b>'+b.test_p+'</b>'+
          (b.train_t!=null?(' &nbsp;|&nbsp; TRAIN +'+b.mean_bp_train+'bp t='+b.train_t+' p='+b.train_p+' <span class="status">(유의X=반전 아님)</span>'):'')+'</div>'):'')+
        (b.variant_note?('<div class="status" style="margin-top:6px">'+b.variant_note+'</div>'):'');
    }
    sec.className=''; sec.innerHTML =
      '<div class="cat-title">백테스트'+(metaTbl?' (등록부 메타 — 차트 미생성)':'')+'</div>'+
      metaTbl+
      (metaTbl?'':('<div class="noart">'+
      (art.note||'백테스트 아티팩트 없음')+
      (art.source_ref?('<br>원본: <code>'+art.source_ref+'</code>'):'')+'</div>'));
    return;
  }
  const st = art.stats||{};
  const S = (l,k,suf,sign)=>{ const v=st[k]; if(v==null) return '';
    const cls = sign?(v>=0?'pos':'neg'):'';
    return '<div class="s"><div class="sl">'+l+'</div><div class="sv '+cls+'">'+_fmt(v,suf)+'</div></div>'; };
  const T = art.trades||[];
  const has = k => T.some(r=>r[k]!=null && r[k]!=='');
  const isPair = has('long')&&has('short');     // OF/OFn/Combine/CV2
  const isStruct = has('struct');                // CV1T 멀티레그(버터플라이/슬로프/베이시스)
  const hasMan = has('pnl_man');                 // Combine 만원 실손익
  const hasSpread = has('spread_in');

  sec.className='';
  const SN = art.name;        // 거래 드릴다운용 전략명
  const N = T.length;
  let head, body, ncol;
  // 자연순 idx (테이블은 최신순). data-ti = 원본 인덱스 → trade-path 조회
  const RT = (idx, cells, t) => '<tr class="trow'+((t&&t.leaked)?' leaked':((t&&t.forced)?' forced':''))+
      '" data-ti="'+idx+'" onclick="toggleTrade(\''+SN+'\','+idx+',this)">'+cells+'</tr>';
  // 보유 표시: 누수(원안 hold stale)면 실제 span_cal(일)을 ⚠ 와 함께
  const HOLD = (t, base) => (t&&t.leaked)
      ? '<span class="leakwarn">⚠'+(t.span_cal!=null?t.span_cal+'일':'초과')+'</span>'
      : (base??'');
  const RSN = (t) => (t&&t.exit_reason||'')+((t&&t.flag)?(' <span class="flagtag">'+t.flag+'</span>'):'');
  if (isStruct){
    ncol=10;
    const _iv = st.intraday;
    head = '<th class="lt">서브</th><th class="lt">구조(레그)</th><th class="lt">진입일 ▲</th><th class="lt">청산일</th><th>'+(_iv?'bar':'보유')+'</th><th>방향</th><th>'+(_iv?'val_in→out':'size')+'</th><th>PnL bp</th><th>비용</th><th class="lt">청산사유</th>';
    // 아티팩트 trades 순서(entry_date 오름차순) 그대로 — 재정렬·reverse 금지(H1·H2: 엔진 산출 순서 보존).
    body = T.map((t,i)=>({t,i})).map(({t,i})=>{ const pp=t.pnl_bp>=0; const lng=t.side>0;
      const hold = t.days_held ?? t.hold_bars ?? '';
      const c7 = _iv ? (_fmt(t.val_in)+'→'+_fmt(t.val_out)) : _fmt(t.size);
      return RT(i,'<td class="lt">'+(t.strategy||(_iv?'CV2-G1':''))+'</td><td class="lt">'+(t.struct||'')+'</td>'+
       '<td class="lt">'+t.entry_date+'</td><td class="lt">'+t.exit_date+'</td><td>'+HOLD(t,hold)+'</td>'+
       '<td class="'+(lng?'lng':'sht')+'">'+(lng?'▲+1':'▼-1')+'</td><td>'+c7+'</td>'+
       '<td class="'+(pp?'pp':'pn')+'">'+_fmt(t.pnl_bp)+'</td><td>'+_fmt(t.cost_bp)+'</td>'+
       '<td class="lt">'+RSN(t)+'</td>', t); }).join('');
  } else if (isPair){
    ncol = 10 + (hasMan?1:0);
    head = '<th class="lt">LONG ▲</th><th class="lt">SHORT ▼</th><th class="lt">방향</th><th class="lt">진입일 ▲</th><th class="lt">청산일</th><th>보유</th>'+
      (hasSpread?'<th>스프레드in</th><th>out</th>':'<th>YTM_n</th><th>YTM_b</th>')+
      '<th>PnL bp</th>'+(hasMan?'<th>PnL 만원</th>':'')+'<th>비용</th><th class="lt">청산사유</th>';
    // 아티팩트 trades 순서(entry_date 오름차순) 그대로 — 재정렬·reverse 금지.
    body = T.map((t,i)=>({t,i})).map(({t,i})=>{ const pp=t.pnl_bp>=0;
      const c1 = hasSpread?_fmt(t.spread_in):_fmt(t.ytm_n);
      const c2 = hasSpread?_fmt(t.spread_out):_fmt(t.ytm_b);
      return RT(i,'<td class="lt lng">'+(t.long||'')+'</td><td class="lt sht">'+(t.short||'')+'</td>'+
       '<td class="lt">'+(t.dir||'')+'</td><td class="lt">'+t.entry_date+'</td><td class="lt">'+t.exit_date+'</td>'+
       '<td>'+HOLD(t,t.days_held)+'</td><td>'+c1+'</td><td>'+c2+'</td>'+
       '<td class="'+(pp?'pp':'pn')+'">'+_fmt(t.pnl_bp)+'</td>'+
       (hasMan?('<td class="'+((t.pnl_man>=0)?'pp':'pn')+'">'+_fmt(t.pnl_man)+'</td>'):'')+
       '<td>'+_fmt(t.cost_bp)+'</td><td class="lt">'+RSN(t)+'</td>', t); }).join('');
  } else {
    ncol=10;
    head = '<th class="lt">종목</th><th class="lt">진입일 ▲</th><th class="lt">청산일</th><th>보유</th><th>방향</th><th>진입bp</th><th>청산bp</th><th>PnL bp</th><th>비용</th><th class="lt">청산사유</th>';
    // 아티팩트 trades 순서(entry_date 오름차순) 그대로 — 재정렬·reverse 금지.
    body = T.map((t,i)=>({t,i})).map(({t,i})=>{ const lng=t.side>0; const pp=t.pnl_bp>=0;
      return RT(i,'<td class="lt">'+(t.code||'')+'</td><td class="lt">'+t.entry_date+'</td>'+
       '<td class="lt">'+t.exit_date+'</td><td>'+HOLD(t,t.days_held)+'</td>'+
       '<td class="'+(lng?'lng':'sht')+'">'+(lng?'▲LONG':'▼SHORT')+'</td>'+
       '<td>'+_fmt(t.entry_bp)+'</td><td>'+_fmt(t.exit_bp)+'</td>'+
       '<td class="'+(pp?'pp':'pn')+'">'+_fmt(t.pnl_bp)+'</td><td>'+_fmt(t.cost_bp)+'</td>'+
       '<td class="lt">'+RSN(t)+'</td>', t); }).join('');
  }
  window._TCOL = ncol;

  const structNote = isStruct
    ? '<div class="status" style="margin:4px 0 8px">⚠ CV1T 는 비지표 페어가 아니라 <b>멀티레그 구조</b>(butterfly·slope·basis). struct 컬럼이 실제 레그 — 예: <code>bf_3_10_30</code>=3-10-30 버터플라이, <code>basis_10y_KTB10F</code>=10년 현물 vs KTB10F 선물 베이시스. PnL bp 는 구조 BPV 기준.</div>' : '';

  const hu = st.hold_unit||'일';
  const ivTag = st.intraday ? '<span class="abadge ab-active" style="margin-left:8px">INTRADAY (5분봉)</span>' : '';
  sec.innerHTML =
    '<div class="cat-title">기초 통계 (비용 후)'+ivTag+'</div>'+
    '<div class="sgrid">'+
      S('거래수','n_trades','')+ S('누적 PnL','total_pnl_bp','bp',1)+
      (st.bp_per_year_clean!=null?S('연 bp ★clean(권위)','bp_per_year_clean','bp',1):S('연 bp','bp_per_year','bp',1))+
      (st.bp_per_year_clean!=null?S('연 bp(전체·강제청산포함)','bp_per_year','bp',1):'')+
      S('적중률','hit_rate','')+
      S('Sharpe(거래·연율)','sharpe_annualized','',1)+ S('MaxDD','max_drawdown_bp','bp',1)+
      S('평균보유('+hu+')','mean_hold','')+ S('거래/주','trades_per_week','')+
      S('평균/거래','mean_bp_per_trade','bp',1)+ S('총비용','total_cost_bp','bp')+
      (st.pnl_eok_per_year!=null?S('연 손익(억)','pnl_eok_per_year','',1):'')+
      (st.total_pnl_man!=null?S('누적 손익(만원)','total_pnl_man','',1):'')+
      (st.per_yr_man_orig!=null?S('연 만원(원안 100억 노치·참고)','per_yr_man_orig','',1):'')+
      (st.sharpe_won_orig!=null?S('Sharpe(원안 won·참고)','sharpe_won_orig','',1):'')+
    '</div>'+
    (st.per_yr_man_orig!=null?'<div class="status" style="margin:-4px 0 10px">권위 지표 = <b>연 bp</b>(사이징 무관·파이프라인 산출). 만원/won 은 <b>원안 100억 노치 기준 참고값</b>이며 <b>배포 sizing(paper/극소)과 무관</b> — 실제 기대손익 아님.</div>':'')+
    // R:R(손익비) 캐비엇 — TP<SL(reward:risk<1) 손익비 역전을 통계 섹션에도 명시(H2). regBt.rr_caveat 만 있을 때.
    ((regBt&&regBt.rr_caveat)?('<div class="vbanner v-warn" style="margin:2px 0 10px">⚖ <b>R:R '+(regBt.rr_caveat.match(/reward:risk\s*([0-9.]+)/i)?regBt.rr_caveat.match(/reward:risk\s*([0-9.]+)/i)[1]:'<1')+' &lt;1 (손익비 역전·승률 의존)</b> — '+regBt.rr_caveat+'</div>'):'')+
    ((regBt&&regBt.t_stat_bp!=null)?('<div class="status" style="margin:-4px 0 10px">거래수익 유의성: t-stat <b>'+regBt.t_stat_bp+'</b>'+(regBt.p_value_bp!=null?(' · p='+regBt.p_value_bp):'')+' <b>(&lt;2 비유의 — 단독 통계검증 불가)</b></div>'):'')+
    ((st.leaked_n||0)>0?('<div class="leak-banner">⚠ <b>누수(보유초과) 거래 '+st.leaked_n+'건</b> 탐지 — 원안 백테스트가 정상청산(target/stop/time) 못 한 포지션이 컷오프까지 누수(실제 수개월~수년 보유, 원안 hold 컬럼은 stale). 전체(full) 수치를 <b>'+_fmt(st.full_inflation_pct,"%")+'</b> 왜곡 → <b>clean 수치가 권위</b>(명세도 clean 사용). 아래 로그에서 빨간 행 = 누수.</div>'):'')+
    (st.cost_model?('<div class="leak-banner" style="background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.30);color:#fbbf24">💸 <b>비용/구성: '+st.cost_model+'</b>'+(st.grid_reopt?(' · <b>그리드 재최적: '+st.grid_reopt+'</b>'):'')+'. 위 표의 연 bp/PnL/Sharpe 는 이 설정 적용 후 값입니다.'+(st.variant_note?(' '+st.variant_note):'')+(st.orig_spec_ref_bp!=null?(' 참고: 원안(bf포함·변동비용·override 명세값) 기준 <b>+'+_fmt(st.orig_spec_ref_bp)+' bp/y</b>.'):'')+'</div>'):'')+
    (st.extra_cost_bp?('<div class="leak-banner" style="background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.30);color:#fbbf24">💸 거래비용 +'+st.extra_cost_bp+'bp 추가('+(st.extra_cost_mode||'')+'), 추가합 '+_fmt(st.extra_cost_total_bp)+'bp — 가산 후 값.</div>'):'')+
    (art.delta_caveat?('<div class="vbanner v-warn" style="margin:2px 0 10px">🧭 <b>델타트랙'+(art.delta_track?(' '+art.delta_track):'')+' — DIRECTIONAL</b>: '+art.delta_caveat+(art.oos&&art.oos.test_t!=null?(' &nbsp;|&nbsp; <b>OOS t='+art.oos.test_t+' p='+art.oos.test_p+'</b>'):'')+'</div>'):'')+
    // 시계열(equity/monthly/drawdown) 있을 때만 차트. 없으면 빈 캔버스 대신 정직 안내
    //   (가짜 빈 차트 금지, H2). sparse(rv 38건)도 trades 누적이면 차트 표시.
    (((art.equity||[]).length||(art.monthly||[]).length||(art.drawdown||[]).length)?(
      '<div class="cat-title">누적 PnL (bp)</div><div class="qchart"><canvas id="cEq"></canvas></div>'+
      '<div class="cat-title">월간 PnL (bp)</div><div class="qchart sm"><canvas id="cMo"></canvas></div>'+
      '<div class="cat-title">Drawdown (bp)</div><div class="qchart sm"><canvas id="cDd"></canvas></div>')
     :('<div class="noart" style="margin:6px 0 12px">누적/월간/Drawdown 시계열 미생성 — sparse 트레이드로그('+art.n_trades+'건) 아티팩트. 아래 진입 포지션 로그로 거래별 확인.</div>'))+
    '<div class="cat-title">진입 포지션 로그 ('+art.n_trades+'건) <span class="status" style="font-weight:400;text-transform:none;letter-spacing:0">— 진입일 오름차순(엔진 산출 순서 그대로, 최신 거래는 맨 아래)</span></div>'+ structNote +
    '<div class="tlog-wrap"><table class="tlog"><thead><tr>'+head+
    '</tr></thead><tbody>'+body+'</tbody></table></div>';

// ═══════════════════ OPERATION 운용 콘솔 (engine.positions 전달자 — 표시·기록만) ═══════════════════
// H1: 모든 수치·정책·자문은 /quant-house/ops/* API 응답 그대로 — 프론트 하드코딩 0.
// H2: stale·legs_note·policy_note·Kelly caveat·advisory_note 전부 원문 노출(자문≠명령).
const OPS_KEY_LS = 'qh_ops_key';
let _opsInit=false, _OPS_IB=null, _OPS_BOARD=null, _OPS_LEDGER=null;
const _OPS_VETO = new Set();
const _OPS_SIZES = {};   // candidate_key → 사용자가 입력한 size (재렌더 보존)

function switchTab(t){
  document.getElementById('view-strat').style.display = (t==='strat')?'':'none';
  document.getElementById('view-ops').style.display = (t==='ops')?'':'none';
  document.getElementById('tab-strat').classList.toggle('active', t==='strat');
  document.getElementById('tab-ops').classList.toggle('active', t==='ops');
  if (t==='ops' && !_opsInit){ _opsInit=true; opsRenderManual(); opsLoad(); }
}

function _esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _krw(v){ return (v==null||!isFinite(Number(v)))?'–':Number(v).toLocaleString('ko-KR'); }
function _setMsg(m,err){ const el=document.getElementById('opsMsg'); if(!el)return; el.textContent=m||''; el.style.color=err?'var(--red)':''; }

// ── 쓰기 키 UX: 최초 쓰기 시 프롬프트 → localStorage → X-QH-KEY 헤더 ──
function _opsAskKey(){
  let k = localStorage.getItem(OPS_KEY_LS);
  if (!k){
    k = prompt('운용 쓰기 키(X-QH-KEY) 입력 — server/.env 의 QH_OPS_KEY 와 동일 값');
    if (k){ k=k.trim(); localStorage.setItem(OPS_KEY_LS, k); }
  }
  return k;
}
function opsResetKey(){ localStorage.removeItem(OPS_KEY_LS); _setMsg('저장된 키 삭제 — 다음 쓰기 시 다시 묻습니다'); }

async function opsPost(path, body){
  const base = await getApiBase();
  if (!base) throw new Error('API URL 미설정 — 서버/터널 확인');
  const key = _opsAskKey();
  if (!key) throw new Error('키 미입력 — 쓰기 취소');
  const res = await fetch(base+path, { method:'POST',
    headers:{ 'Content-Type':'application/json', 'X-QH-KEY':key, 'ngrok-skip-browser-warning':'1' },
    body: JSON.stringify(body||{}) });
  let j=null; try{ j=await res.json(); }catch(e){}
  if (res.status===403){
    const d=(j&&j.detail)||'쓰기 거부';
    if (/불일치/.test(d)) localStorage.removeItem(OPS_KEY_LS);   // 틀린 키 폐기 → 재입력 유도
    throw new Error('403 — '+d);
  }
  if (!res.ok) throw new Error('서버 오류 '+res.status+((j&&j.detail)?(' — '+j.detail):''));
  return j;
}

async function opsLoad(){
  _setMsg('불러오는 중…');
  try{
    const [ib, bd, lg] = await Promise.all([
      apiGet('/quant-house/ops/inbox'),
      apiGet('/quant-house/ops/board'),
      apiGet('/quant-house/ops/ledger')]);
    _OPS_IB=ib; _OPS_BOARD=bd; _OPS_LEDGER=lg;
    renderOpsInbox(); renderOpsBoard(); _setMsg('');
  }catch(e){
    const m=_esc(e.detail||e.message);
    _setMsg('조회 실패', true);
    document.getElementById('opsInbox').innerHTML='<div class="panel-wrap status">인박스 조회 실패 — '+m+'</div>';
    document.getElementById('opsBoard').innerHTML='<div class="panel-wrap status">보드 조회 실패 — '+m+'</div>';
  }
}

async function _opsRefreshBoard(openId){
  const [bd, lg] = await Promise.all([
    apiGet('/quant-house/ops/board'), apiGet('/quant-house/ops/ledger')]);
  _OPS_BOARD=bd; _OPS_LEDGER=lg; renderOpsBoard();
  if (openId) opsToggleDetail(openId);
}

// ── ① 신호 인박스 — default-enter, 부결만 선택 ──
function _captureSizes(){
  if (!_OPS_IB) return;
  (_OPS_IB.candidates||[]).forEach(function(c,i){
    const el=document.getElementById('ops_sz_'+i);
    if (el && el.value!=='') _OPS_SIZES[c.key]=el.value; else delete _OPS_SIZES[c.key];
  });
}

function renderOpsInbox(){

    ' ≠ forward as_of '+_esc(ib.as_of)+'. 신호가 요청일보다 묵음 — cli.py forward 재실행 전 확정 비권장.</div>';
  h+='<div class="status" style="margin-bottom:8px">forward as_of <b>'+_esc(ib.as_of||'–')+'</b> · 후보 <b>'+
    (ib.n_candidates!=null?ib.n_candidates:0)+'</b>건 · '+_esc(ib.note||'')+'</div>';
  if (!(ib.candidates||[]).length){
    h+='<div class="noart">오늘 진입 후보 없음 (deployed/active 전략의 forward new_entries 기준)</div>';
    w.innerHTML=h; return;
  }
  ib.candidates.forEach(function(c,i){
    const veto=_OPS_VETO.has(c.key);
    const sz=c.sizing||{}, bud=sz.basis_budget||{}, kel=sz.basis_kelly||{}, rec=sz.basis_recency||{}, hc=sz.hard_caps||{};
    const pol=c.policy;
    const rawTxt=Object.entries(c.raw||{}).map(function(kv){return kv[0]+'='+kv[1];}).join(' · ');
    const szSaved=_OPS_SIZES[c.key]!=null?_OPS_SIZES[c.key]:'';
    h+='<div class="ops-card'+(veto?' vetoed':'')+'">'+
      '<button class="btn veto'+(veto?' on':'')+'" onclick="opsToggleVeto('+i+')">'+(veto?'부결 해제':'✕ 부결')+'</button>'+
      '<div class="hd"><span class="tier sm tier-'+_esc(c.tier||'none')+'">'+_esc(c.tier||'–')+'</span>'+
        '<span class="nm">'+_esc(c.strategy)+'</span>'+
        '<span class="abadge ab-'+_esc(c.status||'parked')+'">'+_esc(c.status||'')+'</span>'+
        '<span class="status">'+_esc(c.key)+'</span></div>'+
      '<div class="status" style="margin-bottom:6px">신호(raw): '+_esc(rawTxt)+'</div>'+
      (c.legs ? ('<table class="find-tbl" style="margin-bottom:4px"><tbody>'+
          c.legs.map(function(l){ return '<tr><td style="width:170px">'+_esc(l.key)+
            ' <span class="status">('+_esc(l.kind)+')</span></td><td><span class="'+(l.side>0?'pos':'neg')+'">'+
            (l.side>0?'▲ +1':'▼ -1')+'</span> × w '+l.weight+'</td></tr>'; }).join('')+
          '</tbody></table><div class="status" style="margin-bottom:6px">'+_esc(c.legs_note||'')+'</div>')
        : ('<div class="vbanner v-fail">legs 구성 불가 — '+_esc(c.legs_note||'')+' (확정 시 failed 처리됨)</div>'))+
      (pol ? ('<div class="status" style="margin-bottom:4px">확정 청산정책 <b>'+_esc(pol.key)+'</b> — TP '+
          (pol.tp!=null?('+'+pol.tp+'bp'):'없음')+' / SL '+(pol.sl!=null?('-'+pol.sl+'bp'):'없음')+
          ' / 보유 ≤'+pol.hold+'일'+(c.policy_note?(' · '+_esc(c.policy_note)):'')+'</div>')
        : ('<div class="vbanner v-warn">확정정책 없음 — '+_esc(c.policy_note||'수동 관리')+'</div>'))+
      (sz.error ? ('<div class="vbanner v-warn">사이징 자문 실패: '+_esc(sz.error)+'</div>') : (
        '<div class="szrow">'+
        '<div class="szbox"><div class="l">① budget (캡 산술)</div><div class="v">'+_krw(bud.suggest_krw)+'</div>'+
          '<div class="n">잔여예산 '+_krw(bud.remaining_strategy_budget_krw)+' · '+_esc(bud.note||'')+'</div></div>'+
        '<div class="szbox"><div class="l">② fractional Kelly</div><div class="v">'+_krw(kel.suggest_krw)+'</div>'+
          '<div class="n">'+(kel.win!=null?('win '+kel.win+' · b '+kel.b+' · f* '+kel.kelly_full+' → 적용 '+kel.fraction_applied+' (캡 '+kel.fraction_cap+')<br>'):'')+
          _esc(kel.note||'')+(kel.caveat?((kel.note?'<br>':'')+'⚠ '+_esc(kel.caveat)):'')+'</div></div>'+
        '<div class="szbox"><div class="l">③ 최근성과 보정</div><div class="v">'+_krw(rec.suggest_krw)+'</div>'+
          '<div class="n">'+(rec.verdict?('판정 '+_esc(rec.verdict)+(rec.factor!=null?(' × '+rec.factor):'')+'<br>'):'')+_esc(rec.note||'')+'</div></div>'+
        '</div>'+
        '<div class="status">상한: per-trade '+_krw(hc.per_trade_krw)+' · 전략 한쪽 합 '+_krw(hc.strategy_oneside_krw)+

    '<span class="status">확정/부결 모두 decisions.jsonl 감사기록(append-only)</span></div>'+
    '<div id="opsConfirmResult"></div>';
  w.innerHTML=h;
}

function opsToggleVeto(i){
  const c=(_OPS_IB&&_OPS_IB.candidates||[])[i]; if(!c) return;
  _captureSizes();
  if (_OPS_VETO.has(c.key)) _OPS_VETO.delete(c.key); else _OPS_VETO.add(c.key);
  renderOpsInbox();
}

async function opsConfirm(){
  const ib=_OPS_IB; if(!ib) return;
  _captureSizes();
  if (ib.stale_vs_request && !confirm('⚠ 신호가 stale(요청일 ≠ forward as_of)입니다. 그래도 확정합니까?')) return;
  const sizes={};
  Object.keys(_OPS_SIZES).forEach(function(k){ const n=Number(_OPS_SIZES[k]); if(isFinite(n)&&n>0) sizes[k]=n; });
  const body={ date: ib.date||ib.as_of, vetoed_keys: Array.from(_OPS_VETO) };
  if (Object.keys(sizes).length) body.sizes=sizes;
  _setMsg('확정 중…');
  try{
    const r=await opsPost('/quant-house/ops/confirm', body);
    const el=document.getElementById('opsConfirmResult');
    if (el) el.innerHTML='<div class="vbanner '+((r.failed||[]).length?'v-warn':'v-ok')+'">'+
      '진입 <b>'+(r.opened||[]).length+'</b>건'+((r.opened||[]).length?(' ['+r.opened.join(', ')+']'):'')+
      ' · 부결 '+(r.vetoed||[]).length+'건'+
      ((r.skipped||[]).length?('<br>중복 스킵: '+r.skipped.map(function(s){return _esc(s.key)+' — '+_esc(s.reason);}).join(' · ')):'')+
      ((r.failed||[]).length?('<br><b>실패</b>: '+r.failed.map(function(s){return _esc(s.key)+' — '+_esc(s.reason);}).join(' · ')):'')+
      '<br><span class="status">'+_esc(r.note||'')+'</span></div>';
    _setMsg('');
    await _opsRefreshBoard();
  }catch(e){ _setMsg('확정 실패: '+e.message, true); }
}

                 (l.px_chg>=0?'+':'')+l.px_chg+'pt</span>'):''))
            : '<span class="status">마크 없음</span>')
        : '<span class="status">–</span>';
      return '<tr><td>'+_esc(l.key)+' <span class="status">('+_esc(l.kind)+')</span></td>'+
        '<td><span class="'+(l.side>0?'pos':'neg')+'">'+(l.side>0?'+1':'-1')+'</span>×'+l.weight+'</td>'+
        '<td>'+entryCell+'</td>'+
        '<td>'+curCell+'</td>'+
        '<td><input class="ops-in sm" id="ovr_'+_esc(id)+'_'+li+'" type="number" step="'+(fut?'0.01':'any')+'" value="'+
          (ovrVal!=null?ovrVal:'')+'" placeholder="'+(fut?'DB 선물가 사용':'DB 종가 사용')+'">'+
        ' <span class="status">'+(fut?'가격(pt)':'금리(%)')+'</span>'+
        ' <button class="btn" style="padding:2px 8px;font-size:10px" onclick="opsOverride(\''+_esc(id)+'\','+li+',false)">적용</button>'+
        ' <button class="btn" style="padding:2px 8px;font-size:10px" onclick="opsOverride(\''+_esc(id)+'\','+li+',true)">해제</button>'+
        (ovrVal!=null?(' <span class="ovrtag">OVERRIDE 중 '+ovrVal+'</span>'):'')+
        '</td></tr>';
    }).join('')+'</tbody></table>'+
    '<div class="status" style="margin-bottom:8px">override 적용 시 진입 마크 원값 불변·감사로그 기록 · 마크 반영은 다음 [마크 갱신]부터'+
    ' (fut leg 는 <b>가격</b>으로 수정 — 금리 아님).</div>'+
    (hasFut?('<div class="status" style="margin-bottom:8px">fut bp 는 <b>proxy-bp</b>(가격÷듀레이션 환산) — '+
      '진짜 implied bp 아님 · 운용 판단은 가격(pt)·KRW 권장. '+
      '⚠ 선물 만기 롤 시 자동 합성 없음 — 청산 후 재진입.</div>'):'')+
    '<div class="ctrl-row">청산 확정: '+
    '<select class="ops-in" id="cls_r_'+_esc(id)+'"><option>TP</option><option>SL</option><option>TIME</option><option selected>MANUAL</option></select>'+
    ' <input class="ops-in" id="cls_p_'+_esc(id)+'" type="number" step="any" placeholder="실체결 pnl_bp (비우면 마지막 마크)" style="width:220px">'+
    ' <button class="btn danger" onclick="opsClose(\''+_esc(id)+'\')">청산 확정</button>'+
    ' <span class="status">자동 청산 없음 — 확정은 사용자</span></div>';
  box.innerHTML=h;
}

async function opsOverride(id, li, clear){
  const p=_ledgerPos(id); if(!p||!p.legs[li]) return;
  const leg=p.legs[li];
  let val=null;
  if (!clear){
    const el=document.getElementById('ovr_'+id+'_'+li);
    if (!el || el.value===''){ _setMsg('override 값 입력 필요 (해제는 [해제] 버튼)', true); return; }
    val=Number(el.value);
    if (!isFinite(val)){ _setMsg('override 값이 숫자가 아님', true); return; }
  }
  _setMsg('override 저장 중…');
  try{
    const r=await opsPost('/quant-house/ops/override', {pos_id:id, leg_key:leg.key, 'yield':val});
    const f=r.field||'override_yield', unit=(f==='override_price')?' (가격 pt)':' (금리 %)';
    _setMsg(id+' '+leg.key+' override '+(r[f]!=null?('= '+r[f]+unit):'해제')+
      (r.db_value_at_set!=null?(' (당시 DB '+r.db_value_at_set+')'):''));
    await _opsRefreshBoard(id);
  }catch(e){ _setMsg('override 실패: '+e.message, true); }
}

async function opsClose(id){
  const rs=document.getElementById('cls_r_'+id), pe=document.getElementById('cls_p_'+id);
  const reason=rs?rs.value:'MANUAL';
  const pv=pe?pe.value:'';
  if (!confirm(id+' 청산 확정 — 사유 '+reason+(pv!==''?(', pnl '+pv+'bp(실체결 보고)'):' (pnl=마지막 마크)')+'?')) return;
  const body={pos_id:id, reason:reason};
  if (pv!=='') body.pnl_bp=Number(pv);
  _setMsg('청산 기록 중…');
  try{
    const r=await opsPost('/quant-house/ops/close', body);
    const c=r.closed||{};
    _setMsg(id+' closed — '+c.reason+' '+c.pnl_bp+'bp / '+_krw(c.pnl_krw)+' KRW (출처 '+c.pnl_source+')');
    await _opsRefreshBoard();
  }catch(e){ _setMsg('청산 실패: '+e.message, true); }
}

async function opsMark(){
  _setMsg('마크 중… (전 open 포지션 일일 평가 — canonical_pnl 단일경로)');
  try{
    const r=await opsPost('/quant-house/ops/mark', {});
    let m='마크 '+r.n_marked+'건 ('+r.date+')';
    if ((r.errors||[]).length) m+=' · 실패 '+r.errors.length+'건: '+
      r.errors.map(function(e){return e.id+' '+e.reason;}).join(' / ');
    const sl=(r.marked||[]).filter(function(x){return (x.stale_legs||[]).length;});
    if (sl.length) m+=' · ⚠ stale leg(직전 종가 사용): '+sl.map(function(x){return x.id;}).join(',');
    const ov=(r.marked||[]).filter(function(x){return (x.override_legs||[]).length;});
    if (ov.length) m+=' · OVR 적용: '+ov.map(function(x){return x.id;}).join(',');
    _setMsg(m, (r.errors||[]).length>0);
    await _opsRefreshBoard();
  }catch(e){ _setMsg('마크 실패: '+e.message, true); }
}

// ── ④ 수기 편입 ──
function opsRenderManual(){
  const w=document.getElementById('opsManual'); if(!w) return;
  w.innerHTML=
    '<div class="ctrl-row" style="margin-bottom:8px">'+
      '<input class="ops-in" id="mn_tag" placeholder="전략명/태그 (registry 전략명이면 확정정책 자동 매치)" style="width:300px">'+
      '<input class="ops-in sm" id="mn_date" type="date">'+
      '<select class="ops-in" id="mn_szmode" onchange="opsSizeMode()">'+
        '<option value="dv01">사이징: DV01 원/bp</option>'+
        '<option value="contracts">사이징: 계약수 (선물 전용)</option></select>'+
      '<input class="ops-in" id="mn_size" type="number" step="any" placeholder="size DV01 원/bp" style="width:160px">'+
    '</div>'+
    '<div id="mn_legs"></div>'+
    '<div class="ctrl-row" style="margin:6px 0 10px">'+
      '<button class="btn" onclick="opsAddLeg()">+ 레그 추가</button>'+
      '<input class="ops-in" id="mn_note" placeholder="노트" style="flex:1">'+
      '<button class="btn upd" onclick="opsManualSubmit()">수기 편입</button></div>'+
    '<div class="status">현물: entry_yield(%) 비우면 진입일 asof DB 종가 자동 해소(미해소 시 정직 에러). '+
    '선물(3선/10선/30선): <b>가격(pt)</b> 입력(예 104.20) — 비우면 ktbf_basis 선물가 asof · '+
    '사이징은 DV01 원/bp 또는 <b>계약수</b>(1계약=액면 1억) 중 하나만(동시 지정은 엔진이 거부). '+
    '⚠ 선물 만기 롤 시 자동 합성 없음 — 청산 후 재진입. '+
    '정책: registry 확정정책 매치 → 없으면 헌법 외곽 기본(TP15/SL5/63d) 적용·표기. '+
    '대전제(SL≤5·TP≤15·보유≤63·손익비≥1) 위반 정책은 엔진이 즉시 거부.</div>';
  const dt=document.getElementById('mn_date');
  if (dt) dt.value=new Date().toISOString().slice(0,10);
  opsAddLeg(); opsAddLeg();
}

function opsSizeMode(){
  const m=document.getElementById('mn_szmode'), s=document.getElementById('mn_size');
  if (m && s) s.placeholder = m.value==='contracts' ? '계약수 (예 10)' : 'size DV01 원/bp';
}

function opsAddLeg(){
  const wrap=document.getElementById('mn_legs'); if(!wrap) return;
  const d=document.createElement('div'); d.className='mleg';
  d.innerHTML='<select class="ops-in" data-f="kind" onchange="opsLegKind(this)">'+
      '<option value="">현물 — kind 자동</option><option>bond</option><option>label</option><option>rate</option><option>struct</option>'+
      '<option value="fut">선물 (가격)</option></select>'+
    '<input class="ops-in" placeholder="key (KR코드 / n년지표 / struct명 / rate alias)" data-f="key">'+
    '<select class="ops-in" data-f="futkey" style="display:none"><option>3선</option><option>10선</option><option>30선</option></select>'+
    '<select class="ops-in" data-f="side"><option value="1">+1 매수</option><option value="-1">-1 매도</option></select>'+
    '<input class="ops-in" data-f="weight" type="number" step="any" placeholder="w=1">'+
    '<input class="ops-in" data-f="entry_yield" type="number" step="any" placeholder="entry_yield % (선택)">'+
    '<input class="ops-in" data-f="entry_price" type="number" step="0.01" placeholder="진입 가격(pt, 예 104.20 — 비우면 DB 선물가)" style="display:none;width:250px">'+
    '<button class="btn danger" onclick="this.parentNode.remove()">삭제</button>';
  wrap.appendChild(d);
}

function opsLegKind(sel){
  const d=sel.parentNode, fut=(sel.value==='fut');
  const q=function(f){ return d.querySelector('[data-f="'+f+'"]'); };
  q('key').style.display=fut?'none':'';
  q('futkey').style.display=fut?'':'none';
  q('entry_yield').style.display=fut?'none':'';
  q('entry_price').style.display=fut?'':'none';
}

async function opsManualSubmit(){
  const tag=(document.getElementById('mn_tag').value||'').trim();
  const date=document.getElementById('mn_date').value;
  const size=Number(document.getElementById('mn_size').value);
  const szmodeEl=document.getElementById('mn_szmode');
  const mode=szmodeEl?szmodeEl.value:'dv01';
  const legs=[]; let hasFut=false;
  document.querySelectorAll('#mn_legs .mleg').forEach(function(d){
    const g=function(f){ const el=d.querySelector('[data-f="'+f+'"]'); return el?el.value:''; };
    const fut=(g('kind')==='fut');
    const key=fut?g('futkey'):g('key').trim();
    if (!key) return;
    const l={ key:key, side:Number(g('side')) };
    if (g('kind')) l.kind=g('kind');
    if (g('weight')!=='') l.weight=Number(g('weight'));
    if (fut){
      hasFut=true;
      if (g('entry_price')!=='') l.entry_price=Number(g('entry_price'));
    } else if (g('entry_yield')!=='') l.entry_yield=Number(g('entry_yield'));
    legs.push(l);
  });
  if (!tag || !date || !isFinite(size) || size<=0 || !legs.length){
    _setMsg('전략/태그 · 진입일 · size(>0) · 레그 1개 이상 필요', true); return; }
  if (mode==='contracts' && !hasFut){
    _setMsg('계약수 사이징은 선물 leg 포지션 전용 — 현물은 DV01 원/bp 선택', true); return; }
  const body={strategy_or_tag:tag, legs:legs, entry_date:date,
              note:document.getElementById('mn_note').value||''};
  if (mode==='contracts') body.size_contracts=size; else body.size_dv01_krw=size;
  _setMsg('수기 편입 중…');
  try{
    const p=await opsPost('/quant-house/ops/manual', body);
    _setMsg('편입 완료 — '+p.id+' ('+p.strategy+', '+p.entry_date+') · 정책 '+(p.policy?p.policy.key:'없음')+
      (p.size_contracts!=null?(' · '+p.size_contracts+'계약 → DV01 '+_krw(p.size_dv01_krw)+'원/bp'):'')+
      (p.policy_note?(' · '+p.policy_note):''));
    await _opsRefreshBoard();
  }catch(e){ _setMsg('수기 편입 실패: '+e.message, true); }
}

load();
</script>
