<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시장 수급 — 금리 도구 모음</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    /* ── 검색 ── */
    .search-wrap {
      position: relative;
      max-width: 360px;
    }
    .search-input {
      width: 100%;
      background: var(--s2);
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      color: var(--t1);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--blue); }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--s2);
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      z-index: 100;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .search-item {
      padding: 8px 12px;
      cursor: pointer;
      transition: background .1s;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .search-item:hover, .search-item.focused { background: var(--s3); }
    .search-item-name { font-size: 12px; color: var(--t1); }
    .search-item-code { font-size: 10px; color: var(--t3); flex-shrink: 0; }
    .search-item-short {
      font-size: 10px;
      background: rgba(74,158,255,.12);
      color: var(--blue);
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
    }

    /* ── 선택된 채권 정보 ── */
    .bond-info-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: .75rem 1.125rem;
      background: var(--s1);
      border: .5px solid var(--bd);
      border-radius: var(--r);
      margin-bottom: 12px;
    }
    .bond-info-name { font-size: 14px; font-weight: 600; color: var(--t1); }
    .bond-info-code { font-size: 11px; color: var(--t3); }
    .bond-info-sep  { color: var(--bd2); }

    /* ── 시리즈 토글 ── */
    .series-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .series-btn {
      background: none;
      border: .5px solid var(--bd2);
      border-radius: var(--rs);
      color: var(--t2);
      font-size: 11px;
      cursor: pointer;
      padding: 3px 10px;
      transition: all .15s;
    }
    .series-btn.on {
      border-color: transparent;
      color: #fff;
    }

    /* ── 테이블 ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .data-table th {
      font-size: 10px;
      font-weight: 500;
      color: var(--t3);
      padding: 5px 10px;
      text-align: right;
      border-bottom: .5px solid var(--bd);
      white-space: nowrap;
    }
    .data-table th:first-child { text-align: left; }
    .data-table td {
      padding: 5px 10px;
      color: var(--t2);
      border-bottom: .5px solid rgba(255,255,255,.03);
      text-align: right;
      white-space: nowrap;
    }
    .data-table td:first-child { text-align: left; color: var(--t1); }
    .data-table tr:hover td { background: rgba(255,255,255,.02); }
    .data-table tr:last-child td { border-bottom: none; }

    .pos { color: var(--red) !important; }
    .neg { color: var(--blue) !important; }

    .empty-state {
      display: flex; align-items: center; justify-content: center;
      height: 260px; color: var(--t3); font-size: 12px;
    }
  </style>
</head>
<body>
<div class="container">

  <nav class="nav">
    <a href="/" class="nav-brand">금리 도구 모음</a>
    <div class="nav-links">
      <a href="/tools/cd91/"      class="nav-link">CD91 전망</a>
      <a href="/tools/dashboard/" class="nav-link">금리 대시보드</a>
      <a href="/tools/supply/"    class="nav-link active">시장 수급</a>
      <a href="/tools/db/"        class="nav-link">DB 탐색</a>
    </div>
  </nav>

  <div class="hdr">
    <h1>시장 수급</h1>
    <p>ktb_trade_flow_features — 채권별 수급 흐름</p>
  </div>

  <!-- 검색 -->
  <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text"
             placeholder="채권 검색 (예: 10-1, KR1030...)"
             oninput="onSearch(this.value)"
             onkeydown="onKeyDown(event)"
             autocomplete="off">
      <div class="search-dropdown" id="searchDropdown" style="display:none;"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:11px;color:var(--t3);">표시 행</span>
      <select id="limitSel" onchange="reloadFlow()"
        style="background:var(--s2);border:.5px solid var(--bd2);border-radius:var(--rs);
               color:var(--t1);font-size:11px;padding:4px 8px;outline:none;">
        <option value="100">100</option>
        <option value="250" selected>250</option>
        <option value="500">500</option>
        <option value="1000">1000</option>
      </select>
    </div>
  </div>

  <!-- 선택된 채권 -->
  <div class="bond-info-bar" id="bondInfoBar" style="display:none;"></div>

  <!-- 시리즈 선택 -->
  <div class="series-bar" id="seriesBar"></div>

  <!-- 차트 -->
  <div class="chart-card" id="chartCard" style="display:none;margin-bottom:12px;">
    <div style="position:relative;height:320px;">
      <canvas id="flowChart"></canvas>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="panel" id="tableCard" style="display:none;">
    <div style="overflow-x:auto;">
      <div id="tableArea"><div class="empty-state">채권을 검색하세요</div></div>
    </div>
  </div>

  <div id="emptyState" class="panel">
    <div class="empty-state">채권명 또는 종목코드로 검색하세요 (예: 10-1, 20-5, KR103...)</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/assets/js/api.js"></script>
<script>
// ── 상태 ───────────────────────────────────────────────────────
let selectedBond = null;   // { bond_code, bond_name }
let flowData     = null;   // { rows, date_col, cols (numeric) }
let flowChart    = null;
let activeSeries = new Set();
let searchTimer  = null;
let dropFocusIdx = -1;

// Chart.js 색상 팔레트
const PALETTE = [
  '#4a9eff','#34d399','#fbbf24','#f87171','#a78bfa',
  '#38bdf8','#fb923c','#4ade80','#e879f9','#facc15',
];

// ── 검색 ───────────────────────────────────────────────────────
function onSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) { hideDropdown(); return; }
  searchTimer = setTimeout(() => fetchSearch(val.trim()), 280);
}

async function fetchSearch(q) {
  try {
    const data = await apiGet(`/supply/search?q=${encodeURIComponent(q)}`);
    renderDropdown(data.results || []);
  } catch(e) {
    hideDropdown();
  }
}

function renderDropdown(results) {
  const dd = document.getElementById('searchDropdown');
  if (!results.length) { hideDropdown(); return; }
  dd.innerHTML = '';
  results.forEach((r, i) => {
    const short = extractShort(r.bond_name);
    const div = document.createElement('div');
    div.className = 'search-item';
    div.dataset.idx = i;
    div.innerHTML = `
      <span class="search-item-name">${r.bond_name}</span>
      ${short ? `<span class="search-item-short">${short}</span>` : ''}
      <span class="search-item-code">${r.bond_code}</span>`;
    div.onclick = () => selectBond(r);
    dd.appendChild(div);
  });
  dd.style.display = 'block';
  dropFocusIdx = -1;
}

function hideDropdown() {
  document.getElementById('searchDropdown').style.display = 'none';
  dropFocusIdx = -1;
}

// bond_name에서 괄호 안 단축명 추출: "국고채권(10-1)" → "10-1"
function extractShort(name) {
  const m = name && name.match(/\(([^)]+)\)/);
  return m ? m[1] : '';
}

// 키보드 탐색
function onKeyDown(e) {
  const items = document.querySelectorAll('.search-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    dropFocusIdx = Math.min(dropFocusIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    dropFocusIdx = Math.max(dropFocusIdx - 1, 0);
  } else if (e.key === 'Enter' && dropFocusIdx >= 0) {
    e.preventDefault();
    items[dropFocusIdx].click();
    return;
  } else if (e.key === 'Escape') {
    hideDropdown(); return;
  }
  items.forEach((el, i) => el.classList.toggle('focused', i === dropFocusIdx));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) hideDropdown();
});

// ── 채권 선택 ───────────────────────────────────────────────────
function selectBond(bond) {
  selectedBond = bond;
  document.getElementById('searchInput').value = bond.bond_name;
  hideDropdown();
  loadFlow();
}

// ── 수급 데이터 로드 ────────────────────────────────────────────
async function loadFlow() {
  if (!selectedBond) return;
  const limit = document.getElementById('limitSel').value;

  // 선택 채권 정보 표시
  const short = extractShort(selectedBond.bond_name);
  document.getElementById('bondInfoBar').style.display = 'flex';
  document.getElementById('bondInfoBar').innerHTML = `
    <span class="bond-info-name">${selectedBond.bond_name}</span>
    ${short ? `<span class="bond-info-sep">·</span><span style="font-size:12px;color:var(--blue);">${short}</span>` : ''}
    <span class="bond-info-sep">·</span>
    <span class="bond-info-code">${selectedBond.bond_code}</span>`;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('tableArea').innerHTML =
    '<div class="empty-state" style="height:180px;">로딩 중...</div>';
  document.getElementById('tableCard').style.display = 'block';

  try {
    const data = await apiGet(
      `/supply/flow?bond_code=${encodeURIComponent(selectedBond.bond_code)}&limit=${limit}`
    );

    if (!data.rows?.length) {
      document.getElementById('tableArea').innerHTML = '<div class="empty-state">데이터 없음</div>';
      return;
    }

    // 날짜 컬럼 / 숫자 컬럼 분류
    const dateCol   = data.date_col;
    const allCols   = Object.keys(data.rows[0]);
    const skipCols  = new Set(['bond_code','bond_name', dateCol].filter(Boolean));
    const numCols   = allCols.filter(c => !skipCols.has(c) && !isNaN(parseFloat(data.rows[0][c])));

    // 시계열 정렬 (오름차순)
    const rows = dateCol
      ? [...data.rows].reverse()
      : data.rows;

    flowData = { rows, dateCol, allCols, numCols };

    // 기본 활성 시리즈: 처음 5개
    if (activeSeries.size === 0 || selectedBond !== selectedBond) {
      activeSeries = new Set(numCols.slice(0, 5));
    }

    renderSeriesBar(numCols);
    renderChart();
    renderTable(rows, allCols, dateCol, numCols);

  } catch(e) {
    document.getElementById('tableArea').innerHTML =
      `<div class="empty-state" style="color:var(--red);">${e.message}</div>`;
  }
}

function reloadFlow() {
  activeSeries = new Set();   // 행 수 변경 시 시리즈 초기화
  loadFlow();
}

// ── 시리즈 토글 바 ──────────────────────────────────────────────
function renderSeriesBar(cols) {
  const bar = document.getElementById('seriesBar');
  bar.innerHTML = '';
  cols.forEach((col, i) => {
    const color = PALETTE[i % PALETTE.length];
    const btn   = document.createElement('button');
    btn.className = 'series-btn' + (activeSeries.has(col) ? ' on' : '');
    btn.textContent = col;
    btn.style.borderColor = activeSeries.has(col) ? color : '';
    btn.style.background  = activeSeries.has(col) ? color + '22' : '';
    btn.style.color       = activeSeries.has(col) ? color : '';
    btn.onclick = () => toggleSeries(col, btn, color);
    bar.appendChild(btn);
  });
}

function toggleSeries(col, btn, color) {
  if (activeSeries.has(col)) {
    activeSeries.delete(col);
    btn.classList.remove('on');
    btn.style.borderColor = '';
    btn.style.background  = '';
    btn.style.color       = '';
  } else {
    activeSeries.add(col);
    btn.classList.add('on');
    btn.style.borderColor = color;
    btn.style.background  = color + '22';
    btn.style.color       = color;
  }
  renderChart();
}

// ── 차트 ────────────────────────────────────────────────────────
function renderChart() {
  if (!flowData) return;
  const { rows, dateCol, numCols } = flowData;

  const labels = dateCol
    ? rows.map(r => r[dateCol]?.slice(0, 10) ?? '')
    : rows.map((_, i) => String(i + 1));

  const datasets = numCols
    .filter(c => activeSeries.has(c))
    .map((col, i) => {
      const colorIdx = numCols.indexOf(col);
      const color    = PALETTE[colorIdx % PALETTE.length];
      return {
        label:        col,
        data:         rows.map(r => r[col] != null ? +r[col] : null),
        borderColor:  color,
        borderWidth:  1.5,
        pointRadius:  0,
        pointHoverRadius: 3,
        tension:      0.2,
        spanGaps:     true,
      };
    });

  document.getElementById('chartCard').style.display = datasets.length ? 'block' : 'none';
  if (!datasets.length) return;

  if (flowChart) {
    flowChart.data.labels   = labels;
    flowChart.data.datasets = datasets;
    flowChart.update('none');
  } else {
    const ctx = document.getElementById('flowChart').getContext('2d');
    flowChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#181c27',
            borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
            titleColor: '#8b93a8', bodyColor: '#e8eaf0', padding: 10,
            callbacks: {
              label: c => `  ${c.dataset.label}: ${c.parsed.y != null ? c.parsed.y.toLocaleString() : '—'}`,
            },
          },
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,.04)' },
            ticks: {
              font: { size: 10 }, color: '#555e75',
              maxTicksLimit: 12, maxRotation: 0,
            },
          },
          y: {
            grid: { color: 'rgba(255,255,255,.04)' },
            ticks: {
              font: { size: 10 }, color: '#555e75',
              callback: v => v.toLocaleString(),
            },
          },
        },
      },
    });
  }
}

// ── 테이블 ───────────────────────────────────────────────────────
function renderTable(rows, allCols, dateCol, numCols) {
  const displayCols = [dateCol, ...numCols].filter(Boolean);

  const thead = '<thead><tr>' +
    displayCols.map(c => `<th>${c}</th>`).join('') +
    '</tr></thead>';

  const tbody = document.createElement('tbody');
  // 테이블은 최신순으로 보여줌
  [...rows].reverse().forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = displayCols.map((c, i) => {
      const v = row[c];
      if (i === 0) return `<td>${v ?? ''}</td>`;       // 날짜
      const n = parseFloat(v);
      const cls = !isNaN(n) ? (n > 0 ? ' class="pos"' : n < 0 ? ' class="neg"' : '') : '';
      const display = !isNaN(n) ? n.toLocaleString() : (v ?? '');
      return `<td${cls}>${display}</td>`;
    }).join('');
    tbody.appendChild(tr);
  });

  const table = document.createElement('table');
  table.className = 'data-table';
  table.innerHTML = thead;
  table.appendChild(tbody);

  document.getElementById('tableArea').innerHTML = '';
  document.getElementById('tableArea').appendChild(table);
}
</script>
</body>
</html>
